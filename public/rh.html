<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH - Quadro de Lotação</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
header { background: #1e293b; padding: 14px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #334155; }
header h1 { font-size: 17px; color: #38bdf8; flex: 1; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; }
.btn-primary { background: #0ea5e9; color: #fff; }
.btn-primary:hover { background: #0284c7; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
.btn-edit { background: #1d4ed8; color: #fff; }
.btn-del { background: #dc2626; color: #fff; }
.btn-view { background: #059669; color: #fff; }
.btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
.btn-ghost:hover { background: #1e293b; }
.container { padding: 20px; max-width: 1200px; margin: 0 auto; }
.filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.filtros input, .filtros select { background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; }
.filtros input:focus, .filtros select:focus { outline: none; border-color: #38bdf8; }
.filtros input { flex: 1; min-width: 200px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1e293b; padding: 10px 12px; text-align: left; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; }
td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
tr:hover td { background: #1a2638; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.badge-ativo { background: #064e3b; color: #34d399; }
.badge-desligado { background: #450a0a; color: #f87171; }
.badge-inss { background: #1e3a5f; color: #60a5fa; }
.badge-outros { background: #3b2f1a; color: #fbbf24; }
.foto-mini { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #334155; }
.foto-placeholder { width: 36px; height: 36px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 14px; }
/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; overflow-y: auto; }
.modal { background: #1e293b; border-radius: 12px; padding: 28px; max-width: 700px; margin: 40px auto; position: relative; }
.modal h2 { font-size: 17px; color: #38bdf8; margin-bottom: 20px; }
.close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1 / -1; }
.form-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; }
.form-group input[type="text"], .form-group input[type="email"], .form-group textarea { text-transform: uppercase; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #38bdf8; }
.form-group textarea { resize: vertical; min-height: 60px; }
.section-title { font-size: 13px; color: #38bdf8; font-weight: 700; margin: 18px 0 10px; border-bottom: 1px solid #334155; padding-bottom: 6px; grid-column: 1/-1; }
/* Eventos */
.evento-card { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; }
.evento-info { font-size: 12px; }
.evento-tipo { font-weight: 700; color: #38bdf8; font-size: 13px; margin-bottom: 2px; }
.evento-datas { color: #64748b; }
.evento-desc { color: #94a3b8; margin-top: 2px; }
.add-evento { background: #0f172a; border-radius: 8px; padding: 14px; margin-top: 8px; }
.add-evento .form-grid { grid-template-columns: 1fr 1fr; }
.foto-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #334155; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
</style>
</head>
<body>
<header>
  <h1>👥 Quadro de Lotação Pessoal</h1>
  <button class="btn btn-primary" onclick="abrirNovo()">+ Novo Funcionário</button>
  <button class="btn btn-ghost" onclick="location.href='/importar-qlp'">📥 Importar QLP</button>
  <button class="btn btn-ghost" onclick="location.href='/'">← Início</button>
</header>

<div class="container">
  <div class="filtros">
    <input type="text" id="busca" placeholder="Buscar por nome ou matrícula..." oninput="filtrar()">
    <select id="filtroStatus" onchange="filtrar()">
      <option value="">Todos status</option>
      <option value="ATIVO">Ativo</option>
      <option value="DESLIGADO">Desligado</option>
      <option value="INSS">INSS</option>
      <option value="LICENSA MATERNIDADE">Lic. Maternidade</option>
      <option value="TRANSFERIDA">Transferido</option>
    </select>
    <select id="filtroGrupo" onchange="filtrar()">
      <option value="">Todos grupos</option>
      <option>ACOUGUE</option><option>ADM</option><option>ESTOQUE</option>
      <option>FLV</option><option>FRENTE LOJA</option><option>FRIOS</option>
      <option>GESTAO</option><option>LANCHONETE</option><option>LIMPEZA</option>
      <option>LOGISTICA</option><option>REPOSICAO</option>
    </select>
    <select id="filtroLoja" onchange="filtrar()">
      <option value="">Todas lojas</option>
      <option value="1">SUPERASA ECONOMICO</option><option value="2">SUPERASA BR</option>
      <option value="3">SUPERASA JOAO PESSOA</option><option value="4">SUPERASA FLORESTA</option>
      <option value="5">SUPERASA SAO JOSE</option><option value="6">SUPERASA SANTAREM</option>
    </select>
    <select id="filtroCargo" onchange="filtrar()" style="min-width:180px">
      <option value="">Todos cargos</option>
      <option>LIDER DO ACOUGUE</option><option>SUB LIDER DE ACOUGUE</option><option>ACOUGUEIRO</option><option>AJUDANTE ACOUGUEIRO</option>
      <option>FINANCEIRO</option><option>CADASTRO</option><option>GERENTE DE COMPRAS</option><option>AUDITOR DE QUALIDADE</option>
      <option>COMPRADOR</option><option>COMPRADOR SENIOR</option><option>COORDENADOR DE PREV E PERDAS</option>
      <option>ASSISTENTE DE DEP PESSOAL</option><option>ASSISTENTE PREV PERDA</option><option>AUX ADMINISTRATIVO</option>
      <option>AUX CADASTRO</option><option>AUX DE AVARIA</option><option>AUX DE CADASTRO</option>
      <option>AUX DE ESCRITORIO</option><option>MECANICO</option><option>AUX DE MECANICO</option>
      <option>FISCAL DE PREV DE PERDAS</option><option>JOVEM APRENDIZ</option>
      <option>CONFERENTE</option><option>AUX CONFERENTE</option><option>AUX DE DEPOSITO</option><option>OP DE EMPILHADEIRA</option>
      <option>LIDER GERAL FLV</option><option>LIDER DE FLV</option><option>REPOSITOR DE FLV</option><option>ATENDENTE DE BALANCA</option>
      <option>LIDER DE LOJA</option><option>FISCAL DE CAIXA</option><option>OP DE CAIXA</option><option>EMPACOTADOR</option><option>RECEPCIONISTA</option>
      <option>LIDER GERAL FRIOS</option><option>LIDER DE FRIOS</option><option>REPOSITOR DE FRIOS</option><option>FATIADOR</option>
      <option>HEAD COMERCIAL</option><option>HEAD OPERACIONAL</option><option>GERENTE</option><option>SUBGERENTE</option>
      <option>SUBGERENTE ADMINISTRATIVO</option><option>COORDENADOR ADM</option>
      <option>LIDER DE LANCHONETE</option><option>PADEIRO</option><option>AJUDANTE DE COZINHA</option>
      <option>ATENDENTE DE LANCHONETE</option><option>AUX DE PADARIA</option>
      <option>SERVICOS GERAIS</option><option>MOTORISTA</option>
      <option>LIDER REPOSICAO</option><option>REPOSITOR DE MERCADORIAS</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>Matrícula</th>
        <th>Nome</th>
        <th>Cargo</th>
        <th>Grupo</th>
        <th>Loja</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="semResultados" style="display:none;text-align:center;padding:40px;color:#64748b;">Nenhum funcionário encontrado</div>
</div>

<!-- MODAL GERENCIAR TERCEIRIZADAS -->
<div class="overlay" id="overlayTerceirizadas" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center">
  <div style="background:#1e293b;border-radius:12px;padding:20px;width:500px;max-width:92vw;max-height:80vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="color:#38bdf8;font-size:16px">Empresas Terceirizadas</h3>
      <button onclick="fecharGerenciarTerceirizadas()" style="background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:18px">✕</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <input type="text" id="novaTerceirizadaNome" placeholder="Nome da nova empresa" style="flex:1;padding:8px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:13px;text-transform:uppercase">
      <button onclick="adicionarTerceirizada()" style="background:#0ea5e9;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">+ Adicionar</button>
    </div>
    <div id="listaTerceirizadas" style="border-top:1px solid #334155"></div>
  </div>
</div>

<!-- MODAL CADASTRO / EDIÇÃO -->
<div class="overlay" id="overlayForm">
<div class="modal">
  <button class="close-btn" onclick="fecharModal()">✕</button>
  <h2 id="modalTitle">Novo Funcionário</h2>

  <div id="fotoArea" style="text-align:center;margin-bottom:16px;">
    <div class="foto-preview" id="fotoPreview">👤</div>
    <input type="file" id="inputFoto" accept="image/*" onchange="previewFoto(this)" style="display:none">
    <div style="margin-top:8px;">
      <button class="btn btn-sm btn-ghost" onclick="document.getElementById('inputFoto').click()">Alterar foto</button>
    </div>
  </div>

  <div class="form-grid">
    <div class="section-title">Identificação</div>
    <div class="form-group"><label>Matrícula *</label><input type="text" id="fMatricula" placeholder="06-0000000172"></div>
    <div class="form-group"><label>Nome *</label><input type="text" id="fNome"></div>
    <div class="form-group"><label>CPF</label><input type="text" id="fCpf" placeholder="000.000.000-00"></div>
    <div class="form-group"><label>PIS</label><input type="text" id="fPis"></div>
    <div class="form-group"><label>Data Nascimento</label><input type="date" id="fNascimento"></div>
    <div class="form-group"><label>Sexo</label>
      <select id="fSexo"><option value="">—</option><option value="M">Masculino</option><option value="F">Feminino</option></select>
    </div>
    <div class="form-group"><label>Estado Civil</label>
      <select id="fEstadoCivil"><option value="">—</option><option>SOLTEIRO</option><option>CASADO</option><option>DIVORCIADO</option><option>VIUVO</option><option>UNIAO ESTAVEL</option></select>
    </div>
    <div class="form-group"><label>Escolaridade</label>
      <select id="fEscolaridade"><option value="">—</option>
        <option>FUNDAMENTAL INCOMP</option><option>FUNDAMENTAL COMP</option>
        <option>MEDIO INC</option><option>MEDIO COMP</option>
        <option>TECNICO</option><option>SUPERIOR INC</option>
        <option>SUPERIOR COMP</option><option>POS GRADUADO/MESTRE</option>
      </select>
    </div>
    <div class="form-group"><label>Raça</label>
      <select id="fRaca"><option value="">—</option>
        <option>BRANCA</option><option>PRETA</option><option>AMARELA</option>
        <option>PARDA</option><option>INDÍGENA</option><option>SEM DECLARACAO</option>
      </select>
    </div>

    <div class="section-title">Vínculo</div>
    <div class="form-group"><label>Cargo</label>
      <select id="fCargo" onchange="autoFillCargo()">
        <option value="">—</option>
        <option>LIDER DO ACOUGUE</option><option>SUB LIDER DE ACOUGUE</option><option>ACOUGUEIRO</option><option>AJUDANTE ACOUGUEIRO</option>
        <option>FINANCEIRO</option><option>CADASTRO</option><option>GERENTE DE COMPRAS</option><option>AUDITOR DE QUALIDADE</option>
        <option>COMPRADOR</option><option>COMPRADOR SENIOR</option><option>COORDENADOR DE PREV E PERDAS</option>
        <option>ASSISTENTE DE DEP PESSOAL</option><option>ASSISTENTE PREV PERDA</option><option>AUX ADMINISTRATIVO</option>
        <option>AUX CADASTRO</option><option>AUX DE AVARIA</option><option>AUX DE CADASTRO</option>
        <option>AUX DE ESCRITORIO</option><option>MECANICO</option><option>AUX DE MECANICO</option>
        <option>FISCAL DE PREV DE PERDAS</option><option>JOVEM APRENDIZ</option>
        <option>CONFERENTE</option><option>AUX CONFERENTE</option><option>AUX DE DEPOSITO</option><option>OP DE EMPILHADEIRA</option>
        <option>LIDER GERAL FLV</option><option>LIDER DE FLV</option><option>REPOSITOR DE FLV</option><option>ATENDENTE DE BALANCA</option>
        <option>LIDER DE LOJA</option><option>FISCAL DE CAIXA</option><option>OP DE CAIXA</option><option>EMPACOTADOR</option><option>RECEPCIONISTA</option>
        <option>LIDER GERAL FRIOS</option><option>LIDER DE FRIOS</option><option>REPOSITOR DE FRIOS</option><option>FATIADOR</option>
        <option>HEAD COMERCIAL</option><option>HEAD OPERACIONAL</option><option>GERENTE</option><option>SUBGERENTE</option>
        <option>SUBGERENTE ADMINISTRATIVO</option><option>COORDENADOR ADM</option>
        <option>LIDER DE LANCHONETE</option><option>PADEIRO</option><option>AJUDANTE DE COZINHA</option>
        <option>ATENDENTE DE LANCHONETE</option><option>AUX DE PADARIA</option>
        <option>SERVICOS GERAIS</option><option>MOTORISTA</option>
        <option>LIDER REPOSICAO</option><option>REPOSITOR DE MERCADORIAS</option>
      </select>
    </div>
    <div class="form-group"><label>Grupo/Setor</label><input type="text" id="fGrupoCargo" readonly style="background:#0a1020;color:#94a3b8;cursor:default;"></div>
    <div class="form-group"><label>Nível</label><input type="text" id="fNivel" readonly style="background:#0a1020;color:#94a3b8;cursor:default;"></div>
    <div class="form-group"><label>Loja</label>
      <select id="fLoja">
        <option value="">—</option>
        <option value="1">SUPERASA ECONOMICO</option><option value="2">SUPERASA BR</option>
        <option value="3">SUPERASA JOAO PESSOA</option><option value="4">SUPERASA FLORESTA</option>
        <option value="5">SUPERASA SAO JOSE</option><option value="6">SUPERASA SANTAREM</option>
      </select>
    </div>
    <div class="form-group"><label>Terceirizada <button type="button" onclick="abrirGerenciarTerceirizadas()" style="background:transparent;border:1px solid #334155;color:#94a3b8;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:6px">⚙ Gerenciar</button></label>
      <select id="fTerceirizada"><option value="">—</option></select>
    </div>
    <div class="form-group"><label>Salário</label><input type="number" id="fSalario" step="0.01"></div>
    <div class="form-group"><label>Usuário Eco <span style="color:#64748b;font-size:10px">(opcional)</span></label><input type="text" id="fUsuarioEco" placeholder="Login no EcoCentauro"></div>
    <div class="form-group"><label>Status <span style="color:#64748b;font-size:10px">(eventos podem sobrescrever)</span></label>
      <select id="fStatus">
        <option value="ATIVO">ATIVO</option>
        <option value="ATESTADO">ATESTADO</option>
        <option value="INSS">INSS</option>
        <option value="LICENSA MATERNIDADE">LICENÇA MATERNIDADE</option>
        <option value="AFASTADO">AFASTADO</option>
        <option value="FERIAS">FÉRIAS</option>
        <option value="DESLIGADO">DESLIGADO</option>
      </select>
    </div>
    <div class="form-group"><label>Data Admissão</label>
      <input type="date" id="fAdmissao">
    </div>
    <div class="form-group"><label>Data Demissão <span style="color:#64748b;font-size:10px">(via evento)</span></label>
      <input type="date" id="fDemissao" readonly style="background:#0a1020;color:#94a3b8;cursor:default">
    </div>
    <div class="form-group"><label>Causa Afastamento <span style="color:#64748b;font-size:10px">(via evento)</span></label>
      <input type="text" id="fCausaAfastamento" readonly style="background:#0a1020;color:#94a3b8;cursor:default">
    </div>
    <div class="form-group form-full"><label>Motivo Afastamento <span style="color:#64748b;font-size:10px">(via evento)</span></label>
      <textarea id="fMotivoAfastamento" readonly style="background:#0a1020;color:#94a3b8;cursor:default"></textarea>
    </div>

    <div class="section-title">Contato & Endereço</div>
    <div class="form-group"><label>Telefone</label><input type="text" id="fTelefone"></div>
    <div class="form-group"><label>E-mail</label><input type="email" id="fEmail"></div>
    <div class="form-group"><label>CEP</label><input type="text" id="fCep" placeholder="00000-000" maxlength="9" oninput="maskCep(this)"></div>
    <div class="form-group"><label>UF</label><input type="text" id="fUf" maxlength="2"></div>
    <div class="form-group form-full"><label>Logradouro</label><input type="text" id="fLogradouro"></div>
    <div class="form-group"><label>Número</label><input type="text" id="fNumero"></div>
    <div class="form-group"><label>Complemento</label><input type="text" id="fComplemento"></div>
    <div class="form-group"><label>Bairro</label><input type="text" id="fBairro"></div>
    <div class="form-group"><label>Cidade</label><input type="text" id="fCidade"></div>
  </div>

  <!-- Eventos / Timeline (só em edição) -->
  <div id="eventoSection" style="display:none;margin-top:20px;">
    <div class="section-title" style="border-top:1px solid #334155;padding-top:14px;display:flex;align-items:center;gap:10px;">
      Histórico do funcionário
      <span id="alertaInss" style="display:none;background:#450a0a;color:#fca5a5;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700">⚠ ENCAMINHAR AO INSS</span>
    </div>
    <div id="listaEventos"></div>
    <div class="add-evento" id="addEventoForm">
      <div style="font-size:12px;color:#38bdf8;font-weight:700;margin-bottom:10px;">Registrar novo evento</div>
      <div class="form-grid">
        <div class="form-group"><label>Tipo</label>
          <select id="eTipo" onchange="onTipoEventoChange()">
            <optgroup label="Cadastro">
              <option value="admissao">Admissão</option>
              <option value="demissao">Demissão</option>
              <option value="transferencia">Transferência</option>
              <option value="mudanca_cargo">Mudança de cargo</option>
              <option value="promocao">Promoção</option>
              <option value="aumento_salario">Aumento salarial</option>
            </optgroup>
            <optgroup label="Saúde / Afastamento">
              <option value="atestado_medico">Atestado médico (até 15 dias — empresa)</option>
              <option value="afastamento_inss">Afastamento INSS (a partir do 16º dia)</option>
              <option value="acidente_trabalho">Acidente de trabalho (B91)</option>
              <option value="licenca_doenca_familia">Licença por doença na família</option>
              <option value="retorno">Retorno (volta ao trabalho)</option>
            </optgroup>
            <optgroup label="Licenças legais (CLT)">
              <option value="licenca_maternidade">Licença-maternidade (120/180 dias)</option>
              <option value="licenca_paternidade">Licença-paternidade (5/20 dias)</option>
              <option value="licenca_casamento">Licença-casamento / gala (3 dias)</option>
              <option value="licenca_luto">Licença-luto / nojo (2 dias)</option>
              <option value="licenca_doacao_sangue">Doação de sangue (1 dia)</option>
              <option value="licenca_servico_eleitoral_juri">Serviço eleitoral / júri</option>
            </optgroup>
            <optgroup label="Disciplina">
              <option value="advertencia_verbal">Advertência verbal</option>
              <option value="advertencia_escrita">Advertência escrita</option>
              <option value="suspensao">Suspensão</option>
            </optgroup>
            <optgroup label="Férias / Treinamento">
              <option value="ferias">Férias</option>
              <option value="folga_compensatoria">Folga compensatória</option>
              <option value="treinamento">Treinamento</option>
            </optgroup>
            <optgroup label="Reconhecimento">
              <option value="feedback_positivo">Feedback positivo</option>
              <option value="aniversario">Aniversário</option>
              <option value="tempo_de_casa">Tempo de casa</option>
            </optgroup>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group"><label>Data início *</label><input type="date" id="eDataInicio" onchange="onDataInicioEventoChange()"></div>
        <div class="form-group"><label>Data fim <span id="eDataFimHint" style="color:#64748b;font-weight:400;font-size:10px"></span></label><input type="date" id="eDataFim"></div>
        <div class="form-group form-full" id="eLicencaHint" style="display:none;background:#0c2030;border-left:3px solid #38bdf8;padding:8px 12px;border-radius:4px;font-size:11px;color:#94a3b8;line-height:1.5"></div>

        <!-- Campos específicos por tipo (display dinâmico) -->
        <div class="form-group ev-transferencia" style="display:none"><label>Loja origem</label>

function autoFillCargo() {
  const cargo = document.getElementById('fCargo').value;
  const c = CARGOS[cargo];
  document.getElementById('fGrupoCargo').value = c ? c.grupo : '';
  document.getElementById('fNivel').value = c ? c.nivel : '';
  document.getElementById('fSalario').value = c ? (c.salario || '') : '';
}

let editId = null;
let todos = [];

async function carregar() {
  const q = document.getElementById('busca').value;
  const status = document.getElementById('filtroStatus').value;
  const grupo_cargo = document.getElementById('filtroGrupo').value;
  const loja_id = document.getElementById('filtroLoja').value;
  const cargo = document.getElementById('filtroCargo').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (status) params.set('status', status);
  if (grupo_cargo) params.set('grupo_cargo', grupo_cargo);
  if (loja_id) params.set('loja_id', loja_id);
  if (cargo) params.set('cargo', cargo);
  const r = await apiFetch(`${API}/api/funcionarios?${params}`);
  const data = await r.json();
  todos = Array.isArray(data) ? data : (data.rows || []);
  renderTabela(todos);
}

function filtrar() { carregar(); }

function badgeStatus(s) {
  const map = { 'ATIVO': 'ativo', 'DESLIGADO': 'desligado', 'INSS': 'inss' };
  const cls = map[s] || 'outros';
  return `<span class="badge badge-${cls}">${s}</span>`;
}

function renderTabela(lista) {
  const tb = document.getElementById('tbody');
  document.getElementById('semResultados').style.display = lista.length ? 'none' : 'block';
  tb.innerHTML = lista.map(f => `
    <tr>
      <td>${f.foto_path ? `<img src="${fotoUrl(f.foto_path)}" class="foto-mini">` : `<div class="foto-placeholder">👤</div>`}</td>
      <td style="font-family:monospace;font-size:12px;">${f.matricula}</td>
      <td style="font-weight:600;">${f.nome}</td>
      <td style="color:#94a3b8;">${f.cargo || '—'}</td>

async function editar(id) {
  editId = id;
  const r = await apiFetch(`${API}/api/funcionarios/${id}`);
  const f = await r.json();
  document.getElementById('modalTitle').textContent = `Editar: ${f.nome}`;
  preencherForm(f);
  renderEventos(f.eventos || [], id, f.alerta_inss);
  onTipoEventoChange();
  document.getElementById('eventoSection').style.display = 'block';
  document.getElementById('overlayForm').style.display = 'block';
}

async function enviarLinkFotoTabela(id, btn) {
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const r = await apiFetch(`${API}/api/foto-upload/gerar/${id}`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.erro);
    btn.textContent = 'Enviado!';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.textContent = orig; btn.style.color = '#38bdf8'; btn.disabled = false; }, 3000);
  } catch (e) {
    alert(e.message);
    btn.textContent = orig;
    btn.disabled = false;
  }
}

function renderEventos(eventos, funcId, alertaInss) {
  document.getElementById('alertaInss').style.display = alertaInss ? 'inline-block' : 'none';
  if (!eventos.length) {
    document.getElementById('listaEventos').innerHTML = '<div style="color:#64748b;font-size:13px;padding:8px 0;">Nenhum evento registrado</div>';
    return;
  }
  document.getElementById('listaEventos').innerHTML = eventos.map(e => {
    const cor = TIPO_EVENTO_COR[e.tipo] || '#334155';
    const label = TIPO_EVENTO_LABEL[e.tipo] || e.tipo;
    const di = e.data_inicio?.substring(0,10).split('-').reverse().join('/');
    const df = e.data_fim ? '→ ' + e.data_fim.substring(0,10).split('-').reverse().join('/') : '';
    let detalhes = [];
    if (e.cid) detalhes.push(`CID ${escapeHtml(e.cid)}`);
    if (e.medico_nome) detalhes.push(`Dr. ${escapeHtml(e.medico_nome)}`);
    if (e.clinica) detalhes.push(escapeHtml(e.clinica));
    if (e.dias_afastado) detalhes.push(`${e.dias_afastado} dias`);
    if (e.minutos) detalhes.push(`${e.minutos} min de atraso`);
    if (e.gravidade) detalhes.push(`Gravidade ${e.gravidade}`);
    if (e.loja_destino_id) detalhes.push(`→ ${LOJAS[e.loja_destino_id] || ('Loja '+e.loja_destino_id)}`);
    if (e.cargo_novo) detalhes.push(`Cargo: ${escapeHtml(e.cargo_novo)}`);
    if (e.salario_novo) detalhes.push(`Salário: R$ ${parseFloat(e.salario_novo).toLocaleString('pt-BR',{minimumFractionDigits:2})}`);
    return `
      <div class="evento-card" style="border-left:4px solid ${cor};margin-bottom:8px;padding:10px;background:#0f172a;border-radius:6px;display:flex;gap:10px;align-items:flex-start">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;color:#e2e8f0">${escapeHtml(label)}</div>
          <div style="color:#94a3b8;font-size:12px;margin-top:2px">${di} ${df}</div>
          ${detalhes.length ? `<div style="color:#cbd5e1;font-size:11px;margin-top:3px">${detalhes.join(' · ')}</div>` : ''}
          ${e.descricao ? `<div style="color:#94a3b8;font-size:11px;margin-top:3px;font-style:italic">${escapeHtml(e.descricao)}</div>` : ''}
          <div style="color:#475569;font-size:10px;margin-top:4px">Por: ${escapeHtml(e.criado_por || '—')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${e.tem_anexo ? `<a href="/api/funcionarios/eventos/${e.id}/anexo" target="_blank" class="btn btn-sm btn-ghost" style="text-decoration:none;text-align:center">📎 Anexo</a>` : ''}
          <button class="btn btn-sm btn-del" onclick="excluirEvento(${e.id}, this)">✕</button>
        </div>
      </div>`;
  }).join('');
}

let TIPOS_LICENCA = {};
async function carregarTiposLicenca() {
  try {
    const r = await apiFetch(`${API}/api/funcionarios/tipos-licenca`);
    if (!r.ok) return;
    const lista = await r.json();
    TIPOS_LICENCA = Object.fromEntries(lista.map(t => [t.codigo, t]));
  } catch {}
}

// Calcula data_fim = data_inicio + (dias - 1) — inclusivo
function calcularDataFim(dataInicio, dias) {
  if (!dataInicio || !dias || dias < 1) return '';
  const d = new Date(dataInicio + 'T00:00:00');
  d.setDate(d.getDate() + (dias - 1));
  return d.toISOString().substring(0, 10);
}

function onTipoEventoChange() {
  const tipo = document.getElementById('eTipo').value;
  document.querySelectorAll('.ev-transferencia,.ev-cargo,.ev-atestado,.ev-advertencia,.ev-atraso,.ev-anexo')
    .forEach(el => el.style.display = 'none');
  if (tipo === 'transferencia') document.querySelectorAll('.ev-transferencia').forEach(el => el.style.display = '');
  if (tipo === 'mudanca_cargo' || tipo === 'promocao' || tipo === 'aumento_salario')
    document.querySelectorAll('.ev-cargo').forEach(el => el.style.display = '');
  if (['atestado_medico','licenca_maternidade','afastamento_inss','acidente_trabalho'].includes(tipo)) {
    document.querySelectorAll('.ev-atestado').forEach(el => el.style.display = '');
  }
  if (['advertencia_verbal','advertencia_escrita','suspensao'].includes(tipo)) {
    document.querySelectorAll('.ev-advertencia').forEach(el => el.style.display = '');
  }
  if (tipo === 'atraso') document.querySelectorAll('.ev-atraso').forEach(el => el.style.display = '');

  // Catálogo de licenças: anexo, hint legal, auto-fill de data_fim
  const lic = TIPOS_LICENCA[tipo];
  const hintEl = document.getElementById('eLicencaHint');
  const fimHint = document.getElementById('eDataFimHint');
  fimHint.textContent = '';
  if (lic) {
    if (lic.exige_atestado) {
      document.querySelectorAll('.ev-anexo').forEach(el => el.style.display = '');
      const labels = {
        atestado_medico: 'PDF do atestado *',
        licenca_maternidade: 'Atestado/laudo do parto *',
        afastamento_inss: 'Documento INSS *',
        acidente_trabalho: 'CAT / atestado *',
        licenca_luto: 'Atestado de óbito *',
        licenca_doacao_sangue: 'Comprovante de doação *',
        licenca_servico_eleitoral_juri: 'Comprovante oficial *',
        licenca_doenca_familia: 'Atestado / parentesco *',
      };
      document.getElementById('eAnexoLabel').textContent = labels[tipo] || 'Documento *';
    }
    hintEl.style.display = '';
    const partes = [];
    if (lic.dias_padrao) partes.push(`<strong>${lic.dias_padrao} dias</strong> (padrão)`);
    if (lic.dias_max && lic.dias_max !== lic.dias_padrao) partes.push(`até ${lic.dias_max} dias`);
    if (lic.remunerada === false) partes.push('não remunerada pela empresa');
    hintEl.innerHTML =
      `<div style="color:#38bdf8;font-weight:700;margin-bottom:4px">${escapeHtml(lic.nome)}${partes.length ? ' · ' + partes.join(' · ') : ''}</div>` +
      (lic.descricao ? `<div style="margin-bottom:4px">${escapeHtml(lic.descricao)}</div>` : '') +
      (lic.base_legal ? `<div style="font-size:10px;color:#64748b">📖 ${escapeHtml(lic.base_legal)}</div>` : '');
    if (lic.dias_padrao) fimHint.textContent = ` (auto: +${lic.dias_padrao} dias)`;
  } else {
    hintEl.style.display = 'none';
    hintEl.innerHTML = '';
  }

  // Anexos por advertência (lógica anterior preservada)
  if (['advertencia_escrita','suspensao'].includes(tipo)) {
    document.querySelectorAll('.ev-anexo').forEach(el => el.style.display = '');
    document.getElementById('eAnexoLabel').textContent = 'Documento assinado *';
  } else if (tipo === 'advertencia_verbal') {
    document.querySelectorAll('.ev-anexo').forEach(el => el.style.display = 'none');
  }

  onDataInicioEventoChange();
}

function onDataInicioEventoChange() {
  const tipo = document.getElementById('eTipo').value;
  const ini = document.getElementById('eDataInicio').value;
  const fimEl = document.getElementById('eDataFim');
  const lic = TIPOS_LICENCA[tipo];
  if (lic && lic.dias_padrao && ini && !fimEl.value) {
    fimEl.value = calcularDataFim(ini, lic.dias_padrao);
  }
}

let cidTimer = null;
async function buscarCid(q) {
  clearTimeout(cidTimer);
  if (!q || q.length < 2) { document.getElementById('cidSugest').innerHTML = ''; return; }
  cidTimer = setTimeout(async () => {
    try {
      const r = await apiFetch(`${API}/api/funcionarios/cid/buscar?q=${encodeURIComponent(q)}`);
      if (!r.ok) return;
      const lista = await r.json();
      const el = document.getElementById('cidSugest');
      if (!lista.length) { el.innerHTML = ''; return; }
      el.innerHTML = `<div style="position:absolute;top:0;left:0;right:0;background:#1e293b;border:1px solid #334155;border-radius:6px;max-height:200px;overflow-y:auto;z-index:10">
        ${lista.slice(0, 10).map(c => `
          <div style="padding:8px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #334155" onclick="selecionarCid('${escapeHtml(c.codigo)}')">
            <strong>${escapeHtml(c.codigo)}</strong> — ${escapeHtml(c.descricao)}
          </div>`).join('')}
      </div>`;
    } catch {}
  }, 250);
}
function selecionarCid(codigo) {
  document.getElementById('eCid').value = codigo;
  document.getElementById('cidSugest').innerHTML = '';
}

async function adicionarEvento(btn) {
  if (!editId) return;
  const tipo = document.getElementById('eTipo').value;
  const data_inicio = document.getElementById('eDataInicio').value;
  if (!data_inicio) return alert('Data início obrigatória');

  const fd = new FormData();
  fd.append('tipo', tipo);
  fd.append('data_inicio', data_inicio);
  const dataFim = document.getElementById('eDataFim').value;
  if (dataFim) fd.append('data_fim', dataFim);
  const desc = document.getElementById('eDesc').value;
  if (desc) fd.append('descricao', desc);

  if (tipo === 'transferencia') {
    const dest = document.getElementById('eLojaDestino').value;
    if (!dest) return alert('Loja destino obrigatória');
    const orig = document.getElementById('eLojaOrigem').value;
    if (orig) fd.append('loja_origem_id', orig);
    fd.append('loja_destino_id', dest);
  }
  if (['mudanca_cargo','promocao','aumento_salario'].includes(tipo)) {
    const cargo = document.getElementById('eCargoNovo').value.trim();
    const sal = document.getElementById('eSalarioNovo').value;
    if (cargo) fd.append('cargo_novo', cargo);
    if (sal) fd.append('salario_novo', sal);
  }
  if (['atestado_medico','licenca_maternidade','afastamento_inss','acidente_trabalho'].includes(tipo)) {
    ['eCid','eMedicoNome','eMedicoCrm','eClinica'].forEach(id => {
      const v = document.getElementById(id).value.trim();
      if (v) fd.append(id.replace('e','').toLowerCase().replace('cid','cid').replace('medicocrm','medico_crm').replace('mediconome','medico_nome'), v);
    });
    // Re-mapeamento explícito p/ evitar bug do replace
    fd.delete('cid'); fd.delete('medico_nome'); fd.delete('medico_crm'); fd.delete('clinica');
    if (document.getElementById('eCid').value) fd.append('cid', document.getElementById('eCid').value.trim());
    if (document.getElementById('eMedicoNome').value) fd.append('medico_nome', document.getElementById('eMedicoNome').value.trim());
    if (document.getElementById('eMedicoCrm').value) fd.append('medico_crm', document.getElementById('eMedicoCrm').value.trim());
    if (document.getElementById('eClinica').value) fd.append('clinica', document.getElementById('eClinica').value.trim());
  }
  if (['advertencia_verbal','advertencia_escrita','suspensao'].includes(tipo)) {
    const cat = document.getElementById('eMotivoCategoria').value;
    const grav = document.getElementById('eGravidade').value;
    if (cat) fd.append('motivo_categoria', cat);
    if (grav) fd.append('gravidade', grav);
  }
  if (tipo === 'atraso') {
    const min = document.getElementById('eMinutos').value;
    if (min) fd.append('minutos', min);
  }
  const anexo = document.getElementById('eAnexo').files[0];
  if (anexo) fd.append('anexo', anexo);

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/funcionarios/${editId}/eventos`, { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) return alert(d.erro || 'Erro ao registrar evento');
    if (d.alerta_inss) alert(`⚠ Alerta INSS: ${d.dias_60} dias de atestado nos últimos 60 dias. Considere encaminhar.`);
    // Limpa form de evento e recarrega
    ['eDataInicio','eDataFim','eDesc','eCid','eMedicoNome','eMedicoCrm','eClinica','eCargoNovo','eSalarioNovo','eMinutos','eAnexo']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('eMotivoCategoria').value = '';
    document.getElementById('eGravidade').value = '';
    document.getElementById('eLojaOrigem').value = '';
    document.getElementById('eLojaDestino').value = '';
    document.getElementById('eTipo').value = 'admissao';
    onTipoEventoChange();
    editar(editId);
  }, 'Salvando...');
}

async function excluirEvento(id, btn) {
  if (!confirm('Excluir este evento? O cadastro será recalculado.')) return;
  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/funcionarios/eventos/${id}`, { method: 'DELETE' });
    if (r.ok) editar(editId);
  }, '...');
}

function previewFoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('fotoPreview').innerHTML = `<img src="${e.target.result}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
  };
  reader.readAsDataURL(file);
}

async function salvar(btn) {
  const fd = new FormData();
  const campos = {
    matricula:'fMatricula', nome:'fNome', cpf:'fCpf', pis:'fPis',
    data_nascimento:'fNascimento', sexo:'fSexo', escolaridade:'fEscolaridade',
    raca:'fRaca', estado_civil:'fEstadoCivil', cargo:'fCargo',
    grupo_cargo:'fGrupoCargo', nivel:'fNivel', loja_id:'fLoja', terceirizada:'fTerceirizada',
    salario:'fSalario', status:'fStatus', data_admissao:'fAdmissao',
    usuario_eco:'fUsuarioEco',
    telefone:'fTelefone', email:'fEmail',
    cep:'fCep', logradouro:'fLogradouro', numero:'fNumero',
    complemento:'fComplemento', bairro:'fBairro', cidade:'fCidade', uf:'fUf'
  };
  for (const [k, id] of Object.entries(campos)) {
    const v = document.getElementById(id)?.value;
    if (v) fd.append(k, v);
  }
  const foto = document.getElementById('inputFoto').files[0];
  if (foto) fd.append('foto', foto);

  const url = editId ? `${API}/api/funcionarios/${editId}` : `${API}/api/funcionarios`;
  const method = editId ? 'PUT' : 'POST';
  await withLoading(btn, async () => {
    const r = await apiFetch(url, { method, body: fd });
    const data = await r.json();
    if (!r.ok) return alert(data.erro);
    fecharModal();
    carregar();
  }, 'Salvando...');
}

function maskCep(input) {
  let v = input.value.replace(/\D/g, '').slice(0, 8);
  if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
  input.value = v;
  if (v.replace(/\D/g, '').length === 8) buscarCep();
}

async function buscarCep() {
  const cep = document.getElementById('fCep').value.replace(/\D/g, '');
  if (cep.length !== 8) return;
  try {
    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const d = await r.json();
    if (d.erro) return;
    document.getElementById('fLogradouro').value = (d.logradouro || '').toUpperCase();
    document.getElementById('fBairro').value     = (d.bairro     || '').toUpperCase();
    document.getElementById('fCidade').value     = (d.localidade || '').toUpperCase();
    document.getElementById('fUf').value         = (d.uf         || '').toUpperCase();
    document.getElementById('fNumero').focus();
  } catch {}
}

function fecharModal() { document.getElementById('overlayForm').style.display = 'none'; }

document.getElementById('overlayForm').addEventListener('input', function(e) {
  const el = e.target;
  if (el.id === 'fCep' || el.id === 'fUsuarioEco') return;
  const tipo = (el.type || '').toLowerCase();
  if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && ['text','email',''].includes(tipo))) {
    const pos = el.selectionStart;
    el.value = el.value.toUpperCase();
    el.setSelectionRange(pos, pos);
  }
});

async function carregarTerceirizadas() {
  try {
    const r = await apiFetch(`${API}/api/funcionarios/terceirizadas`);
    if (!r.ok) return;
    const lista = await r.json();
    const sel = document.getElementById('fTerceirizada');
    const atual = sel.value;
    sel.innerHTML = '<option value="">—</option>' +
      lista.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    sel.value = atual;
  } catch {}
}

async function abrirGerenciarTerceirizadas() {
  document.getElementById('overlayTerceirizadas').style.display = 'flex';
  await renderListaTerceirizadas();
}
function fecharGerenciarTerceirizadas() {
  document.getElementById('overlayTerceirizadas').style.display = 'none';
  carregarTerceirizadas(); // recarrega o select com a nova lista
}

async function renderListaTerceirizadas() {
  const r = await apiFetch(`${API}/api/funcionarios/terceirizadas?todas=1`);
  if (!r.ok) return;
  const lista = await r.json();
  const el = document.getElementById('listaTerceirizadas');
  if (!lista.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b">Nenhuma empresa cadastrada</div>'; return; }
  el.innerHTML = lista.map(t => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #334155">
      <div>
        <strong style="font-size:13px;color:${t.ativo ? '#e2e8f0' : '#64748b'}">${escapeHtml(t.nome)}</strong>
        ${!t.ativo ? '<span style="background:#450a0a;color:#fca5a5;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:6px">INATIVA</span>' : ''}
      </div>
      <button onclick="toggleTerceirizada(${t.id}, ${!t.ativo})" style="background:${t.ativo ? '#7f1d1d' : '#14532d'};color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600">
        ${t.ativo ? 'Desativar' : 'Ativar'}
      </button>
    </div>
  `).join('');
}

async function adicionarTerceirizada() {
  const inp = document.getElementById('novaTerceirizadaNome');
  const nome = inp.value.trim();
  if (!nome) return;
  const r = await apiFetch(`${API}/api/funcionarios/terceirizadas`, {
    method: 'POST', body: JSON.stringify({ nome })
  });
  if (!r.ok) { alert((await r.json()).erro || 'Erro'); return; }
  inp.value = '';
  await renderListaTerceirizadas();
}

async function toggleTerceirizada(id, novoAtivo) {
  const r = await apiFetch(`${API}/api/funcionarios/terceirizadas/${id}`, {
    method: 'PATCH', body: JSON.stringify({ ativo: novoAtivo })
  });
  if (!r.ok) { alert((await r.json()).erro || 'Erro'); return; }
  await renderListaTerceirizadas();
}

carregar();
carregarTerceirizadas();
carregarTiposLicenca();
</script>
