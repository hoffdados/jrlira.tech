<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cadastro de Vendedor — JR Lira</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#1e293b;border-radius:16px;padding:28px 24px;width:100%;max-width:480px}
.logo{font-size:16px;font-weight:700;color:#38bdf8;text-align:center;margin-bottom:2px}
.subtitle{font-size:12px;color:#64748b;text-align:center;margin-bottom:24px}
h2{font-size:16px;color:#e2e8f0;margin-bottom:16px;text-align:center}
.fornecedor-badge{background:#0ea5e9;color:#fff;border-radius:8px;padding:8px 16px;text-align:center;font-size:13px;font-weight:700;margin-bottom:20px}
label{display:block;font-size:12px;color:#64748b;margin-bottom:4px}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:9px 12px;font-size:13px;margin-bottom:12px}
input:focus{outline:none;border-color:#38bdf8}
.foto-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.foto-preview{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #334155;background:#0f172a}
.btn-foto{background:#334155;color:#94a3b8;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn-primary{width:100%;background:#0ea5e9;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-primary:hover{background:#0284c7}
.btn-ghost{background:none;border:none;color:#64748b;font-size:12px;cursor:pointer;margin-top:8px;width:100%;text-align:center}
.msg-ok{color:#4ade80;text-align:center;font-size:15px;font-weight:700}
.msg-err{color:#f87171;text-align:center;font-size:13px;margin-top:8px}
.icon-big{font-size:52px;text-align:center}
.aviso{background:#431407;border-radius:8px;padding:10px 14px;font-size:12px;color:#f97316;text-align:center}
#viewCnpj,#viewForm,#viewOk{display:none;flex-direction:column;gap:12px}
.active{display:flex!important}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">JR Lira Tech</div>
  <div class="subtitle">Portal de Fornecedores</div>

  <!-- Etapa 1: CNPJ -->
  <div id="viewCnpj" class="active">
    <h2>Cadastro de Vendedor</h2>
    <label>CNPJ do seu fornecedor *</label>
    <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18" oninput="mascaraCnpj(this)">
    <button class="btn-primary" onclick="buscarFornecedor()">Continuar</button>
    <div id="errCnpj" class="msg-err" style="display:none"></div>
  </div>

  <!-- Etapa 2: Formulário -->
  <div id="viewForm">
    <h2>Seus dados</h2>
    <div class="fornecedor-badge" id="fornecedorNome"></div>
    <input type="hidden" id="fornecedorId">

    <div class="foto-wrap">
      <img id="fotoPreview" class="foto-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='38' r='18' fill='%23475569'/%3E%3Cellipse cx='50' cy='85' rx='30' ry='20' fill='%23475569'/%3E%3C/svg%3E" alt="Foto">
      <button class="btn-foto" onclick="document.getElementById('fotoInput').click()">📷 Tirar/escolher foto</button>
      <input type="file" id="fotoInput" accept="image/*" capture="user" style="display:none" onchange="previewFoto(this)">
    </div>

    <label>Nome completo *</label>
    <input type="text" id="nome" placeholder="João Silva">

    <label>CPF</label>
    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">

    <label>E-mail *</label>
    <input type="email" id="email" placeholder="joao@fornecedor.com.br">

    <label>Telefone / WhatsApp *</label>
    <input type="tel" id="telefone" placeholder="(00) 00000-0000">

    <label>Nome do gerente/supervisor</label>
    <input type="text" id="nome_gerente" placeholder="Maria Lima">

    <label>Telefone do gerente</label>
    <input type="tel" id="telefone_gerente" placeholder="(00) 00000-0000">

    <div class="aviso">⚠️ Após o envio, aguarde a aprovação do comprador. Você receberá um e-mail com seu login e senha de acesso.</div>

    <button class="btn-primary" onclick="enviar()">Enviar cadastro</button>
    <button class="btn-ghost" onclick="show('viewCnpj')">← Voltar</button>
    <div id="errForm" class="msg-err" style="display:none"></div>
  </div>

  <!-- Etapa 3: Sucesso -->
  <div id="viewOk">
    <div class="icon-big">✅</div>
    <div class="msg-ok">Cadastro enviado!</div>
    <div style="text-align:center;font-size:13px;color:#94a3b8">Aguarde a aprovação do comprador. Você receberá um e-mail com seus dados de acesso.</div>
  </div>
</div>

<script>
let fotoFile = null;

function show(id) {
  ['viewCnpj','viewForm','viewOk'].forEach(v => {
    document.getElementById(v).classList.toggle('active', v === id);
  });
}

function mascaraCnpj(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 14);
  if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/, '$1.$2.$3/$4-$5');
  else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/, '$1.$2.$3/$4');
  else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{0,3})/, '$1.$2.$3');
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,3})/, '$1.$2');
  el.value = v;
}

function previewFoto(input) {
  if (!input.files[0]) return;
  fotoFile = input.files[0];
  document.getElementById('fotoPreview').src = URL.createObjectURL(fotoFile);
}

async function buscarFornecedor() {
  const errEl = document.getElementById('errCnpj');
  errEl.style.display = 'none';
  const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
  if (cnpj.length < 11) { errEl.textContent = 'CNPJ inválido.'; errEl.style.display = 'block'; return; }
  const btn = document.querySelector('#viewCnpj .btn-primary');
  btn.innerHTML = 'Buscando<span class="spinner"></span>';
  btn.disabled = true;
  try {
    const r = await fetch(`/api/vendedores/buscar-fornecedor?cnpj=${cnpj}`);
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.erro || 'Fornecedor não encontrado.'; errEl.style.display = 'block'; return; }
    document.getElementById('fornecedorNome').textContent = data.fantasia || data.razao_social;
    document.getElementById('fornecedorId').value = data.id;
    show('viewForm');
  } catch {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.style.display = 'block';
  } finally {
    btn.innerHTML = 'Continuar';
    btn.disabled = false;
  }
}

async function enviar() {
  const errEl = document.getElementById('errForm');
  errEl.style.display = 'none';
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  if (!nome || !email || !telefone) {
    errEl.textContent = 'Nome, e-mail e telefone são obrigatórios.';
    errEl.style.display = 'block';
    return;
  }
  const fd = new FormData();
  fd.append('fornecedor_id', document.getElementById('fornecedorId').value);
  fd.append('nome', nome);
  fd.append('cpf', document.getElementById('cpf').value.trim());
  fd.append('email', email);
  fd.append('telefone', telefone);
  fd.append('nome_gerente', document.getElementById('nome_gerente').value.trim());
  fd.append('telefone_gerente', document.getElementById('telefone_gerente').value.trim());
  if (fotoFile) fd.append('foto', fotoFile);
  const btn = document.querySelector('#viewForm .btn-primary');
  btn.innerHTML = 'Enviando<span class="spinner"></span>';
  btn.disabled = true;
  try {
    const r = await fetch('/api/vendedores/cadastro', { method: 'POST', body: fd });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.erro; errEl.style.display = 'block'; return; }
    show('viewOk');
  } catch {
    errEl.textContent = 'Erro ao enviar. Tente novamente.';
    errEl.style.display = 'block';
  } finally {
    btn.innerHTML = 'Enviar cadastro';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
