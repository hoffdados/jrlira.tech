<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Extrato de Acordo — JR Lira Tech</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff;color:#0f172a;padding:20px;max-width:1100px;margin:0 auto}
.no-print{margin-bottom:16px;display:flex;gap:10px;justify-content:flex-end}
.no-print button{padding:8px 16px;background:#0ea5e9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
.no-print button.ghost{background:transparent;color:#475569;border:1px solid #cbd5e1}
.header{border-bottom:2px solid #0f172a;padding-bottom:14px;margin-bottom:18px}
.header h1{font-size:22px;color:#0f172a;margin-bottom:4px}
.header .sub{color:#475569;font-size:13px}
.section{margin-bottom:22px}
.section h2{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:#0f172a;border-bottom:1px solid #cbd5e1;padding-bottom:4px;margin-bottom:10px;background:#f1f5f9;padding:6px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px 16px;font-size:12px}
.grid > div label{display:block;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.grid > div span{color:#0f172a;font-weight:600;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:6px 10px;text-align:center;border-bottom:1px solid #e2e8f0}
th{background:#f1f5f9;color:#0f172a;font-size:11px;text-transform:uppercase;font-weight:700}
td:first-child,th:first-child{text-align:left}
tfoot td{background:#f8fafc;font-weight:700;border-top:2px solid #0f172a}
.resumo-card{background:#f8fafc;border-left:4px solid #dc2626;border-radius:6px;padding:12px;margin-bottom:8px}
.resumo-card.ok{border-left-color:#16a34a;background:#dcfce7}
.resumo-val{font-size:18px;font-weight:700;color:#dc2626}
.resumo-card.ok .resumo-val{color:#15803d}
@media print{
  .no-print{display:none}
  body{padding:8px}
}
</style>
</head>
<body>
<div class="no-print">
  <button class="ghost" onclick="history.back()">← Voltar</button>
  <button onclick="window.print()">🖨 Imprimir</button>
</div>
<div id="root">Carregando...</div>

<script>
const id = new URL(location.href).searchParams.get('id');
function fmtData(d){if(!d)return'—';return new Date(String(d).substring(0,10)+'T12:00:00').toLocaleDateString('pt-BR')}
function fmtDH(d){if(!d)return'—';return new Date(d).toLocaleString('pt-BR')}
function fmtR(v){return'R$ '+(parseFloat(v||0)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(v){return parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:3})}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function carregar(){
  if (!id) { document.getElementById('root').innerHTML='ID não informado'; return; }
  try {
    const r = await apiFetch('/api/acordos/'+id+'/extrato');
    if (!r.ok) throw new Error((await r.json()).erro || 'Erro');
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('root').innerHTML='Erro: '+e.message;
  }
}

function render(d) {
  const a = d.acordo;
  const r = d.resumo;
  const vendas = d.vendas || [];
  const acumulado = []; let acc = 0;
  for (const v of vendas) { acc += parseFloat(v.qtd); acumulado.push({ ...v, acumulado: acc }); }
  const cor = r.debito_calculado > 0 ? '' : 'ok';

  let html = `
    <div class="header">
      <h1>Extrato — Acordo #${a.id} · ${escH(a.produto_nome||'')}</h1>
      <div class="sub">Loja ${escH(a.loja_nome||'')} · Status <strong>${a.status}</strong> · Gerado ${fmtDH(new Date())}</div>
    </div>

    <div class="section">
      <h2>Dados do Acordo</h2>
      <div class="grid">
        <div><label>Fornecedor</label><span>${escH(a.fornecedor_nome||'—')}</span></div>
        <div><label>CNPJ</label><span>${escH(a.fornecedor_cnpj||'—')}</span></div>
        <div><label>EAN</label><span>${escH(a.barcode||'—')}</span></div>
        <div><label>Validade Lote</label><span>${fmtData(a.data_validade)}</span></div>
        <div><label>Solicitado</label><span>${fmtDH(a.solicitado_em)}<br><small style="color:#64748b">${escH(a.solicitado_por_nome || a.solicitado_por || '')}</small></span></div>
        <div><label>Aprovado</label><span>${a.aprovado_em ? fmtDH(a.aprovado_em) : '—'}<br><small style="color:#64748b">${escH(a.aprovado_por||'')}</small></span></div>
        ${a.fechado_em?`<div><label>Fechado</label><span>${fmtDH(a.fechado_em)}</span></div>`:''}
        ${a.motivo_recusa?`<div><label>Motivo recusa/cancelamento</label><span>${escH(a.motivo_recusa)}</span></div>`:''}
      </div>
    </div>

    <div class="section">
      <h2>Resumo Financeiro</h2>
      <div class="resumo-card ${cor}">
        <div style="font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:4px">Débito calculado pro fornecedor</div>
        <div class="resumo-val">${fmtR(r.debito_calculado)}</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">${fmtN(r.qtd_efetiva)} un × ${fmtR(r.diferenca_unitaria)}/un (preço normal ${fmtR(r.preco_atual)} − rebaixa ${fmtR(r.preco_acordo)})</div>
      </div>
      <div class="grid" style="margin-top:8px">
        <div><label>Qtde Acordada</label><span>${fmtN(r.qtde_acordada)} un</span></div>
        <div><label>Vendido no período</label><span>${fmtN(r.total_vendido)} un</span></div>
        <div><label>Qtd efetiva (capeada)</label><span>${fmtN(r.qtd_efetiva)} un</span></div>
        <div><label>Preço normal</label><span>${fmtR(r.preco_atual)}</span></div>
        <div><label>Preço rebaixado</label><span>${fmtR(r.preco_acordo)}</span></div>
        <div><label>Δ unitário</label><span>${fmtR(r.diferenca_unitaria)}</span></div>
      </div>
    </div>

    <div class="section">
      <h2>Vendas dia a dia (${vendas.length} dias com venda)</h2>
      ${vendas.length === 0 ? '<div style="color:#64748b;padding:8px">Sem vendas registradas no período do acordo.</div>' : `
      <table>
        <thead><tr>
          <th>Data</th>
          <th>Qtd vendida</th>
          <th>Acumulado</th>
          <th>Preço aplicado</th>
          <th>Receita normal</th>
          <th>Receita rebaixada</th>
          <th>Perda fornecedor</th>
        </tr></thead>
        <tbody>
          ${acumulado.map(v=>{
            const qtd = parseFloat(v.qtd);
            const usandoAcordo = v.acumulado <= r.qtde_acordada;
            const precoUsado = usandoAcordo ? r.preco_acordo : r.preco_atual;
            const recNormal = qtd * r.preco_atual;
            const recRebaixada = qtd * precoUsado;
            const perda = recNormal - recRebaixada;
            return `<tr>
              <td>${fmtData(v.data_venda)}</td>
              <td>${fmtN(qtd)}</td>
              <td>${fmtN(v.acumulado)}</td>
              <td>${fmtR(precoUsado)}${usandoAcordo?'':' <small style="color:#64748b">(fora do cap)</small>'}</td>
              <td>${fmtR(recNormal)}</td>
              <td>${fmtR(recRebaixada)}</td>
              <td style="color:${perda > 0 ? '#dc2626':'#475569'};font-weight:600">${fmtR(perda)}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>TOTAL</td>
            <td>${fmtN(r.total_vendido)}</td>
            <td>—</td>
            <td>—</td>
            <td>${fmtR(r.total_vendido * r.preco_atual)}</td>
            <td>${fmtR(r.qtd_efetiva * r.preco_acordo + (r.total_vendido - r.qtd_efetiva) * r.preco_atual)}</td>
            <td style="color:#dc2626">${fmtR(r.debito_calculado)}</td>
          </tr>
        </tfoot>
      </table>`}
    </div>`;

  document.getElementById('root').innerHTML = html;
}

if (!localStorage.getItem('jrlira_token')) location.href = '/';
else carregar();
</script>
</body>
</html>
