<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos Novos</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:18px;color:#38bdf8}
.nav-user{margin-left:auto;font-size:12px;color:#475569}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.main{padding:18px 20px;max-width:1500px;margin:0 auto}
input,select{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 11px;font-size:13px}
input:focus,select:focus{outline:none;border-color:#38bdf8}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.filtros{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;padding:14px;background:#1e293b;border-radius:10px}
.filtros label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#1e293b;border-radius:10px;padding:14px;border-left:4px solid #475569}
.kpi.warn{border-left-color:#fbbf24}.kpi.ok{border-left-color:#22c55e}.kpi.info{border-left-color:#38bdf8}.kpi.violet{border-left-color:#a78bfa}
.kpi .label{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:700;letter-spacing:.04em}
.kpi .v{font-size:24px;font-weight:900;color:#e2e8f0;margin-top:6px}
.kpi .extra{font-size:11px;color:#64748b;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tabs button{background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:7px 14px;font-size:12px;border-radius:6px}
.tabs button.ativo{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.painel{background:#1e293b;border-radius:10px;padding:16px;margin-bottom:18px}
.painel-titulo{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0f172a;padding:8px 10px;text-align:center;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
thead th.left{text-align:left}
tbody td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
tbody td.right{text-align:right;font-variant-numeric:tabular-nums}
tbody td.center{text-align:center}
tbody tr:hover{background:#1a2744;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.b-pendente{background:#451a03;color:#fbbf24}
.b-validado{background:#14532d;color:#4ade80}
.empty{text-align:center;color:#475569;padding:40px;font-size:13px}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:#312e81;color:#a5b4fc;margin-left:4px}
</style>
</head>
<body>
<nav>
  <span class="brand">JR Lira Tech</span>
  <span style="color:#475569">/</span>
  <span style="font-size:13px;color:#94a3b8">Produtos Novos</span>
  <span class="nav-user" id="nomeUsuario"></span>
  <button class="btn-nav" onclick="location.href='/'">← Início</button>
</nav>

<div class="main">
  <div class="filtros">
    <div>
      <label>Loja</label>
      <select id="filtroLoja"><option value="">Todas</option></select>
    </div>
    <div>
      <label>Emissão de</label>
      <input type="date" id="filtroDataIni">
    </div>
    <div>
      <label>até</label>
      <input type="date" id="filtroDataFim">
    </div>
    <div style="flex:1;min-width:180px">
      <label>Fornecedor</label>
      <input type="text" id="filtroFornecedor" placeholder="Nome ou CNPJ">
    </div>
    <div>
      <label>Status</label>
      <select id="filtroStatus">
        <option value="pendente">Pendente cadastro</option>
        <option value="validado">Já validado</option>
        <option value="todos">Todos</option>
      </select>
    </div>
    <button class="btn-primary" onclick="carregar()">Atualizar</button>
    <button class="btn-ghost" onclick="limparFiltros()">Limpar</button>
  </div>

  <div id="kpis" class="kpis"></div>

  <div class="tabs">
    <button id="tabFornec" class="ativo" onclick="setTab('fornec')">Por Fornecedor</button>
    <button id="tabDistintos" onclick="setTab('distintos')">Produtos Distintos</button>
    <button id="tabItens" onclick="setTab('itens')">Itens (300 mais recentes)</button>
  </div>

  <div id="painelFornec" class="painel">
    <div class="painel-titulo">Top 30 fornecedores trazendo produtos novos</div>
    <div style="overflow-x:auto"><table id="tabelaFornec"></table></div>
  </div>

  <div id="painelDistintos" class="painel" style="display:none">
    <div class="painel-titulo" id="tituloDistintos">Produtos distintos (top 200)</div>
    <div style="overflow-x:auto"><table id="tabelaDistintos"></table></div>
  </div>

  <div id="painelItens" class="painel" style="display:none">
    <div class="painel-titulo" id="tituloItens">Itens recentes</div>
    <div style="overflow-x:auto"><table id="tabelaItens"></table></div>
  </div>
</div>

<script>
document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';
(function popularLojas(){
  const sel = document.getElementById('filtroLoja');
  Object.entries(LOJAS).forEach(([id,nome])=>{
    const o = document.createElement('option'); o.value = id; o.textContent = `${id} — ${nome}`; sel.appendChild(o);
  });
})();

function setTab(tab) {
  ['fornec','distintos','itens'].forEach(t => {
    document.getElementById('painel' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('ativo', t===tab);
  });
}

function limparFiltros(){
  document.getElementById('filtroLoja').value='';
  document.getElementById('filtroDataIni').value='';
  document.getElementById('filtroDataFim').value='';
  document.getElementById('filtroFornecedor').value='';
  document.getElementById('filtroStatus').value='pendente';
  carregar();
}

async function carregar(){
  const params = new URLSearchParams();
  const loja = document.getElementById('filtroLoja').value;
  const di = document.getElementById('filtroDataIni').value;
  const df = document.getElementById('filtroDataFim').value;
  const fn = document.getElementById('filtroFornecedor').value.trim();
  const st = document.getElementById('filtroStatus').value;
  if (loja) params.set('loja', loja);
  if (di) params.set('dataIni', di);
  if (df) params.set('dataFim', df);
  if (fn) params.set('fornecedor', fn);
  if (st) params.set('status', st);

  document.getElementById('kpis').innerHTML = '<div class="empty">Carregando...</div>';

  try {
    const r = await apiFetch('/api/dashboard/produtos-novos?'+params.toString());
    const data = await r.json();
    if (!r.ok) throw new Error(data.erro || 'Erro');
    renderKpis(data.kpis);
    renderFornecedores(data.por_fornecedor);
    renderDistintos(data.produtos_distintos);
    renderItens(data.itens);
  } catch (e) {
    document.getElementById('kpis').innerHTML = `<div class="empty" style="color:#f87171">${escapeHtml(e.message)}</div>`;
  }
}

function renderKpis(k){
  if (!k) return;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi violet"><div class="label">Itens novos</div><div class="v">${(k.qtd_itens||0).toLocaleString('pt-BR')}</div><div class="extra">${k.qtd_notas||0} nota(s)</div></div>
    <div class="kpi info"><div class="label">Produtos distintos</div><div class="v">${(k.qtd_distintos||0).toLocaleString('pt-BR')}</div><div class="extra">EANs/descrições únicos</div></div>
    <div class="kpi warn"><div class="label">Pendentes</div><div class="v">${(k.qtd_pendentes||0).toLocaleString('pt-BR')}</div><div class="extra">aguardando cadastro</div></div>
    <div class="kpi ok"><div class="label">Já validados</div><div class="v">${(k.qtd_validados||0).toLocaleString('pt-BR')}</div><div class="extra">cadastrados depois</div></div>
    <div class="kpi info"><div class="label">Fornecedores</div><div class="v">${(k.qtd_fornecedores||0).toLocaleString('pt-BR')}</div></div>
    <div class="kpi info"><div class="label">Valor total</div><div class="v">R$ ${fmtMoeda(k.valor_total||0)}</div></div>
  `;
}

function renderFornecedores(arr){
  const t = document.getElementById('tabelaFornec');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem fornecedores</th></tr></thead>'; return; }
  const head = `<thead><tr>
    <th class="left">Fornecedor</th><th class="left">CNPJ</th>
    <th>Itens</th><th>Distintos</th><th>Pendentes</th><th>Valor</th>
  </tr></thead>`;
  const body = arr.map(r=>`
    <tr onclick="filtrarFornecedor('${escapeHtml(r.fornecedor_cnpj||r.fornecedor_nome||'')}')">
      <td class="left">${escapeHtml(r.fornecedor_nome||'')}</td>
      <td class="left" style="font-family:monospace">${escapeHtml(r.fornecedor_cnpj||'')}</td>
      <td class="center">${r.qtd_itens}</td>
      <td class="center">${r.qtd_distintos}</td>
      <td class="center" style="color:${r.qtd_pendentes>0?'#fbbf24':'#475569'};font-weight:${r.qtd_pendentes>0?'700':'400'}">${r.qtd_pendentes}</td>
      <td class="right">R$ ${fmtMoeda(r.valor_total)}</td>
    </tr>
  `).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}

function filtrarFornecedor(s){
  document.getElementById('filtroFornecedor').value = s;
  carregar();
}

function renderDistintos(arr){
  document.getElementById('tituloDistintos').textContent = `Produtos distintos (${arr.length})`;
  const t = document.getElementById('tabelaDistintos');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  const head = `<thead><tr>
    <th>EAN</th><th class="left">Descrição</th>
    <th>Ocorrências</th><th>Fornecedores</th>
    <th>1ª aparição</th><th>Última</th>
    <th>Qtd Total</th><th>Valor Total</th><th>Status</th>
  </tr></thead>`;
  const body = arr.map(r=>{
    const validado = r.algum_validado;
    return `<tr>
      <td class="center" style="font-family:monospace;font-size:11px">${escapeHtml(r.ean||'-')}</td>
      <td class="left">${escapeHtml(r.descricao||'')}</td>
      <td class="center" style="font-weight:700">${r.ocorrencias}</td>
      <td class="center">${r.qtd_fornecedores}</td>
      <td class="center">${fmtData(r.primeira)}</td>
      <td class="center">${fmtData(r.ultima)}</td>
      <td class="right">${Number(r.qtd_total||0).toLocaleString('pt-BR',{maximumFractionDigits:3})}</td>
      <td class="right">R$ ${fmtMoeda(r.valor_total)}</td>
      <td class="center"><span class="badge b-${validado?'validado':'pendente'}">${validado?'Validado':'Pendente'}</span></td>
    </tr>`;
  }).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}

function renderItens(arr){
  document.getElementById('tituloItens').textContent = `Itens (${arr.length})`;
  const t = document.getElementById('tabelaItens');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  const head = `<thead><tr>
    <th class="left">Nº Nota</th><th class="left">Fornecedor</th><th class="left">Loja</th>
    <th class="left">Descrição</th><th>EAN</th><th>Qtd</th>
    <th>Preço Unit</th><th>Total</th><th>Emissão</th><th>Status</th>
  </tr></thead>`;
  const body = arr.map(r=>`
    <tr onclick="abrirNota(${r.nota_id})">
      <td class="left" style="font-family:monospace;color:#38bdf8;font-weight:700">${escapeHtml(r.numero_nota||'')}</td>
      <td class="left">${escapeHtml(r.fornecedor_nome||'')}</td>
      <td class="left">${escapeHtml(r.loja_nome||'')}</td>
      <td class="left">${escapeHtml(r.descricao_nota||'')}</td>
      <td class="center" style="font-family:monospace;font-size:11px">${escapeHtml(r.ean_validado||r.ean_nota||'')}</td>
      <td class="right">${Number(r.quantidade||0).toLocaleString('pt-BR',{maximumFractionDigits:3})}</td>
      <td class="right">R$ ${fmtMoeda(r.preco_unitario_nota)}</td>
      <td class="right">R$ ${fmtMoeda(r.preco_total_nota)}</td>
      <td class="center">${fmtData(r.data_emissao)}</td>
      <td class="center"><span class="badge b-${r.validado_cadastro?'validado':'pendente'}">${r.validado_cadastro?'Validado':'Pendente'}</span></td>
    </tr>
  `).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}

function abrirNota(id){ location.href = '/notas-cadastro?nota='+id; }

carregar();
</script>
</body>
</html>
