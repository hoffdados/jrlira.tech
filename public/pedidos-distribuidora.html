<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos pra Distribuidora</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:18px;color:#fde047}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none}
.main{padding:18px;max-width:1400px;margin:0 auto}
h1{font-size:20px;color:#fde047;margin-bottom:14px}

.layout{display:grid;grid-template-columns:1fr 380px;gap:14px;align-items:start}
@media(max-width:1100px){.layout{grid-template-columns:1fr}}

.card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px;margin-bottom:14px}
.card h3{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

.cabecalho{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block}
input,select,textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#fbbf24}
textarea{resize:vertical;min-height:50px}
button{cursor:pointer;border:none;border-radius:6px;font-size:12px;padding:7px 14px;font-weight:600}
.btn-primary{background:#fbbf24;color:#1a1a1a}.btn-primary:hover{background:#f59e0b}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}

.busca{display:flex;gap:8px;margin-bottom:10px}
.busca input{flex:1}

table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:7px 8px;color:#64748b;text-transform:uppercase;letter-spacing:.04em;font-size:10px;border-bottom:1px solid #334155;background:#0f172a;position:sticky;top:0;z-index:5}
tbody td{padding:6px 8px;border-bottom:1px solid #1a2744;vertical-align:middle;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#1a2744}
.muted{color:#64748b}
.code{font-family:'Cascadia Code',Consolas,monospace;color:#7dd3fc;font-size:11px}
.right{text-align:right}
.center{text-align:center}

.qtd-input{width:60px;padding:3px 6px;font-size:11px;text-align:center}

.carrinho{position:sticky;top:14px}
.carrinho-itens{max-height:60vh;overflow-y:auto;margin-bottom:10px}
.cart-row{display:grid;grid-template-columns:1fr 60px 60px 24px;gap:6px;padding:6px;border-bottom:1px solid #1a2744;align-items:center;font-size:11px}
.cart-row .desc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-row .x{color:#f87171;cursor:pointer;text-align:center;font-weight:700}
.totais{padding:10px;background:#0f172a;border-radius:6px;font-size:12px}
.totais .row{display:flex;justify-content:space-between;margin:3px 0}
.totais .total{font-size:14px;font-weight:700;color:#fde047;border-top:1px solid #334155;padding-top:6px;margin-top:6px}

.msg{padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:13px;display:none}
.msg.ok{background:#14532d44;color:#4ade80;border:1px solid #14532d;display:block}
.msg.err{background:#7f1d1d44;color:#f87171;border:1px solid #7f1d1d;display:block}

.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-ok{background:#14532d;color:#4ade80}
.tag-warn{background:#451a03;color:#fde047}
.tag-err{background:#7f1d1d;color:#f87171}
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">JR Lira Tech</a>
  <span style="color:#64748b;font-size:12px">› Pedidos pra Distribuidora</span>
  <span style="margin-left:auto;color:#475569;font-size:12px" id="nomeUsuario"></span>
  <a href="/" class="btn-nav">Voltar</a>
</nav>

<div class="main">
  <h1>Pedido pra Distribuidora — transferência interna</h1>
  <div id="msg" class="msg"></div>

  <div class="layout">

    <div>
      <div class="card">
        <h3>Cabeçalho do pedido</h3>
        <div class="cabecalho">
          <div>
            <label>Loja destino</label>
            <select id="loja">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div>
            <label>Observação (opcional)</label>
            <input id="obs" placeholder="Transferência semanal, etc">
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-ghost btn-sm" onclick="testarApi()">Testar API APK</button>
          <span id="apiStatus" class="muted" style="font-size:11px"></span>
        </div>
      </div>

      <div class="card">
        <h3>Catálogo do CD (busca)</h3>
        <div class="busca">
          <input id="busca" placeholder="Nome, código ou EAN..." oninput="onBuscaChange()">
        </div>
        <div style="max-height:55vh;overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Cod</th>
                <th>Descrição</th>
                <th class="right">Custo Adm</th>
                <th class="right">Estoque</th>
                <th class="center">Qtd</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="produtos"><tr><td colspan="6" class="muted center">Digite pra buscar</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="carrinho">
      <div class="card">
        <h3>Carrinho</h3>
        <div class="carrinho-itens" id="carrinho">
          <p class="muted center" style="padding:20px 0">Vazio</p>
        </div>
        <div class="totais">
          <div class="row"><span>Itens</span><span id="totalItens">0</span></div>
          <div class="row"><span>Quantidade</span><span id="totalQtd">0</span></div>
          <div class="row total"><span>Valor total</span><span id="totalValor">R$ 0,00</span></div>
        </div>
        <button class="btn-primary" style="width:100%;padding:10px;margin-top:10px;font-size:14px" onclick="enviarPedido(this)">
          Enviar Pedido
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const token = () => localStorage.getItem('jrlira_token');
(function(){ const p = localStorage.getItem('jrlira_perfil'); if (!token() || !['admin','ceo'].includes(p)) location.href = '/'; })();
document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

const carrinho = new Map(); // mat_codi → { mat_codi, mat_desc, qtd, valor, qtd_embalagem }
let buscaTimeout = null;

function showMsg(txt, tipo = 'ok') {
  const el = document.getElementById('msg');
  el.className = 'msg ' + tipo;
  el.textContent = txt;
  setTimeout(() => { if (tipo !== 'err') { el.className='msg'; el.textContent=''; } }, 5000);
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, method = 'GET', body) {
  const r = await fetch(path, {
    method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.erro || `HTTP ${r.status}`);
  return data;
}

function fmtBRL(n) { return Number(n || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

async function carregarLojas() {
  try {
    const lojas = await api('/api/pedidos-distribuidora/lojas');
    const sel = document.getElementById('loja');
    if (!lojas.length) {
      sel.innerHTML = '<option value="">⚠ Nenhuma loja com cli_codi cadastrado</option>';
      return;
    }
    sel.innerHTML = '<option value="">Selecione...</option>' +
      lojas.map(l => `<option value="${l.loja_id}">${escapeHtml(l.loja_nome || ('Loja ' + l.loja_id))} (${escapeHtml(l.cli_codi)})</option>`).join('');
  } catch (e) { showMsg(e.message, 'err'); }
}

async function testarApi() {
  const el = document.getElementById('apiStatus');
  el.textContent = 'testando...';
  try {
    const r = await api('/api/pedidos-distribuidora/health-api');
    if (r.ok) {
      el.innerHTML = `<span class="tag tag-ok">API OK</span> próximo cod: ${r.sample?.cod_pedido || r.sample?.proximo || '?'}`;
    } else {
      el.innerHTML = `<span class="tag tag-err">FALHA</span> ${escapeHtml(r.erro || '')}`;
    }
  } catch (e) {
    el.innerHTML = `<span class="tag tag-err">ERRO</span> ${escapeHtml(e.message)}`;
  }
}

function onBuscaChange() {
  clearTimeout(buscaTimeout);
  buscaTimeout = setTimeout(buscarProdutos, 350);
}

async function buscarProdutos() {
  const q = document.getElementById('busca').value.trim();
  const tbody = document.getElementById('produtos');
  if (!q) { tbody.innerHTML = '<tr><td colspan="6" class="muted center">Digite pra buscar</td></tr>'; return; }
  tbody.innerHTML = '<tr><td colspan="6" class="muted center">Buscando...</td></tr>';
  try {
    const rows = await api('/api/pedidos-distribuidora/produtos?search=' + encodeURIComponent(q) + '&limit=80');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="6" class="muted center">Nada encontrado</td></tr>'; return; }
    tbody.innerHTML = rows.map(p => {
      const desc = p.desc_local || p.mat_desc || `Produto ${p.mat_codi}`;
      const preco = p.preco_admin ? fmtBRL(p.preco_admin) : '<span class="muted">sem custo</span>';
      const estoque = p.estoque_cd != null ? Number(p.estoque_cd).toFixed(0) : '?';
      const noCarrinho = carrinho.has(p.mat_codi);
      return `
        <tr data-mat="${escapeHtml(p.mat_codi)}">
          <td class="code">${escapeHtml(p.mat_codi)}</td>
          <td>${escapeHtml(desc)}<br><span class="muted" style="font-size:10px">${escapeHtml(p.ean_codi || '')} ${p.qtd_embalagem ? `· emb ${p.qtd_embalagem}` : ''}</span></td>
          <td class="right">${preco}</td>
          <td class="right">${estoque}</td>
          <td class="center">
            <input type="number" class="qtd-input" id="q-${escapeHtml(p.mat_codi)}" min="0.01" step="any" placeholder="0">
          </td>
          <td>
            <button class="btn-sm ${noCarrinho?'btn-ghost':'btn-primary'}" onclick="addCarrinho('${escapeHtml(p.mat_codi)}', ${p.preco_admin || 0}, ${p.qtd_embalagem || 1})">
              ${noCarrinho ? 'Atualizar' : 'Add'}
            </button>
          </td>
        </tr>
      `;
    }).join('');
  } catch (e) { tbody.innerHTML = `<tr><td colspan="6"><span class="tag tag-err">ERRO</span> ${escapeHtml(e.message)}</td></tr>`; }
}

function addCarrinho(matCodi, precoAdm, qtdEmb) {
  const qtdEl = document.getElementById('q-' + matCodi);
  const qtd = parseFloat(qtdEl.value);
  if (!(qtd > 0)) { showMsg('Informe a quantidade', 'err'); return; }
  if (!(precoAdm > 0)) { showMsg('Produto sem custo administrativo no CD', 'err'); return; }
  const tr = qtdEl.closest('tr');
  const desc = tr.querySelector('td:nth-child(2)').textContent.split('\n')[0].trim();
  carrinho.set(matCodi, { mat_codi: matCodi, mat_desc: desc, qtd, valor: precoAdm, qtd_embalagem: qtdEmb });
  qtdEl.value = '';
  renderCarrinho();
  buscarProdutos(); // re-render pra mostrar "Atualizar"
}

function delCarrinho(matCodi) {
  carrinho.delete(matCodi);
  renderCarrinho();
}

function renderCarrinho() {
  const div = document.getElementById('carrinho');
  if (!carrinho.size) {
    div.innerHTML = '<p class="muted center" style="padding:20px 0">Vazio</p>';
  } else {
    div.innerHTML = [...carrinho.values()].map(it => `
      <div class="cart-row">
        <div class="desc" title="${escapeHtml(it.mat_desc)}">${escapeHtml(it.mat_desc)}</div>
        <div class="right">${it.qtd}</div>
        <div class="right">${fmtBRL(it.qtd * it.valor)}</div>
        <div class="x" onclick="delCarrinho('${escapeHtml(it.mat_codi)}')">×</div>
      </div>
    `).join('');
  }
  const totalQtd = [...carrinho.values()].reduce((s,x) => s + x.qtd, 0);
  const totalVal = [...carrinho.values()].reduce((s,x) => s + x.qtd * x.valor, 0);
  document.getElementById('totalItens').textContent = carrinho.size;
  document.getElementById('totalQtd').textContent = totalQtd.toFixed(2).replace('.',',');
  document.getElementById('totalValor').textContent = fmtBRL(totalVal);
}

async function enviarPedido(btn) {
  const lojaId = parseInt(document.getElementById('loja').value);
  if (!lojaId) { showMsg('Selecione a loja destino', 'err'); return; }
  if (!carrinho.size) { showMsg('Carrinho vazio', 'err'); return; }
  if (!confirm(`Enviar pedido pra distribuidora?\n\nLoja: ${document.getElementById('loja').selectedOptions[0].text}\n${carrinho.size} item(ns) · ${document.getElementById('totalValor').textContent}`)) return;

  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const body = {
      loja_id_destino: lojaId,
      observacao: document.getElementById('obs').value.trim() || undefined,
      itens: [...carrinho.values()].map(it => ({
        mat_codi: it.mat_codi,
        quantidade: it.qtd,
        valor: it.valor,
        qtd_embalagem: it.qtd_embalagem,
      })),
    };
    const r = await api('/api/pedidos-distribuidora', 'POST', body);
    if (r.ok) {
      showMsg(`✅ Pedido #${r.cod_pedido} enviado · ${r.enviados}/${r.total_itens} itens · ${fmtBRL(r.valor_total)}`, 'ok');
      carrinho.clear();
      renderCarrinho();
      document.getElementById('obs').value = '';
    } else {
      const falhasResumo = r.falhas?.slice(0, 3).map(f => `${f.pro_codi}: ${f.erro}`).join(' | ') || '';
      showMsg(`⚠ Pedido #${r.cod_pedido} parcial · ${r.enviados}/${r.total_itens} itens. ${falhasResumo}`, 'err');
    }
  } catch (e) {
    showMsg('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Enviar Pedido';
  }
}

carregarLojas();
renderCarrinho();
</script>
</body>
</html>
