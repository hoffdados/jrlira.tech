<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos pra Distribuidora</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:16px;color:#fde047}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;text-decoration:none}
.main{padding:10px 14px}

label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;display:block}
input,select{background:#0f172a;border:1px solid #334155;border-radius:5px;color:#e2e8f0;padding:5px 8px;font-size:12px}
input:focus,select:focus{outline:none;border-color:#fbbf24}
button{cursor:pointer;border:none;border-radius:5px;font-size:12px;padding:6px 12px;font-weight:600}
.btn-primary{background:#fbbf24;color:#1a1a1a}.btn-primary:hover{background:#f59e0b}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}

.toolbar{display:flex;gap:10px;align-items:end;padding:10px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;margin-bottom:10px;flex-wrap:wrap}
.toolbar .grupo{display:flex;flex-direction:column}
.toolbar .grupo input,.toolbar .grupo select{min-width:200px}
.toolbar .check{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;padding-bottom:5px}

.grade-wrap{background:#1e293b;border:1px solid #334155;border-radius:6px;overflow:auto;max-height:calc(100vh - 230px)}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
thead th{position:sticky;top:0;background:#0f172a;padding:6px 6px;text-align:center;color:#94a3b8;font-weight:700;font-size:10px;border-bottom:1px solid #334155;letter-spacing:.04em;text-transform:uppercase;z-index:10;white-space:nowrap}
thead th.left{text-align:left}
thead th.cd-col{background:#451a03;color:#fde047}
thead th.loja-col{background:#0c1a2e;color:#7dd3fc}
tbody td{padding:4px 6px;border-bottom:1px solid #1a2744;font-variant-numeric:tabular-nums;white-space:nowrap}
tbody td.left{text-align:left}
tbody td.right{text-align:right}
tbody td.center{text-align:center}
tbody tr:hover{background:#1a2744}

.qtd{width:55px;padding:3px 5px;font-size:11px;text-align:center;background:#0f172a;border:1px solid #1a2744;border-radius:4px;color:#e2e8f0}
.qtd:focus{border-color:#fbbf24}
.qtd.dirty{border-color:#fbbf24;box-shadow:0 0 0 1px #fbbf24}
.qtd.saving{border-color:#38bdf8}
.qtd.saved{border-color:#4ade80}
.qtd.zero{color:#475569}

.cell-est{color:#64748b;font-size:10px;text-align:right}
.desc{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1}
.code{font-family:'Cascadia Code',Consolas,monospace;color:#7dd3fc;font-size:10px}
.muted{color:#64748b}

.msg{padding:8px 12px;border-radius:5px;margin-bottom:8px;font-size:12px;display:none}
.msg.ok{background:#14532d44;color:#4ade80;border:1px solid #14532d;display:block}
.msg.err{background:#7f1d1d44;color:#f87171;border:1px solid #7f1d1d;display:block}

.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase}
.tag-loja{background:#1e3a5f;color:#60a5fa}
.tag-cd{background:#451a03;color:#fde047}

.summary-bar{display:flex;gap:14px;align-items:center;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;margin-top:10px;font-size:12px}
.summary-bar .stat{display:flex;flex-direction:column}
.summary-bar .stat label{font-size:10px;color:#64748b}
.summary-bar .stat span{font-weight:700;color:#fde047}
.summary-bar .actions{margin-left:auto;display:flex;gap:8px}

.download-bloco{display:flex;gap:10px;margin-top:10px}
.download-bloco a{flex:1;display:flex;align-items:center;gap:6px;padding:10px 14px;background:#14532d;border-radius:5px;color:#bbf7d0;text-decoration:none;font-size:12px;font-weight:600;justify-content:center}
.download-bloco a:hover{background:#166534}
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">JR Lira Tech</a>
  <span style="color:#64748b;font-size:11px">› Pedidos pra Distribuidora</span>
  <span style="margin-left:auto;color:#475569;font-size:11px" id="nomeUsuario"></span>
  <a href="/" class="btn-nav">Voltar</a>
</nav>

<div class="main">
  <div id="msg" class="msg"></div>

  <div class="toolbar">
    <div class="grupo">
      <label>CD origem</label>
      <select id="cdOrigem" onchange="onOrigemChange()">
        <option value="">Carregando...</option>
      </select>
    </div>
    <div class="grupo">
      <label>Buscar produto (nome / cod / EAN)</label>
      <input id="busca" placeholder="..." oninput="onBuscaChange()">
    </div>
    <div class="check">
      <input type="checkbox" id="soPedir" onchange="recarregarGrade()"> só com qtd > 0
    </div>
    <div class="grupo">
      <label>Limit</label>
      <select id="limit" onchange="recarregarGrade()">
        <option value="200">200</option>
        <option value="500" selected>500</option>
        <option value="1000">1000</option>
        <option value="3000">3000</option>
      </select>
    </div>
    <button class="btn-ghost btn-sm" onclick="limparTudo()">🗑 Limpar rascunho</button>
  </div>

  <div class="grade-wrap">
    <table id="grade">
      <thead id="gradeHead"><tr><th class="left">Aguardando origem...</th></tr></thead>
      <tbody id="gradeBody"></tbody>
    </table>
  </div>

  <div class="summary-bar">
    <div class="stat"><label>Produtos editados</label><span id="totalProdutos">0</span></div>
    <div class="stat"><label>Pedidos</label><span id="totalPedidos">0</span></div>
    <div class="stat"><label>Total geral</label><span id="totalValor">R$ 0,00</span></div>
    <div class="actions">
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#94a3b8">
        Observação:
        <input id="obs" placeholder="Transferência semanal" style="width:240px">
      </label>
      <button class="btn-primary" onclick="gerarCsv(this)">Gerar CSVs</button>
    </div>
  </div>

  <div id="downloadArea" style="display:none">
    <div class="download-bloco">
      <a id="dlPedidos"   target="_blank">⬇ P_PEDIDOS.csv</a>
      <a id="dlItens"     target="_blank">⬇ P_PEDIDOS_ITENS.csv</a>
    </div>
  </div>
</div>

<script>
const token = () => localStorage.getItem('jrlira_token');
(function(){ const p = localStorage.getItem('jrlira_perfil'); if (!token() || !['admin','ceo'].includes(p)) location.href = '/'; })();
document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

let cdOrigemAtual = null;
let destinosAtuais = [];          // [{id, tipo, codigo, nome, ...}]
let produtosAtuais = [];
let buscaTimeout = null;
let salvarTimeouts = new Map();   // chave: mat_codi-destino_id

function showMsg(txt, tipo = 'ok') {
  const el = document.getElementById('msg');
  el.className = 'msg ' + tipo;
  el.textContent = txt;
  setTimeout(() => { if (tipo !== 'err') { el.className='msg'; el.textContent=''; } }, 4500);
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, method = 'GET', body) {
  const r = await fetch(path, {
    method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.erro || `HTTP ${r.status}`);
  return data;
}

function fmtBRL(n) { return Number(n || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

async function carregarOrigens() {
  try {
    const cds = await api('/api/pedidos-distribuidora/cds-origem');
    const sel = document.getElementById('cdOrigem');
    if (!cds.length) {
      sel.innerHTML = '<option value="">Nenhum CD ativo</option>';
      return;
    }
    sel.innerHTML = '<option value="">Selecione...</option>' +
      cds.map(c => `<option value="${escapeHtml(c.codigo)}">${escapeHtml(c.nome)} (${escapeHtml(c.codigo)})</option>`).join('');
  } catch (e) { showMsg(e.message, 'err'); }
}

function onOrigemChange() {
  const codigo = document.getElementById('cdOrigem').value;
  cdOrigemAtual = codigo || null;
  document.getElementById('downloadArea').style.display = 'none';
  if (cdOrigemAtual) recarregarGrade();
  else { document.getElementById('gradeHead').innerHTML = '<tr><th class="left">Selecione um CD origem</th></tr>'; document.getElementById('gradeBody').innerHTML = ''; }
}

function onBuscaChange() {
  clearTimeout(buscaTimeout);
  buscaTimeout = setTimeout(recarregarGrade, 350);
}

async function recarregarGrade() {
  if (!cdOrigemAtual) return;
  const busca = document.getElementById('busca').value.trim();
  const soPedir = document.getElementById('soPedir').checked;
  const limit = document.getElementById('limit').value;
  const url = `/api/pedidos-distribuidora/grade?cd_origem=${encodeURIComponent(cdOrigemAtual)}&busca=${encodeURIComponent(busca)}&so_pedir=${soPedir}&limit=${limit}`;
  document.getElementById('gradeBody').innerHTML = '<tr><td>Carregando...</td></tr>';
  try {
    const r = await api(url);
    destinosAtuais = r.destinos;
    produtosAtuais = r.produtos;
    renderGrade();
    atualizarSummary();
  } catch (e) { showMsg(e.message, 'err'); }
}

function renderGrade() {
  // Head: COD, DESC, REF, EST_DIST, [destinos]
  const head = document.getElementById('gradeHead');
  const colsDest = destinosAtuais.map(d => {
    const cls = d.tipo === 'CD' ? 'cd-col' : 'loja-col';
    return `<th class="${cls}" title="${escapeHtml(d.nome)}">${escapeHtml(siglaDestino(d))}</th>`;
  }).join('');
  head.innerHTML = `
    <tr>
      <th class="left">COD</th>
      <th class="left">DESCRIÇÃO</th>
      <th class="left">REF</th>
      <th>EST DIST</th>
      <th>R$ ADM</th>
      ${colsDest}
    </tr>
  `;

  // Body
  const body = document.getElementById('gradeBody');
  if (!produtosAtuais.length) {
    body.innerHTML = '<tr><td colspan="' + (5 + destinosAtuais.length) + '" class="muted center">Nada encontrado</td></tr>';
    return;
  }
  body.innerHTML = produtosAtuais.map(p => {
    const ref = (p.referencia || '').trim();
    const cels = destinosAtuais.map(d => {
      const v = p.qtds[d.id] || '';
      return `<td class="center"><input class="qtd ${v?'':'zero'}" data-mat="${escapeHtml(p.mat_codi)}" data-dest="${d.id}" value="${v}" type="number" min="0" step="any" oninput="onQtdInput(this)"></td>`;
    }).join('');
    return `
      <tr>
        <td class="left code">${escapeHtml(p.mat_codi)}</td>
        <td class="left desc" title="${escapeHtml(p.descricao)}">${escapeHtml(p.descricao)}</td>
        <td class="left muted" style="font-size:10px">${escapeHtml(ref)}</td>
        <td class="cell-est">${p.est_dist != null ? Number(p.est_dist).toFixed(0) : '-'}</td>
        <td class="cell-est">${p.preco_admin ? fmtBRL(p.preco_admin) : '-'}</td>
        ${cels}
      </tr>
    `;
  }).join('');
}

function siglaDestino(d) {
  // Usa codigo (LOJA1-LOJA6, CD-srv1-itautuba, etc) ou abrevia o nome
  if (d.codigo.startsWith('LOJA')) return d.codigo.replace('LOJA', 'L');
  // Pega primeiras letras significativas do nome
  return d.nome.split(/\s+/).slice(-2).map(s => s[0]).join('') || d.codigo.slice(0, 6);
}

function onQtdInput(input) {
  input.classList.add('dirty');
  input.classList.remove('saved', 'zero');
  const matCodi = input.dataset.mat;
  const destId  = parseInt(input.dataset.dest);
  const qtd     = parseFloat(input.value) || 0;
  // Atualiza local
  const p = produtosAtuais.find(x => x.mat_codi === matCodi);
  if (p) { if (qtd > 0) p.qtds[destId] = qtd; else delete p.qtds[destId]; }
  // Debounce save
  const k = `${matCodi}-${destId}`;
  if (salvarTimeouts.has(k)) clearTimeout(salvarTimeouts.get(k));
  salvarTimeouts.set(k, setTimeout(() => salvarQtd(input, matCodi, destId, qtd), 600));
  atualizarSummary();
}

async function salvarQtd(input, matCodi, destId, qtd) {
  input.classList.remove('dirty');
  input.classList.add('saving');
  try {
    await api('/api/pedidos-distribuidora/qtd', 'PUT', {
      cd_origem: cdOrigemAtual, destino_id: destId, mat_codi: matCodi, qtd,
    });
    input.classList.remove('saving');
    input.classList.add('saved');
    setTimeout(() => input.classList.remove('saved'), 1500);
    if (qtd <= 0) input.classList.add('zero');
  } catch (e) {
    input.classList.remove('saving');
    showMsg('Erro salvando: ' + e.message, 'err');
  }
}

function atualizarSummary() {
  const produtosEditados = produtosAtuais.filter(p => Object.keys(p.qtds || {}).length > 0).length;
  const destinosUsados = new Set();
  let valorTotal = 0;
  for (const p of produtosAtuais) {
    if (!p.preco_admin) continue;
    for (const [destId, qtd] of Object.entries(p.qtds || {})) {
      if (qtd > 0) {
        destinosUsados.add(destId);
        valorTotal += qtd * parseFloat(p.preco_admin);
      }
    }
  }
  document.getElementById('totalProdutos').textContent = produtosEditados;
  document.getElementById('totalPedidos').textContent  = destinosUsados.size;
  document.getElementById('totalValor').textContent    = fmtBRL(valorTotal);
}

async function gerarCsv(btn) {
  if (!cdOrigemAtual) { showMsg('Selecione o CD origem', 'err'); return; }
  if (!confirm('Gerar CSVs com base nas quantidades salvas?')) return;
  btn.disabled = true; btn.textContent = 'Gerando...';
  document.getElementById('downloadArea').style.display = 'none';
  try {
    const body = {
      cd_origem_codigo: cdOrigemAtual,
      observacao: document.getElementById('obs').value.trim() || undefined,
    };
    const r = await api('/api/pedidos-distribuidora', 'POST', body);
    showMsg(`✅ ${r.total_pedidos} pedido(s) · ${fmtBRL(r.valor_total)} · origem: ${r.cd_origem.nome}`, 'ok');
    const t = encodeURIComponent(token());
    document.getElementById('dlPedidos').href = `/api/pedidos-distribuidora/csv/${r.geracao_id}/P_PEDIDOS.csv?token=${t}`;
    document.getElementById('dlItens'  ).href = `/api/pedidos-distribuidora/csv/${r.geracao_id}/P_PEDIDOS_ITENS.csv?token=${t}`;
    document.getElementById('downloadArea').style.display = 'block';
  } catch (e) {
    showMsg('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Gerar CSVs';
  }
}

async function limparTudo() {
  if (!cdOrigemAtual) return;
  if (!confirm('Apagar TODAS as quantidades salvas pra ' + cdOrigemAtual + '?')) return;
  try {
    await api(`/api/pedidos-distribuidora/qtd-tudo?cd_origem=${encodeURIComponent(cdOrigemAtual)}`, 'DELETE');
    showMsg('Rascunho limpo', 'ok');
    recarregarGrade();
  } catch (e) { showMsg(e.message, 'err'); }
}

carregarOrigens();
</script>
</body>
</html>
