<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos pra Distribuidora</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;font-size:11px}
nav{background:#1e293b;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:15px;color:#fde047}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:4px 9px;border-radius:4px;font-size:11px;cursor:pointer;text-decoration:none}
.main{padding:8px 12px}

label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:block}
input,select{background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;padding:4px 7px;font-size:11px}
input:focus,select:focus{outline:none;border-color:#fbbf24}
button{cursor:pointer;border:none;border-radius:4px;font-size:11px;padding:5px 10px;font-weight:600}
.btn-primary{background:#fbbf24;color:#1a1a1a}.btn-primary:hover{background:#f59e0b}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.btn-sm{padding:3px 7px;font-size:10px}

.toolbar{display:flex;gap:8px;align-items:end;padding:8px 10px;background:#1e293b;border:1px solid #334155;border-radius:5px;margin-bottom:8px;flex-wrap:wrap}
.toolbar .grupo{display:flex;flex-direction:column}
.toolbar .grupo input,.toolbar .grupo select{min-width:180px}
.toolbar .check{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;padding-bottom:4px}

.grade-wrap{background:#1e293b;border:1px solid #334155;border-radius:5px;overflow:auto;max-height:calc(100vh - 200px)}
table.grade{border-collapse:separate;border-spacing:0;font-size:10px;font-variant-numeric:tabular-nums;white-space:nowrap}

/* Headers — 2 níveis: grupo (destino/loja) e sub-coluna */
table.grade thead tr.h1 th{background:#0f172a;padding:5px 6px;color:#94a3b8;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.04em;text-align:center;border-bottom:1px solid #1a2744;position:sticky;top:0;z-index:8}
table.grade thead tr.h2 th{background:#0c1628;padding:4px 5px;color:#64748b;font-weight:600;font-size:8px;text-align:center;border-bottom:1px solid #334155;position:sticky;top:24px;z-index:8}

table.grade thead tr.h1 th.grp-loja{background:#0c1a2e;color:#7dd3fc;border-left:2px solid #1e3a5f}
table.grade thead tr.h1 th.grp-cd{background:#1c1300;color:#fcd34d;border-left:2px solid #451a03}
table.grade thead tr.h1 th.grp-vendas{background:#0c2912;color:#86efac;border-left:2px solid #14532d}

table.grade thead tr.h2 th.sub{font-size:8px}

/* Body */
table.grade tbody td{padding:3px 5px;border-bottom:1px solid #1a2744;text-align:center;border-right:1px solid #0f172a;height:24px}
table.grade tbody tr:hover{background:#15233f}
table.grade tbody td.left{text-align:left;color:#cbd5e1}
table.grade tbody td.right{text-align:right}

/* Cols fixas (sticky left) */
table.grade th.fixed,table.grade td.fixed{position:sticky;background:#1e293b;z-index:6}
table.grade thead tr.h1 th.fixed{background:#0f172a !important;z-index:9}
table.grade thead tr.h2 th.fixed{background:#0c1628 !important;z-index:9}
table.grade tbody tr:hover td.fixed{background:#15233f}

th.fix-rk,td.fix-rk{left:0;width:38px;min-width:38px}
th.fix-cod,td.fix-cod{left:38px;width:62px;min-width:62px;text-align:left !important}
th.fix-desc,td.fix-desc{left:100px;width:280px;min-width:280px;text-align:left !important;border-right:1px solid #334155}
th.fix-ref,td.fix-ref{left:380px;width:78px;min-width:78px;text-align:left !important;border-right:2px solid #334155}
th.fix-est,td.fix-est{left:458px;width:55px;min-width:55px;border-right:2px solid #fde04766}
.btn-dbg{background:transparent;border:1px solid #475569;color:#64748b;padding:1px 4px;border-radius:3px;font-size:9px;cursor:pointer}
.btn-dbg:hover{background:#1e293b;color:#94a3b8}
#dbgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#dbgModal.show{display:flex}
#dbgModal .card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:18px;max-width:80vw;max-height:80vh;overflow:auto}
#dbgModal pre{background:#0f172a;padding:10px;border-radius:5px;color:#86efac;font-size:11px;white-space:pre-wrap;word-break:break-all}

td.fix-desc,td.fix-ref{overflow:hidden;text-overflow:ellipsis}
td.fix-cod{font-family:'Cascadia Code',Consolas,monospace;color:#7dd3fc;font-size:10px}
td.fix-rk{color:#94a3b8;font-weight:700;font-size:10px;text-align:center !important}
td.fix-est{color:#fde047;font-weight:600;font-variant-numeric:tabular-nums}

/* Cels de quantidade (input) — sem spinners */
.qtd{width:48px;padding:2px 3px;font-size:10px;text-align:center;background:#0f172a;border:1px solid #1a2744;border-radius:3px;color:#fde047;font-weight:700;-moz-appearance:textfield}
.qtd::-webkit-outer-spin-button,.qtd::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qtd:focus{border-color:#fbbf24;outline:none}
.qtd.dirty{border-color:#fbbf24}
.qtd.saving{border-color:#38bdf8}
.qtd.saved{border-color:#4ade80}
.qtd.zero{color:#475569;font-weight:400}
.qtd.has-value{background:#16a34a !important;color:#fff !important;border-color:#16a34a}

/* Sub-cols de info (não editáveis) */
.cell-num{color:#94a3b8;font-size:10px}
.cell-num.zero{color:#475569}
.cell-num.high{color:#fbbf24}
.cell-sug{color:#a78bfa;font-weight:600}
.cell-sug.has-value{background:#dc2626;color:#fff;font-weight:700}
.cell-est-d{color:#7dd3fc}
.cell-trans{color:#fb923c}
.cell-preco{color:#86efac}
.cell-data{color:#64748b;font-size:9px}
.cell-data.stale{background:#dc2626;color:#fff;font-weight:600}

/* Linha selecionada (igual otimizador) */
table.grade tbody tr:hover,table.grade tbody tr:focus-within{background:#1a2744}
table.grade tbody tr:hover td,table.grade tbody tr:focus-within td{border-bottom-color:#fff}

/* Linha prioritária (sombra suave + tinta sutil) */
table.grade tbody tr.prioritario{box-shadow:inset 3px 0 0 #fbbf24, inset 0 -1px 0 #fbbf2433;background:#1c1c10}
table.grade tbody tr.prioritario:hover{background:#27220e}

/* Botão prioridade */
.btn-prio{background:transparent;border:1px solid #475569;color:#64748b;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;font-family:'Cascadia Code',Consolas,monospace}
.btn-prio:hover{border-color:#fbbf24;color:#fbbf24}
.btn-prio.on{background:#fbbf24;color:#1a1a1a;border-color:#fbbf24}

.muted{color:#64748b}

.msg{padding:6px 10px;border-radius:4px;margin-bottom:6px;font-size:11px;display:none}
.msg.ok{background:#14532d44;color:#4ade80;border:1px solid #14532d;display:block}
.msg.err{background:#7f1d1d44;color:#f87171;border:1px solid #7f1d1d;display:block}

.summary-bar{display:flex;gap:14px;align-items:center;padding:6px 10px;background:#1e293b;border:1px solid #334155;border-radius:5px;margin-top:8px;font-size:11px}
.summary-bar .stat{display:flex;flex-direction:column}
.summary-bar .stat label{font-size:9px;color:#64748b}
.summary-bar .stat span{font-weight:700;color:#fde047;font-size:13px}
.summary-bar .actions{margin-left:auto;display:flex;gap:6px;align-items:center}

.download-bloco{display:flex;gap:8px;margin-top:6px}
.download-bloco a{flex:1;padding:8px 12px;background:#14532d;border-radius:4px;color:#bbf7d0;text-decoration:none;font-size:11px;font-weight:600;text-align:center}
.download-bloco a:hover{background:#166534}

.tag{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase}
.tag-loja{background:#1e3a5f;color:#60a5fa}
.tag-cd{background:#451a03;color:#fde047}
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">JR Lira Tech</a>
  <span style="color:#64748b;font-size:11px">› Pedidos do CD</span>
  <span style="margin-left:auto;color:#475569;font-size:11px" id="nomeUsuario"></span>
  <a href="/" class="btn-nav">Voltar</a>
</nav>

<div class="main">
  <div id="msg" class="msg"></div>

  <div class="toolbar">
    <div class="grupo">
      <label>CD origem</label>
      <select id="cdOrigem" onchange="onOrigemChange()">
        <option value="">Carregando...</option>
      </select>
    </div>
    <div class="grupo">
      <label>Buscar (nome / cod / EAN)</label>
      <input id="busca" placeholder="..." oninput="onBuscaChange()">
    </div>
    <div class="check">
      <input type="checkbox" id="soPedir" onchange="recarregarGrade()"> só com qtd
    </div>
    <div class="grupo">
      <label>Ordem</label>
      <select id="ordem" onchange="recarregarGrade()">
        <option value="descricao">Descrição A-Z</option>
        <option value="ranking">Ranking de vendas</option>
      </select>
    </div>
    <div class="grupo">
      <label>MCP_CODI inicial</label>
      <input id="mcpDe" type="number" placeholder="ex 12000" style="min-width:100px" onchange="recarregarGrade()">
    </div>
    <div class="grupo">
      <label>MCP_CODI final</label>
      <input id="mcpAte" type="number" placeholder="ex 12500" style="min-width:100px" onchange="recarregarGrade()">
    </div>
    <div class="grupo">
      <label>Limit</label>
      <select id="limit" onchange="recarregarGrade()">
        <option value="200">200</option>
        <option value="500" selected>500</option>
        <option value="1000">1000</option>
        <option value="3000">tudo</option>
      </select>
    </div>
    <button class="btn-ghost btn-sm" onclick="limparTudo()">🗑 Limpar rascunho</button>
  </div>

  <div class="grade-wrap" id="gradeWrap">
    <table class="grade">
      <thead id="gradeHead"></thead>
      <tbody id="gradeBody"><tr><td>Selecione um CD origem</td></tr></tbody>
    </table>
  </div>

  <div class="summary-bar">
    <div class="stat"><label>Produtos editados</label><span id="totalProdutos">0</span></div>
    <div class="stat"><label>Pedidos a gerar</label><span id="totalPedidos">0</span></div>
    <div class="stat"><label>Total geral</label><span id="totalValor">R$ 0,00</span></div>
    <div class="actions">
      <input id="obs" placeholder="Observação" style="width:200px">
      <button class="btn-primary" onclick="gerarCsv(this)">Gerar CSVs</button>
    </div>
  </div>

  <div id="downloadArea" style="display:none">
    <div class="download-bloco">
      <a id="dlPedidos"   target="_blank">⬇ P_PEDIDOS.csv</a>
      <a id="dlItens"     target="_blank">⬇ P_PEDIDOS_ITENS.csv</a>
    </div>
  </div>
</div>

<div id="dbgModal" onclick="if(event.target===this)fecharDbg()">
  <div class="card">
    <h3 style="color:#fde047;margin-bottom:10px;font-size:14px">Debug do produto</h3>
    <pre id="dbgContent">carregando...</pre>
    <button class="btn-ghost btn-sm" onclick="fecharDbg()" style="margin-top:10px">Fechar</button>
  </div>
</div>

<script>
const token = () => localStorage.getItem('jrlira_token');
(function(){ const p = localStorage.getItem('jrlira_perfil'); if (!token() || !['admin','ceo'].includes(p)) location.href = '/'; })();
document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

let cdOrigemAtual = null;
let destinosAtuais = [];
let produtosAtuais = [];
let buscaTimeout = null;
let salvarTimeouts = new Map();

function showMsg(txt, tipo = 'ok') {
  const el = document.getElementById('msg');
  el.className = 'msg ' + tipo;
  el.textContent = txt;
  setTimeout(() => { if (tipo !== 'err') { el.className='msg'; el.textContent=''; } }, 4500);
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtBRL(n) { return Number(n || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
function fmtNum(n, cas=0) { if (n == null || n === '') return ''; const x = Number(n); return isNaN(x) ? '' : x.toLocaleString('pt-BR', { minimumFractionDigits: cas, maximumFractionDigits: cas }); }
function fmtData(d) { if (!d) return ''; return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }); }

async function api(path, method = 'GET', body) {
  const r = await fetch(path, {
    method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.erro || `HTTP ${r.status}`);
  return data;
}

async function carregarOrigens() {
  try {
    const cds = await api('/api/pedidos-distribuidora/cds-origem');
    const sel = document.getElementById('cdOrigem');
    if (!cds.length) { sel.innerHTML = '<option value="">Nenhum CD ativo</option>'; return; }
    sel.innerHTML = '<option value="">Selecione...</option>' +
      cds.map(c => `<option value="${escapeHtml(c.codigo)}">${escapeHtml(c.nome)} (${escapeHtml(c.codigo)})</option>`).join('');
  } catch (e) { showMsg(e.message, 'err'); }
}

function onOrigemChange() {
  const codigo = document.getElementById('cdOrigem').value;
  cdOrigemAtual = codigo || null;
  document.getElementById('downloadArea').style.display = 'none';
  if (cdOrigemAtual) recarregarGrade();
  else { document.getElementById('gradeHead').innerHTML = ''; document.getElementById('gradeBody').innerHTML = '<tr><td>Selecione um CD origem</td></tr>'; }
}

function onBuscaChange() {
  clearTimeout(buscaTimeout);
  buscaTimeout = setTimeout(recarregarGrade, 350);
}

async function recarregarGrade() {
  if (!cdOrigemAtual) return;
  const busca = document.getElementById('busca').value.trim();
  const soPedir = document.getElementById('soPedir').checked;
  const limit = document.getElementById('limit').value;
  const ordem = document.getElementById('ordem').value;
  const mcpDe  = document.getElementById('mcpDe').value;
  const mcpAte = document.getElementById('mcpAte').value;
  let url = `/api/pedidos-distribuidora/grade?cd_origem=${encodeURIComponent(cdOrigemAtual)}&busca=${encodeURIComponent(busca)}&so_pedir=${soPedir}&limit=${limit}&ordem=${encodeURIComponent(ordem)}`;
  if (mcpDe)  url += `&mcp_de=${encodeURIComponent(mcpDe)}`;
  if (mcpAte) url += `&mcp_ate=${encodeURIComponent(mcpAte)}`;
  document.getElementById('gradeBody').innerHTML = '<tr><td>Carregando...</td></tr>';
  try {
    const r = await api(url);
    destinosAtuais = r.destinos;
    produtosAtuais = r.produtos;
    renderHead();
    renderBody();
    atualizarSummary();
  } catch (e) { showMsg(e.message, 'err'); }
}

function siglaDestino(d) {
  if (d.codigo.startsWith('LOJA')) {
    const map = { LOJA1:'EC', LOJA2:'BR', LOJA3:'JP', LOJA4:'FL', LOJA5:'SJ', LOJA6:'STM' };
    return map[d.codigo] || d.codigo;
  }
  if (d.cd_codigo === 'srv1-nprogresso') return 'NP';
  if (d.cd_codigo === 'srv2-asafrio')    return 'AF-ITB';
  if (d.cd_codigo === 'srv2-asasantarem') return 'AF-STM';
  return d.codigo.slice(-6);
}

function renderHead() {
  const lojas = destinosAtuais.filter(d => d.tipo === 'LOJA');
  const cds   = destinosAtuais.filter(d => d.tipo === 'CD');
  const allDest = [...lojas, ...cds];

  // H1: cabeçalho de grupos (1 col por destino, colspan=4)
  let h1 = `
    <th class="fixed fix-rk" rowspan="2">RK</th>
    <th class="fixed fix-cod" rowspan="2">COD</th>
    <th class="fixed fix-desc" rowspan="2">DESCRIÇÃO</th>
    <th class="fixed fix-ref" rowspan="2">REF</th>
    <th class="fixed fix-est" rowspan="2" title="Estoque do CD origem (em unidades)">EST DIST</th>
  `;
  for (const d of allDest) {
    const cls = d.tipo === 'CD' ? 'grp-cd' : 'grp-loja';
    h1 += `<th class="${cls}" colspan="4" title="${escapeHtml(d.nome)}">${escapeHtml(siglaDestino(d))}</th>`;
  }
  // Vendas só pras lojas
  for (const d of lojas) {
    h1 += `<th class="grp-vendas" colspan="3" title="Vendas: ${escapeHtml(d.nome)}">${escapeHtml(siglaDestino(d))} V</th>`;
  }

  // H2: sub-cols
  let h2 = '';
  for (const d of allDest) h2 += `<th class="sub" title="Estoque (CX)">E</th><th class="sub" title="Trânsito (CX)">T</th><th class="sub" title="Sugestão 35d (CX)">S</th><th class="sub" title="Sug. Editada (CX) — vai pro CSV">QTD</th>`;
  for (const d of lojas) h2 += `<th class="sub" title="Média 28d">M28</th><th class="sub" title="Preço atual">$</th><th class="sub" title="Última venda">ULT</th>`;

  document.getElementById('gradeHead').innerHTML = `<tr class="h1">${h1}</tr><tr class="h2">${h2}</tr>`;
}

function renderBody() {
  if (!produtosAtuais.length) {
    const colspan = 6 + destinosAtuais.length * 4 + destinosAtuais.filter(d=>d.tipo==='LOJA').length * 3;
    document.getElementById('gradeBody').innerHTML = `<tr><td colspan="${colspan}" class="muted">Nada encontrado</td></tr>`;
    return;
  }
  const lojas = destinosAtuais.filter(d => d.tipo === 'LOJA');
  const cds   = destinosAtuais.filter(d => d.tipo === 'CD');
  const allDest = [...lojas, ...cds];

  document.getElementById('gradeBody').innerHTML = produtosAtuais.map(p => {
    const cells = [];

    // Fixos
    const codSemZeros = String(p.mat_codi || '').replace(/^0+/, '') || '0';
    const prioCls = p.prioritario ? ' on' : '';
    cells.push(`<td class="fixed fix-rk">${p.ranking || ''}</td>`);
    cells.push(`<td class="fixed fix-cod"><button class="btn-prio${prioCls}" onclick="togglePrio('${escapeHtml(p.mat_codi)}', this)" title="Marcar como prioritário">P</button> ${escapeHtml(codSemZeros)}</td>`);
    cells.push(`<td class="fixed fix-desc" title="${escapeHtml(p.descricao)}">${escapeHtml(p.descricao)}</td>`);
    cells.push(`<td class="fixed fix-ref muted" style="font-size:10px">${escapeHtml(p.referencia || '')}</td>`);
    cells.push(`<td class="fixed fix-est">${fmtNum(p.est_dist)}</td>`);

    // Por destino: 4 sub-cols (E, T, S, QTD)
    for (const d of allDest) {
      const dt = p.destinos[d.id] || {};
      const e  = Math.floor(parseFloat(dt.estoque_cx)  || 0);
      const t  = Math.floor(parseFloat(dt.transito_cx) || 0);
      const s  = Math.floor(parseFloat(dt.sugestao_cx) || 0);
      const q  = dt.sug_editada || '';
      cells.push(`<td class="cell-num cell-est-d ${e?'':'zero'}">${e}</td>`);
      cells.push(`<td class="cell-num cell-trans ${t?'':'zero'}">${t}</td>`);
      cells.push(`<td class="cell-num cell-sug ${s?'has-value':'zero'}">${s}</td>`);
      cells.push(`<td><input class="qtd ${q && parseFloat(q)>0?'has-value':'zero'}" data-mat="${escapeHtml(p.mat_codi)}" data-dest="${d.id}" value="${q}" type="number" min="0" step="any" oninput="onQtdInput(this)"></td>`);
    }

    // Vendas (só lojas): M28, $, ULT
    const HOJE = new Date();
    for (const d of lojas) {
      const v = p.vendas[d.loja_id] || {};
      const m = v.media_28d != null ? Number(v.media_28d).toFixed(1) : '';
      const pr = v.preco_atual ? fmtBRL(v.preco_atual) : '';
      const ult = fmtData(v.ultima_venda);
      let staleCls = '';
      if (v.ultima_venda) {
        const diasSemVenda = Math.floor((HOJE - new Date(v.ultima_venda)) / 86400000);
        if (diasSemVenda > 10) staleCls = ' stale';
      } else if (v.media_28d != null) {
        // tem cadastro na loja mas sem venda recente — considera stale
        staleCls = ' stale';
      }
      cells.push(`<td class="cell-num">${m}</td>`);
      cells.push(`<td class="cell-num cell-preco">${pr}</td>`);
      cells.push(`<td class="cell-data${staleCls}">${ult}</td>`);
    }

    return `<tr class="${p.prioritario?'prioritario':''}" data-mat="${escapeHtml(p.mat_codi)}">${cells.join('')}</tr>`;
  }).join('');
}

async function togglePrio(matCodi, btn) {
  try {
    const r = await api('/api/pedidos-distribuidora/prioridade', 'PUT', { cd_origem: cdOrigemAtual, mat_codi: matCodi });
    btn.classList.toggle('on', r.prioritario);
    const tr = btn.closest('tr');
    if (tr) tr.classList.toggle('prioritario', r.prioritario);
    const p = produtosAtuais.find(x => x.mat_codi === matCodi);
    if (p) p.prioritario = r.prioritario;
  } catch (e) { showMsg(e.message, 'err'); }
}

function onQtdInput(input) {
  input.classList.add('dirty');
  input.classList.remove('saved', 'zero', 'has-value');
  const matCodi = input.dataset.mat;
  const destId  = parseInt(input.dataset.dest);
  const qtd     = parseFloat(input.value) || 0;
  if (qtd > 0) input.classList.add('has-value');
  else input.classList.add('zero');
  const p = produtosAtuais.find(x => x.mat_codi === matCodi);
  if (p) {
    if (!p.destinos[destId]) p.destinos[destId] = {};
    p.destinos[destId].sug_editada = qtd;
  }
  const k = `${matCodi}-${destId}`;
  if (salvarTimeouts.has(k)) clearTimeout(salvarTimeouts.get(k));
  salvarTimeouts.set(k, setTimeout(() => salvarQtd(input, matCodi, destId, qtd), 600));
  atualizarSummary();
}

async function salvarQtd(input, matCodi, destId, qtd) {
  input.classList.remove('dirty');
  input.classList.add('saving');
  try {
    await api('/api/pedidos-distribuidora/qtd', 'PUT', {
      cd_origem: cdOrigemAtual, destino_id: destId, mat_codi: matCodi, qtd,
    });
    input.classList.remove('saving');
    input.classList.add('saved');
    setTimeout(() => input.classList.remove('saved'), 1500);
    if (qtd <= 0) { input.classList.add('zero'); input.classList.remove('has-value'); }
    else { input.classList.add('has-value'); input.classList.remove('zero'); }
  } catch (e) {
    input.classList.remove('saving');
    showMsg('Erro: ' + e.message, 'err');
  }
}

function atualizarSummary() {
  let editados = 0;
  const destinosUsados = new Set();
  let valorTotal = 0;
  for (const p of produtosAtuais) {
    const preco = parseFloat(p.preco_admin) || 0;
    const qtdEmb = parseInt(p.qtd_embalagem) || 1;
    let teve = false;
    for (const [destId, dt] of Object.entries(p.destinos || {})) {
      const q = parseFloat(dt.sug_editada) || 0;
      if (q > 0) {
        teve = true;
        destinosUsados.add(destId);
        // valor estimado = qtd (CX) × qtd_embalagem × preco_admin (preco é por unidade)
        valorTotal += q * qtdEmb * preco;
      }
    }
    if (teve) editados++;
  }
  document.getElementById('totalProdutos').textContent = editados;
  document.getElementById('totalPedidos').textContent  = destinosUsados.size;
  document.getElementById('totalValor').textContent    = fmtBRL(valorTotal);
}

async function gerarCsv(btn) {
  if (!cdOrigemAtual) { showMsg('Selecione o CD origem', 'err'); return; }
  if (!confirm('Gerar CSVs com base nas quantidades salvas?')) return;
  btn.disabled = true; btn.textContent = 'Gerando...';
  document.getElementById('downloadArea').style.display = 'none';
  try {
    const body = {
      cd_origem_codigo: cdOrigemAtual,
      observacao: document.getElementById('obs').value.trim() || undefined,
    };
    const r = await api('/api/pedidos-distribuidora', 'POST', body);
    showMsg(`✅ ${r.total_pedidos} pedido(s) · ${fmtBRL(r.valor_total)} · origem: ${r.cd_origem.nome}`, 'ok');
    const t = encodeURIComponent(token());
    document.getElementById('dlPedidos').href = `/api/pedidos-distribuidora/csv/${r.geracao_id}/P_PEDIDOS.csv?token=${t}`;
    document.getElementById('dlItens').href   = `/api/pedidos-distribuidora/csv/${r.geracao_id}/P_PEDIDOS_ITENS.csv?token=${t}`;
    document.getElementById('downloadArea').style.display = 'block';
  } catch (e) { showMsg('❌ ' + e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Gerar CSVs'; }
}

async function debugProduto(matCodi) {
  document.getElementById('dbgModal').classList.add('show');
  document.getElementById('dbgContent').textContent = 'carregando...';
  try {
    const [r, t] = await Promise.all([
      api(`/api/pedidos-distribuidora/grade-debug?cd_origem=${encodeURIComponent(cdOrigemAtual)}&mat_codi=${encodeURIComponent(matCodi)}`),
      api(`/api/pedidos-distribuidora/grade-trace?cd_origem=${encodeURIComponent(cdOrigemAtual)}&mat_codi=${encodeURIComponent(matCodi)}`),
    ]);
    document.getElementById('dbgContent').textContent =
      '=== GRADE-TRACE (caminho do /grade) ===\n' + JSON.stringify(t, null, 2) +
      '\n\n=== GRADE-DEBUG (info bruta) ===\n' + JSON.stringify(r, null, 2);
  } catch (e) {
    document.getElementById('dbgContent').textContent = 'ERRO: ' + e.message;
  }
}
function fecharDbg() { document.getElementById('dbgModal').classList.remove('show'); }

async function limparTudo() {
  if (!cdOrigemAtual) return;
  if (!confirm('Apagar TODAS as quantidades salvas pra ' + cdOrigemAtual + '?')) return;
  try {
    await api(`/api/pedidos-distribuidora/qtd-tudo?cd_origem=${encodeURIComponent(cdOrigemAtual)}`, 'DELETE');
    showMsg('Rascunho limpo', 'ok');
    recarregarGrade();
  } catch (e) { showMsg(e.message, 'err'); }
}

carregarOrigens();
