<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR Lira Tech — Layout Por Perfil (TESTE)</title>
<link rel="stylesheet" href="/shared.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }
.dashboard { max-width: 1200px; margin: 0 auto; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.dash-brand { font-family: 'Segoe UI Black', 'Segoe UI', sans-serif; font-weight: 900; font-size: 24px; color: #38bdf8; letter-spacing: -0.5px; }
.dash-user { font-size: 12px; color: #475569; margin-top: 2px; }

.aviso { background: #1e293b; border: 1px solid #f59e0b; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #fbbf24; margin-bottom: 16px; }

.perfil-switch { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
.perfil-btn { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #e2e8f0; cursor: pointer; transition: all .15s; }
.perfil-btn:hover { background: #273549; border-color: #475569; }
.perfil-btn.ativa { background: #0ea5e9; border-color: #0ea5e9; color: #fff; font-weight: 600; }

.grupo { margin-bottom: 24px; border: 2px solid; border-radius: 12px; padding: 14px 16px 16px 16px; position: relative; background: rgba(30, 41, 59, 0.3); }
.grupo-titulo { position: absolute; top: -11px; left: 16px; padding: 0 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: #0f172a; }

.grupo.rh           { border-color: #3b82f6; } .grupo.rh .grupo-titulo           { color: #60a5fa; } .grupo.rh .card .ic svg           { color: #60a5fa; }
.grupo.pedidos      { border-color: #10b981; } .grupo.pedidos .grupo-titulo      { color: #34d399; } .grupo.pedidos .card .ic svg      { color: #34d399; }
.grupo.notas        { border-color: #f97316; } .grupo.notas .grupo-titulo        { color: #fb923c; } .grupo.notas .card .ic svg        { color: #fb923c; }
.grupo.transferencias { border-color: #a855f7; } .grupo.transferencias .grupo-titulo { color: #c084fc; } .grupo.transferencias .card .ic svg { color: #c084fc; }
.grupo.auditoria    { border-color: #ef4444; } .grupo.auditoria .grupo-titulo    { color: #f87171; } .grupo.auditoria .card .ic svg    { color: #f87171; }
.grupo.admin        { border-color: #64748b; } .grupo.admin .grupo-titulo        { color: #94a3b8; } .grupo.admin .card .ic svg        { color: #94a3b8; }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.card { background: #1e293b; border-radius: 10px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; color: inherit; border: 1px solid transparent; transition: background .2s, border-color .2s; text-align: center; position: relative; }
.card:hover { background: #273549; border-color: #334155; }
.card .ic { background: #0f2a3f; border-radius: 8px; padding: 10px; display: flex; align-items: center; justify-content: center; }
.card .ic svg { color: #38bdf8; width: 22px; height: 22px; }
.card-title { font-size: 12px; font-weight: 600; color: #e2e8f0; line-height: 1.25; }
.card-desc { font-size: 10px; color: #64748b; line-height: 1.3; }
.badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; font-size: 11px; font-weight: 700; min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; padding: 0 6px; box-shadow: 0 2px 6px rgba(239,68,68,.5); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.card.com-pendencia .ic svg { color: #f87171; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-brand">JR Lira Tech</div>
      <div class="dash-user">Layout em teste — preview por perfil</div>
    </div>
    <a class="logout-btn" href="/" style="font-size: 12px; color: #475569; cursor: pointer; text-decoration: none;">← Voltar</a>
  </div>

  <div class="aviso">🧪 <b>PREVIEW POR PERFIL</b> — Clique nos botões abaixo pra ver o que cada usuário veria. Badges são mockados.</div>

  <div class="perfil-switch">
    <button class="perfil-btn ativa" data-perfil="admin">Admin</button>
    <button class="perfil-btn" data-perfil="rh">RH</button>
    <button class="perfil-btn" data-perfil="cadastro">Cadastro</button>
    <button class="perfil-btn" data-perfil="estoque">Estoque</button>
    <button class="perfil-btn" data-perfil="comprador">Comprador</button>
    <button class="perfil-btn" data-perfil="auditor">Auditor</button>
  </div>

  <div id="layout"></div>
</div>

<script>
// estrutura: cada grupo tem cards, e cada card declara perfis que veem
// pendencias mockadas pra preview
const GRUPOS = [
  { id: 'rh', titulo: 'Recursos Humanos', classe: 'rh', cards: [
    { href: '/rh', icon: 'users', title: 'Quadro de Lotação', desc: 'Funcionários e histórico', perfis: ['admin','rh'] },
    { href: '/rh-painel', icon: 'gauge', title: 'Painel RH', desc: 'Indicadores e absenteísmo', perfis: ['admin','rh'] },
    { href: '/ponto', icon: 'clock', title: 'Controle de Ponto', desc: 'Importação iPonto', perfis: ['admin','rh'] },
  ]},
  { id: 'pedidos', titulo: 'Pedidos Fornecedores · fluxo operacional', classe: 'pedidos', cards: [
    { href: '/fornecedores', icon: 'building-2', title: 'Fornecedores', desc: 'Cadastro e aprovações', perfis: ['admin','comprador'] },
    { href: '/sugestao-compras', icon: 'trending-up', title: 'Sugestão de Compras', desc: 'Reposição proativa', perfis: ['admin','comprador'] },
    { href: '/pedidos-comprador', icon: 'shopping-cart', title: 'Pedidos', desc: 'Validação e PDF', perfis: ['admin','comprador'] },
    { href: '/auditoria-pedidos', icon: 'shield-check', title: 'Auditoria de Pedidos', desc: 'Liberar acima da sugestão', perfis: ['admin','auditor'], pendencia: 3 },
    { href: '/notas-comprador', icon: 'file-check', title: 'NF-e Fornecedor', desc: 'Importar XMLs e vincular', perfis: ['admin','comprador'] },
    { href: '/contas-receber', icon: 'receipt', title: 'Contas a Receber', desc: 'Devoluções e bonificações', perfis: ['admin','comprador'] },
  ]},
  { id: 'notas', titulo: 'Notas de Entrada · cadastro → estoque → auditoria', classe: 'notas', cards: [
    { href: '/notas-cadastro', icon: 'file-text', title: 'Cadastro', desc: 'NF-e dos fornecedores', perfis: ['admin','cadastro'] },
    { href: '/notas-estoque', icon: 'package', title: 'Estoque', desc: 'Conferência às cegas', perfis: ['admin','estoque'] },
    { href: '/notas-auditoria', icon: 'clipboard-check', title: 'Auditoria', desc: 'Fechamento de notas', perfis: ['admin','auditor'], pendencia: 7 },
  ]},
  { id: 'transferencias', titulo: 'Transferências CD / Lojas', classe: 'transferencias', cards: [
    { href: '/notas-transferencias-cadastro', icon: 'truck', title: 'Cadastro', desc: 'Transferências CD/lojas', perfis: ['admin','cadastro'] },
    { href: '/notas-distribuidora', icon: 'package-plus', title: 'Distribuidora', desc: 'Conferência de transferências', perfis: ['admin','estoque'] },
    { href: '/notas-cd', icon: 'route', title: 'Acompanhar CD', desc: 'Transferências CD/lojas', perfis: ['admin','comprador'] },
  ]},
  { id: 'auditoria', titulo: 'Auditoria & Qualidade', classe: 'auditoria', cards: [
    { href: '/auditagem-divergencias', icon: 'alert-triangle', title: 'Divergências CD', desc: 'Faltas/sobras na conferência', perfis: ['admin','auditor'], pendencia: 5 },
    { href: '/validades-em-risco', icon: 'calendar-clock', title: 'Validades em Risco', desc: 'Decisão admin', perfis: ['admin','auditor'], pendencia: 12 },
    { href: '/aguardando-devolucao', icon: 'undo-2', title: 'Aguardando Devolução', desc: 'Anexar XML', perfis: ['admin','cadastro'], pendencia: 2 },
    { href: '/devolucoes-divergencias', icon: 'trending-down', title: 'Divergências Devolução', desc: 'NF devolução vs esperado', perfis: ['admin','auditor'] },
    { href: '/auditoria-acordos', icon: 'handshake', title: 'Auditoria Acordos', desc: 'Resumo aprovações', perfis: ['admin','auditor'], pendencia: 'NOVO' },
  ]},
  { id: 'admin', titulo: 'Cadastros / Admin', classe: 'admin', cards: [
    { href: '/produtos-embalagem', icon: 'box', title: 'Cadastro CD', desc: 'Quantidade por embalagem', perfis: ['admin'] },
    { href: '/embalagens-fornecedor', icon: 'package-search', title: 'Embalagens Fornec', desc: 'Sugestões via NF-e', perfis: ['admin'] },
    { href: '/usuarios', icon: 'shield', title: 'Usuários', desc: 'Perfis de acesso', perfis: ['admin'] },
  ]},
];

function renderLayout(perfil) {
  const container = document.getElementById('layout');
  container.innerHTML = '';
  for (const grupo of GRUPOS) {
    const cards = grupo.cards.filter(c => c.perfis.includes(perfil));
    if (!cards.length) continue;
    const grupoEl = document.createElement('div');
    grupoEl.className = `grupo ${grupo.classe}`;
    grupoEl.innerHTML = `<div class="grupo-titulo">${grupo.titulo}</div><div class="cards">${
      cards.map(c => `
        <a class="card${c.pendencia ? ' com-pendencia' : ''}" href="${c.href}">
          ${c.pendencia ? `<span class="badge">${c.pendencia}</span>` : ''}
          <div class="ic"><i data-lucide="${c.icon}"></i></div>
          <div>
            <div class="card-title">${c.title}</div>
            <div class="card-desc">${c.desc}</div>
          </div>
        </a>`).join('')
    }</div>`;
    container.appendChild(grupoEl);
  }
  lucide.createIcons();
}

document.querySelectorAll('.perfil-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.perfil-btn').forEach(b => b.classList.remove('ativa'));
    btn.classList.add('ativa');
    renderLayout(btn.dataset.perfil);
  });
});

renderLayout('admin');
</script>
</body>
</html>
