<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas Emergenciais</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:18px;color:#38bdf8}
.nav-user{margin-left:auto;font-size:12px;color:#475569}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.main{padding:18px 20px;max-width:1500px;margin:0 auto}
input,select{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 11px;font-size:13px}
input:focus,select:focus{outline:none;border-color:#38bdf8}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.filtros{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;padding:14px;background:#1e293b;border-radius:10px}
.filtros label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#1e293b;border-radius:10px;padding:14px;border-left:4px solid #475569}
.kpi.warn{border-left-color:#fbbf24}.kpi.danger{border-left-color:#ef4444}.kpi.info{border-left-color:#38bdf8}.kpi.violet{border-left-color:#a78bfa}
.kpi .label{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:700;letter-spacing:.04em}
.kpi .v{font-size:24px;font-weight:900;color:#e2e8f0;margin-top:6px}
.kpi .extra{font-size:11px;color:#64748b;margin-top:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media (max-width:1000px){.row2{grid-template-columns:1fr}}
.painel{background:#1e293b;border-radius:10px;padding:16px;margin-bottom:18px}
.painel-titulo{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0f172a;padding:8px 10px;text-align:center;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
thead th.left{text-align:left}
tbody td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
tbody td.right{text-align:right;font-variant-numeric:tabular-nums}
tbody td.center{text-align:center}
tbody tr:hover{background:#1a2744;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.b-emergencial_pendente{background:#451a03;color:#fbbf24}
.b-importada{background:#1e3a5f;color:#60a5fa}
.b-em_validacao_cadastro{background:#312e81;color:#a5b4fc}
.b-validada{background:#1a4731;color:#34d399}
.b-recebida{background:#075985;color:#bae6fd}
.b-em_conferencia{background:#14532d;color:#4ade80}
.b-em_auditoria{background:#78350f;color:#fbbf24}
.b-fechada{background:#1e293b;color:#475569}
.empty{text-align:center;color:#475569;padding:40px;font-size:13px}
</style>
</head>
<body>
<nav>
  <span class="brand">JR Lira Tech</span>
  <span style="color:#475569">/</span>
  <span style="font-size:13px;color:#94a3b8">Notas Emergenciais</span>
  <span class="nav-user" id="nomeUsuario"></span>
  <button class="btn-nav" onclick="location.href='/'">← Início</button>
</nav>

<div class="main">
  <div class="filtros">
    <div>
      <label>Loja</label>
      <select id="filtroLoja"><option value="">Todas</option></select>
    </div>
    <div>
      <label>Emissão de</label>
      <input type="date" id="filtroDataIni">
    </div>
    <div>
      <label>até</label>
      <input type="date" id="filtroDataFim">
    </div>
    <div>
      <label>Fornecedor</label>
      <input type="text" id="filtroFornecedor" placeholder="Nome ou CNPJ">
    </div>
    <div>
      <label>Comprador</label>
      <input type="text" id="filtroComprador" placeholder="Usuário">
    </div>
    <div>
      <label>Status</label>
      <select id="filtroStatus">
        <option value="todas">Todas</option>
        <option value="pendentes">Pendentes aprovação</option>
        <option value="aprovadas">Aprovadas</option>
      </select>
    </div>
    <button class="btn-primary" onclick="carregar()">Atualizar</button>
    <button class="btn-ghost" onclick="limparFiltros()">Limpar</button>
  </div>

  <div id="kpis" class="kpis"></div>

  <div class="row2">
    <div class="painel">
      <div class="painel-titulo">Por Fornecedor (Top 30)</div>
      <div style="overflow-x:auto;max-height:380px"><table id="tabelaForn"></table></div>
    </div>
    <div class="painel">
      <div class="painel-titulo">Por Comprador (Top 30)</div>
      <div style="overflow-x:auto;max-height:380px"><table id="tabelaComp"></table></div>
    </div>
  </div>

  <div class="painel">
    <div class="painel-titulo">Por Loja</div>
    <div style="overflow-x:auto"><table id="tabelaLoja"></table></div>
  </div>

  <div class="painel">
    <div class="painel-titulo" id="tituloNotas">Notas emergenciais</div>
    <div style="overflow-x:auto"><table id="tabelaNotas"></table></div>
  </div>
</div>

<script>
const STATUS_LABEL = {
  importada:'Importada', emergencial_pendente:'Pendente', em_validacao_cadastro:'Validação Cadastro',
  validada:'Validada', recebida:'Recebida', em_conferencia:'Conferência',
  em_auditoria:'Auditoria', aguardando_admin_validade:'Aguardando Admin',
  aguardando_devolucao:'Devolução', fechada:'Fechada', cancelada:'Cancelada'
};
document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';
(function popularLojas(){
  const sel = document.getElementById('filtroLoja');
  Object.entries(LOJAS).forEach(([id,nome])=>{
    const o = document.createElement('option'); o.value = id; o.textContent = `${id} — ${nome}`; sel.appendChild(o);
  });
})();

function limparFiltros(){
  document.getElementById('filtroLoja').value='';
  document.getElementById('filtroDataIni').value='';
  document.getElementById('filtroDataFim').value='';
  document.getElementById('filtroFornecedor').value='';
  document.getElementById('filtroComprador').value='';
  document.getElementById('filtroStatus').value='todas';
  carregar();
}

async function carregar(){
  const params = new URLSearchParams();
  const loja = document.getElementById('filtroLoja').value;
  const di = document.getElementById('filtroDataIni').value;
  const df = document.getElementById('filtroDataFim').value;
  const fn = document.getElementById('filtroFornecedor').value.trim();
  const cp = document.getElementById('filtroComprador').value.trim();
  const st = document.getElementById('filtroStatus').value;
  if (loja) params.set('loja', loja);
  if (di) params.set('dataIni', di);
  if (df) params.set('dataFim', df);
  if (fn) params.set('fornecedor', fn);
  if (cp) params.set('comprador', cp);
  if (st) params.set('statusFiltro', st);

  document.getElementById('kpis').innerHTML = '<div class="empty">Carregando...</div>';

  try {
    const r = await apiFetch('/api/dashboard/emergenciais?'+params.toString());
    const data = await r.json();
    if (!r.ok) throw new Error(data.erro || 'Erro');
    renderKpis(data.kpis, data.totais_gerais);
    renderForn(data.por_fornecedor);
    renderComp(data.por_comprador);
    renderLoja(data.por_loja);
    renderNotas(data.notas);
  } catch (e) {
    document.getElementById('kpis').innerHTML = `<div class="empty" style="color:#f87171">${escapeHtml(e.message)}</div>`;
  }
}

function renderKpis(k, totais){
  if (!k) return;
  const pctNotas = totais && totais.qtd_total > 0 ? (k.qtd / totais.qtd_total * 100).toFixed(1) : '0';
  const pctValor = totais && Number(totais.valor_total) > 0 ? (Number(k.valor) / Number(totais.valor_total) * 100).toFixed(1) : '0';
  document.getElementById('kpis').innerHTML = `
    <div class="kpi violet"><div class="label">Notas emergenciais</div><div class="v">${(k.qtd||0).toLocaleString('pt-BR')}</div><div class="extra">${pctNotas}% do total no filtro</div></div>
    <div class="kpi violet"><div class="label">Valor</div><div class="v">R$ ${fmtMoeda(k.valor||0)}</div><div class="extra">${pctValor}% do total</div></div>
    <div class="kpi warn"><div class="label">Aguardando aprovação</div><div class="v">${(k.qtd_pendentes||0).toLocaleString('pt-BR')}</div><div class="extra">R$ ${fmtMoeda(k.valor_pendente||0)}</div></div>
    <div class="kpi info"><div class="label">Fornecedores</div><div class="v">${(k.qtd_fornecedores||0).toLocaleString('pt-BR')}</div></div>
    <div class="kpi info"><div class="label">Compradores</div><div class="v">${(k.qtd_compradores||0).toLocaleString('pt-BR')}</div></div>
  `;
}

function renderForn(arr){
  const t = document.getElementById('tabelaForn');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  const head = `<thead><tr><th class="left">Fornecedor</th><th>Notas</th><th>Valor</th></tr></thead>`;
  const body = arr.map(r=>`
    <tr onclick="filtrarFornecedor('${escapeHtml(r.fornecedor_cnpj||r.fornecedor_nome||'')}')">
      <td class="left">${escapeHtml(r.fornecedor_nome||'')}<div style="font-size:10px;color:#475569;font-family:monospace">${escapeHtml(r.fornecedor_cnpj||'')}</div></td>
      <td class="center" style="font-weight:700">${r.qtd}</td>
      <td class="right">R$ ${fmtMoeda(r.valor)}</td>
    </tr>`).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}
function filtrarFornecedor(s){ document.getElementById('filtroFornecedor').value=s; carregar(); }

function renderComp(arr){
  const t = document.getElementById('tabelaComp');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  const head = `<thead><tr><th class="left">Comprador</th><th>Notas</th><th>Valor</th></tr></thead>`;
  const body = arr.map(r=>`
    <tr onclick="filtrarComprador('${escapeHtml(r.comprador||'')}')">
      <td class="left">${escapeHtml(r.comprador||'')}</td>
      <td class="center" style="font-weight:700">${r.qtd}</td>
      <td class="right">R$ ${fmtMoeda(r.valor)}</td>
    </tr>`).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}
function filtrarComprador(s){ document.getElementById('filtroComprador').value=s; carregar(); }

function renderLoja(arr){
  const t = document.getElementById('tabelaLoja');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  const head = `<thead><tr><th class="left">Loja</th><th>Notas</th><th>Valor</th></tr></thead>`;
  const body = arr.map(r=>`
    <tr onclick="filtrarLoja(${r.loja_id||''})">
      <td class="left">${escapeHtml(r.loja_nome||'')}</td>
      <td class="center" style="font-weight:700">${r.qtd}</td>
      <td class="right">R$ ${fmtMoeda(r.valor)}</td>
    </tr>`).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}
function filtrarLoja(id){ document.getElementById('filtroLoja').value=id||''; carregar(); }

function renderNotas(arr){
  document.getElementById('tituloNotas').textContent = `Notas emergenciais (${arr.length})`;
  const t = document.getElementById('tabelaNotas');
  if (!arr.length) { t.innerHTML='<thead><tr><th>Sem notas</th></tr></thead>'; return; }
  const head = `<thead><tr>
    <th class="left">Nº</th><th class="left">Fornecedor</th><th class="left">Loja</th>
    <th class="left">Comprador</th><th>Emissão</th><th>Importada</th><th>Status</th><th>Valor</th>
  </tr></thead>`;
  const body = arr.map(n=>`
    <tr onclick="abrirNota(${n.id}, '${n.status}')">
      <td class="left" style="font-family:monospace;color:#38bdf8;font-weight:700">${escapeHtml(n.numero_nota||'')}</td>
      <td class="left">${escapeHtml(n.fornecedor_nome||'')}</td>
      <td class="left">${escapeHtml(n.loja_nome||'')}</td>
      <td class="left">${escapeHtml(n.importado_por||'')}</td>
      <td class="center">${fmtData(n.data_emissao)}</td>
      <td class="center">${fmtData(n.importado_em)}</td>
      <td class="center"><span class="badge b-${n.status}">${STATUS_LABEL[n.status]||n.status}</span></td>
      <td class="right">R$ ${fmtMoeda(n.valor_total)}</td>
    </tr>`).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}
function abrirNota(id, status){
  if (status === 'emergencial_pendente') location.href = '/notas-comprador?nota=' + id;
  else location.href = '/notas-cadastro?nota=' + id;
}

carregar();
</script>
</body>
</html>
