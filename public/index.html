<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR Lira Tech</title>
<link rel="stylesheet" href="/shared.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

/* ── LOGIN ── */
.login-box { background: #1e293b; border-radius: 14px; padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.login-title { font-family: 'Segoe UI Black', 'Segoe UI', sans-serif; font-weight: 900; font-size: 26px; color: #38bdf8; text-align: center; margin-bottom: 4px; letter-spacing: -0.5px; }
.login-sub { text-align: center; font-size: 12px; color: #475569; margin-bottom: 32px; }
label { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; margin-top: 18px; }
input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; }
input:focus { outline: none; border-color: #38bdf8; }
button { width: 100%; margin-top: 26px; padding: 12px; background: #0ea5e9; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; }
button:hover { background: #0284c7; }
.erro { margin-top: 12px; text-align: center; color: #f87171; font-size: 13px; }

/* ── DASHBOARD ── */
.dashboard { display: none; width: 100%; max-width: 720px; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.dash-brand { font-family: 'Segoe UI Black', 'Segoe UI', sans-serif; font-weight: 900; font-size: 24px; color: #38bdf8; letter-spacing: -0.5px; }
.dash-user { font-size: 12px; color: #475569; margin-top: 2px; }
.logout-btn { font-size: 12px; color: #475569; cursor: pointer; text-decoration: none; transition: color .2s; }
.logout-btn:hover { color: #94a3b8; }

/* ── CARDS COMPACTOS ── */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
@media (min-width: 1700px) { .cards { grid-template-columns: repeat(8, 1fr); } }
.card { background: #1e293b; border-radius: 12px; padding: 22px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: inherit; border: 1px solid transparent; transition: background .2s, border-color .2s; text-align: center; }
.card:hover { background: #273549; border-color: #334155; }
.card .ic { background: #0f2a3f; border-radius: 10px; padding: 12px; display: flex; align-items: center; justify-content: center; }
.card .ic svg { color: #38bdf8; }
.card-title { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.3; }
.card-desc { font-size: 10px; color: #64748b; line-height: 1.4; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <div class="login-title">JR Lira Tech</div>
  <div class="login-sub">Sistema de Gestão</div>
  <label>Usuário</label>
  <input type="text" id="inputUsuario" placeholder="usuario">
  <label>Senha</label>
  <input type="password" id="inputSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
  <button onclick="fazerLogin()">Entrar</button>
  <div class="erro" id="erroLogin"></div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-brand">JR Lira Tech</div>
      <div class="dash-user" id="dashUser"></div>
    </div>
    <a class="logout-btn" onclick="sair()">Sair</a>
  </div>
  <div class="cards" id="cards"></div>
</div>

<script>
const API = '';
function getToken() { return localStorage.getItem('jrlira_token'); }

async function fazerLogin() {
  const usuario = document.getElementById('inputUsuario').value.trim();
  const senha = document.getElementById('inputSenha').value;
  document.getElementById('erroLogin').textContent = '';
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, senha })
    });
    const data = await r.json();
    if (!r.ok) return document.getElementById('erroLogin').textContent = data.erro;
    localStorage.setItem('jrlira_token', data.token);
    localStorage.setItem('jrlira_nome', data.nome);
    localStorage.setItem('jrlira_perfil', data.perfil);
    localStorage.setItem('jrlira_lojas', JSON.stringify(data.lojas || null));
    mostrarDashboard(data.nome, data.perfil);
  } catch { document.getElementById('erroLogin').textContent = 'Erro de conexão'; }
}

const TODOS_CARDS = [
  { href: '/rh',                icon: 'users',           title: 'Quadro de Lotação',   desc: 'Funcionários e histórico',        perfis: ['rh'] },
  { href: '/rh-painel',         icon: 'gauge',           title: 'Painel RH',           desc: 'Indicadores e absenteísmo',       perfis: ['rh'] },
  { href: '/ponto',             icon: 'clock',           title: 'Controle de Ponto',   desc: 'Importação iPonto',               perfis: ['rh'] },
  { href: '/notas-cadastro',    icon: 'file-text',       title: 'Notas Fornecedores',  desc: 'Cadastro de NF-e dos fornecedores', perfis: ['cadastro'] },
  { href: '/notas-transferencias-cadastro', icon: 'truck', title: 'Notas Transferências', desc: 'Cadastro de transferências CD e entre lojas', perfis: ['cadastro'] },
  { href: '/notas-estoque',     icon: 'package',         title: 'Notas — Estoque',     desc: 'Conferência às cegas (fornecedor)', perfis: ['estoque'] },
  { href: '/notas-distribuidora', icon: 'truck',         title: 'Distribuidora',       desc: 'Conferência de transferências CD/entre lojas', perfis: ['estoque'] },
  { href: '/notas-auditoria',   icon: 'clipboard-check', title: 'Notas — Auditoria',   desc: 'Fechamento de notas',             perfis: ['auditor'] },
  { href: '/fornecedores',      icon: 'building-2',      title: 'Fornecedores',        desc: 'Cadastro e aprovações',           perfis: ['comprador'] },
  { href: '/pedidos-comprador', icon: 'shopping-cart',   title: 'Pedidos',             desc: 'Validação e PDF',                 perfis: ['comprador'] },
  { href: '/auditoria-pedidos', icon: 'shield-check',    title: 'Auditoria de Pedidos',desc: 'Liberar pedidos acima da sugestão', perfis: [] },
  { href: '/notas-comprador',   icon: 'file-check',      title: 'NF-e Fornecedor',     desc: 'Importar XMLs e vincular pedidos',perfis: ['comprador'] },
  { href: '/notas-cd',          icon: 'truck',           title: 'Transferências CD',   desc: 'Acompanhar transferências CD e entre lojas', perfis: ['comprador'] },
  { href: '/sugestao-compras',  icon: 'trending-up',     title: 'Sugestão de Compras', desc: 'Reposição proativa por fornecedor', perfis: ['comprador'] },
  { href: '/contas-receber',    icon: 'receipt',         title: 'Contas a Receber',    desc: 'Devoluções e bonificações',       perfis: ['comprador'] },
  { href: '/usuarios',          icon: 'shield',          title: 'Usuários',            desc: 'Perfis de acesso',                perfis: [] },
  { href: '/produtos-embalagem',icon: 'box',             title: 'Cadastro CD',         desc: 'Auditoria de quantidade por embalagem e Códigos de Barra', perfis: [] },
  { href: '/embalagens-fornecedor', icon: 'package-search', title: 'Embalagens Fornecedor', desc: 'Sugestões de qtd por caixa vindas das NF-e', perfis: [] },
  { href: '/auditagem-divergencias',icon:'alert-triangle',title:'Divergências CD',     desc:'Faltas/sobras na conferência — tratar com CD ou devolução', perfis: [] },
  { href: '/validades-em-risco', icon: 'calendar-clock',  title: 'Validades em Risco',  desc: 'Análise por giro — liberar ou devolução', perfis: [] },
  { href: '/aguardando-devolucao', icon: 'undo-2',         title: 'Aguardando Devolução', desc: 'Anexar XML de devolução pro CD ou fornecedor', perfis: ['cadastro'] },
  { href: '/devolucoes-divergencias', icon: 'trending-up', title: 'Divergências Devolução', desc: 'Totalizador NF de devolução vs valor esperado por fornecedor / loja / mês', perfis: [] },
];

function renderCards(perfil) {
  const el = document.getElementById('cards');
  el.innerHTML = TODOS_CARDS
    .filter(c => perfil === 'admin' || c.perfis.includes(perfil))
    .map(c => `
      <a class="card" href="${c.href}">
        <div class="ic"><i data-lucide="${c.icon}" width="26" height="26"></i></div>
        <div>
          <div class="card-title">${c.title}</div>
          <div class="card-desc">${c.desc}</div>
        </div>
      </a>`).join('');
  lucide.createIcons();
}

function mostrarDashboard(nome, perfil) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('dashUser').textContent = `Bem-vindo, ${nome}`;
  renderCards(perfil || localStorage.getItem('jrlira_perfil') || '');
}

function sair() {
  ['jrlira_token','jrlira_nome','jrlira_perfil','jrlira_lojas'].forEach(k => localStorage.removeItem(k));
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('loginBox').style.flexDirection = 'column';
  document.getElementById('dashboard').style.display = 'none';
}

if (getToken()) mostrarDashboard(localStorage.getItem('jrlira_nome') || '', localStorage.getItem('jrlira_perfil') || '');
</script>
<script src="/js/notificacoes.js"></script>
</body>
</html>
