<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contas a Receber — JR Lira</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
nav{background:#1e293b;padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155;flex-shrink:0}
.brand{font-size:16px;font-weight:700;color:#38bdf8}
.nav-user{margin-left:auto;font-size:13px;color:#64748b}
input,select,textarea{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#38bdf8}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-ghost{background:#334155;color:#94a3b8}.btn-ghost:hover{background:#475569}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:#991b1b}
.btn-green{background:#14532d;color:#4ade80}.btn-green:hover{background:#166534}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer}

/* FILTROS */
.filtros{padding:14px 24px;background:#1e293b;border-bottom:1px solid #334155;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{min-width:150px}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;gap:0}
.painel-lista{flex:1;overflow-y:auto;padding:20px 24px}
.painel-detalhe{width:540px;background:#1e293b;border-left:1px solid #334155;overflow-y:auto;display:none;flex-direction:column}
.painel-detalhe.aberto{display:flex}
.det-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
.det-body{padding:16px 20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:20px}

/* TABELA */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0f172a;padding:8px 10px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid #1a2744;vertical-align:middle}
tbody tr:hover{background:#1a2744;cursor:pointer}
tbody tr.ativo{background:#0c2040;outline:2px solid #0ea5e9}

/* BADGES */
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-aberto{background:#1a0505;color:#f87171}
.badge-parcial{background:#1a1200;color:#fbbf24}
.badge-baixado{background:#0a2010;color:#4ade80}
.badge-bonif{background:#0c1a30;color:#60a5fa}
.badge-desc{background:#1a0d2e;color:#c084fc}

/* RESUMO */
.resumo{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.resumo-card{background:#1e293b;border-radius:8px;padding:12px 16px;min-width:140px}
.resumo-card label{font-size:10px;color:#64748b;text-transform:uppercase;display:block;margin-bottom:3px}
.resumo-card span{font-size:18px;font-weight:700}

/* SEÇÕES DETALHE */
.sec-title{font-size:11px;color:#64748b;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.itens-tbl td{font-size:11px;padding:5px 8px}
.credito-row{background:#0f172a;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.credito-info{flex:1}
.credito-val{font-size:15px;font-weight:700;color:#4ade80;white-space:nowrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border-radius:10px;padding:24px;width:460px;max-width:95vw;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row label{font-size:11px;color:#64748b;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.msg-err{background:#450a0a;color:#f87171;padding:8px 12px;border-radius:6px;font-size:13px}
.msg-ok{background:#14532d;color:#4ade80;padding:8px 12px;border-radius:6px;font-size:13px}
</style>
</head>
<body>
<nav>
  <span class="brand">JR Lira Tech</span>
  <span style="color:#475569">/</span>
  <span style="font-size:14px;color:#94a3b8">Contas a Receber — Fornecedores</span>
  <span class="nav-user" id="nomeUsuario"></span>
  <button class="btn-nav" onclick="location.href='/'">← Início</button>
</nav>

<div class="filtros">
  <div class="fg"><label>Loja</label>
    <select id="fLoja" onchange="carregar()"><option value="">Todas</option></select>
  </div>
  <div class="fg"><label>Status</label>
    <select id="fStatus" onchange="carregar()">
      <option value="">Todos</option>
      <option value="aberto">Aberto</option>
      <option value="parcial">Parcial</option>
      <option value="baixado">Baixado</option>
    </select>
  </div>
  <div class="fg"><label>Data de</label><input type="date" id="fDe" onchange="carregar()"></div>
  <div class="fg"><label>Data até</label><input type="date" id="fAte" onchange="carregar()"></div>
  <div class="fg"><label>Buscar</label><input type="text" id="fBusca" placeholder="Fornecedor / Nº nota" oninput="renderLista()" style="min-width:200px"></div>
  <button class="btn-primary" onclick="abrirImportar()" style="align-self:flex-end">+ Importar Devolução XML</button>
</div>

<div class="main">
  <div class="painel-lista" id="painelLista">
    <div id="resumoBar" class="resumo"></div>
    <div id="tabelaDebitos"></div>
  </div>
  <div class="painel-detalhe" id="painelDetalhe">
    <div class="det-header">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700" id="detTitulo">—</div>
        <div style="font-size:11px;color:#64748b" id="detSub">—</div>
      </div>
      <button class="btn-ghost btn-sm" onclick="fecharDetalhe()">✕</button>
    </div>
    <div class="det-body" id="detBody"></div>
  </div>
</div>

<!-- Modal importar devolução -->
<div class="overlay" id="modalImportar" style="display:none">
  <div class="modal">
    <h3>Importar Nota de Devolução / Avaria</h3>
    <div class="form-row"><label>Loja</label>
      <select id="impLoja"><option value="">— Selecione —</option></select>
    </div>
    <div class="form-row"><label>Arquivo XML</label>
      <input type="file" id="impXml" accept=".xml" style="padding:6px">
    </div>
    <div id="impMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalImportar')">Cancelar</button>
      <button class="btn-primary" onclick="importarDebito(this)">Importar</button>
    </div>
  </div>
</div>

<!-- Modal bonificação -->
<div class="overlay" id="modalBonif" style="display:none">
  <div class="modal">
    <h3>Baixar por Bonificação (XML)</h3>
    <p style="font-size:12px;color:#64748b">Importe o XML da NF-e de bonificação emitida pelo fornecedor.</p>
    <div class="form-row"><label>Arquivo XML</label>
      <input type="file" id="bonifXml" accept=".xml" style="padding:6px">
    </div>
    <div id="bonifMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalBonif')">Cancelar</button>
      <button class="btn-primary" onclick="importarBonif(this)">Registrar</button>
    </div>
  </div>
</div>

<!-- Modal desconto boleto -->
<div class="overlay" id="modalDesconto" style="display:none">
  <div class="modal">
    <h3>Baixar por Desconto em Boleto</h3>
    <div class="form-2col">
      <div class="form-row"><label>Nº NF do Boleto</label><input type="text" id="dNrNf" placeholder="(opcional)"></div>
      <div class="form-row"><label>Data</label><input type="date" id="dData"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Valor da NF (R$)</label><input type="number" id="dValNf" step="0.01" placeholder="0,00"></div>
      <div class="form-row"><label>Valor do Boleto (R$)</label><input type="number" id="dValBoleto" step="0.01" placeholder="0,00"></div>
    </div>
    <div class="form-row"><label>Valor do Desconto (R$) *</label><input type="number" id="dValDesc" step="0.01" placeholder="0,00"></div>
    <div class="form-row"><label>Observações</label><textarea id="dObs" rows="2"></textarea></div>
    <div id="descontoMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalDesconto')">Cancelar</button>
      <button class="btn-primary" onclick="registrarDesconto(this)">Registrar</button>
    </div>
  </div>
</div>

<script>
const API = '';
const fmtR = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = v => v ? new Date(v).toLocaleDateString('pt-BR') : '—';
const fmtDT = v => v ? new Date(v).toLocaleString('pt-BR') : '—';

let dados = [];
let debitoAtivo = null;
let perfil = localStorage.getItem('jrlira_perfil') || '';
let isAdmin = perfil === 'admin';

document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

async function init() {
  const rl = await apiFetch(`${API}/api/fornecedores/lojas`);
  if (!rl.ok) { document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#f87171;padding:40px;text-align:center">Sessão expirada</div>'; return; }
  const lojas = await rl.json();
  const lojasSalvas = JSON.parse(localStorage.getItem('jrlira_lojas') || 'null');
  const visiveis = perfil === 'admin' || !lojasSalvas ? lojas : lojas.filter(l => lojasSalvas.includes(l.id));

  [document.getElementById('fLoja'), document.getElementById('impLoja')].forEach(sel => {
    sel.innerHTML = (sel.id === 'fLoja' ? '<option value="">Todas</option>' : '<option value="">— Selecione —</option>') +
      visiveis.map(l => `<option value="${l.id}">${l.nome}</option>`).join('');
  });
  await carregar();
}

async function carregar() {
  const params = new URLSearchParams();
  const loja = document.getElementById('fLoja').value;
  const status = document.getElementById('fStatus').value;
  const de = document.getElementById('fDe').value;
  const ate = document.getElementById('fAte').value;
  if (loja)   params.set('loja_id', loja);
  if (status) params.set('status', status);
  if (de)     params.set('de', de);
  if (ate)    params.set('ate', ate);

  document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#64748b;padding:40px;text-align:center">Carregando...</div>';
  const r = await apiFetch(`${API}/api/cr/debitos?${params}`);
  dados = r.ok ? await r.json() : [];
  renderLista();
}

function renderLista() {
  const busca = document.getElementById('fBusca').value.toLowerCase();
  const filtrados = busca
    ? dados.filter(d => (d.fornecedor_nome||'').toLowerCase().includes(busca) || (d.numero_nota||'').includes(busca))
    : dados;

  // resumo
  const totAberto   = filtrados.filter(d=>d.status==='aberto').reduce((a,d)=>a+d.saldo_aberto,0);
  const totParcial  = filtrados.filter(d=>d.status==='parcial').reduce((a,d)=>a+d.saldo_aberto,0);
  const totTotal    = filtrados.reduce((a,d)=>a+d.saldo_aberto,0);
  document.getElementById('resumoBar').innerHTML = `
    <div class="resumo-card"><label>Total em aberto</label><span style="color:#f87171">${fmtR(totTotal)}</span></div>
    <div class="resumo-card"><label>Notas abertas</label><span style="color:#f87171">${filtrados.filter(d=>d.status==='aberto').length}</span></div>
    <div class="resumo-card"><label>Notas parciais</label><span style="color:#fbbf24">${filtrados.filter(d=>d.status==='parcial').length}</span></div>
    <div class="resumo-card"><label>Baixadas</label><span style="color:#4ade80">${filtrados.filter(d=>d.status==='baixado').length}</span></div>
  `;

  if (!filtrados.length) {
    document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#475569;padding:40px;text-align:center">Nenhum débito encontrado</div>';
    return;
  }

  const statusBadge = s => ({
    aberto:  '<span class="badge badge-aberto">Aberto</span>',
    parcial: '<span class="badge badge-parcial">Parcial</span>',
    baixado: '<span class="badge badge-baixado">Baixado</span>',
  }[s] || s);

  document.getElementById('tabelaDebitos').innerHTML = `
    <table>
      <thead><tr>
        <th>Nº Nota</th><th>Data</th><th>Fornecedor</th><th>Loja</th>
        <th>Nat. Operação</th>
        <th style="text-align:right">Valor Total</th>
        <th style="text-align:right">Créditos</th>
        <th style="text-align:right">Saldo</th>
        <th>Status</th>
      </tr></thead>
      <tbody>
        ${filtrados.map(d => `
          <tr onclick="abrirDetalhe(${d.id})" class="${debitoAtivo===d.id?'ativo':''}">
            <td style="font-family:monospace;font-size:11px">${escapeHtml(d.numero_nota||'—')}</td>
            <td>${fmtD(d.data_emissao)}</td>
            <td><div style="font-weight:600;font-size:12px">${escapeHtml(d.fornecedor_nome||'—')}</div><div style="font-size:10px;color:#475569">${escapeHtml(d.fornecedor_cnpj||'')}</div></td>
            <td style="font-size:11px">${escapeHtml(lojaLabel(d.loja_id))}</td>
            <td style="font-size:11px;color:#94a3b8">${escapeHtml(d.natureza_operacao||'—')}</td>
            <td style="text-align:right;color:#e2e8f0">${fmtR(d.valor_total)}</td>
            <td style="text-align:right;color:#4ade80">${d.valor_creditos>0?fmtR(d.valor_creditos):'—'}</td>
            <td style="text-align:right;font-weight:700;color:${d.saldo_aberto>0?'#f87171':'#4ade80'}">${fmtR(d.saldo_aberto)}</td>
            <td>${statusBadge(d.status)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function lojaLabel(id) {
  const m = {1:'ECONOMICO',2:'BR',3:'JOAO PAULO',4:'FLORESTA',5:'SAO JOSE',6:'SANTAREM'};
  return m[id] || id;
}

async function abrirDetalhe(id) {
  debitoAtivo = id;
  renderLista();
  document.getElementById('painelDetalhe').classList.add('aberto');
  document.getElementById('detBody').innerHTML = '<div style="color:#64748b;padding:20px;text-align:center">Carregando...</div>';

  const r = await apiFetch(`${API}/api/cr/debitos/${id}`);
  if (!r.ok) { document.getElementById('detBody').innerHTML = '<div style="color:#f87171;padding:20px">Erro ao carregar</div>'; return; }
  const d = await r.json();

  document.getElementById('detTitulo').textContent = `NF ${d.numero_nota||''} — ${d.fornecedor_nome||''}`;
  document.getElementById('detSub').textContent = `${fmtD(d.data_emissao)} · ${lojaLabel(d.loja_id)} · ${d.natureza_operacao||''}`;

  const statusBadge = { aberto:'badge-aberto', parcial:'badge-parcial', baixado:'badge-baixado' };

  document.getElementById('detBody').innerHTML = `
    <div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <div><div style="font-size:10px;color:#64748b">Valor Total</div><div style="font-size:16px;font-weight:700">${fmtR(d.valor_total)}</div></div>
        <div><div style="font-size:10px;color:#64748b">Créditos</div><div style="font-size:16px;font-weight:700;color:#4ade80">${fmtR(d.valor_creditos)}</div></div>
        <div><div style="font-size:10px;color:#64748b">Saldo Aberto</div><div style="font-size:16px;font-weight:700;color:${d.saldo_aberto>0?'#f87171':'#4ade80'}">${fmtR(d.saldo_aberto)}</div></div>
        <div style="display:flex;align-items:flex-end"><span class="badge ${statusBadge[d.status]||''}" style="font-size:13px;padding:4px 12px">${escapeHtml(d.status)}</span></div>
      </div>
      <div style="font-size:10px;color:#475569">Importado por ${escapeHtml(d.importado_por||'—')} em ${fmtDT(d.importado_em)}</div>
    </div>

    <div>
      <div class="sec-title">Produtos (${d.itens.length})</div>
      <table class="itens-tbl">
        <thead><tr><th>Cód. Barras</th><th>Descrição</th><th style="text-align:right">Qtd</th><th style="text-align:right">V. Unit.</th><th style="text-align:right">V. Total</th></tr></thead>
        <tbody>
          ${d.itens.map(it=>`<tr>
            <td style="font-family:monospace;font-size:10px;color:#475569">${escapeHtml(it.codigo_barras||'—')}</td>
            <td>${escapeHtml(it.descricao||'—')}</td>
            <td style="text-align:right">${Number(it.quantidade).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:3})}</td>
            <td style="text-align:right;color:#94a3b8">${fmtR(it.valor_unitario)}</td>
            <td style="text-align:right">${fmtR(it.valor_total)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="sec-title" style="margin-bottom:0">Créditos / Baixas (${d.creditos.length})</div>
        ${d.status!=='baixado'?`
          <button class="btn-green btn-sm" onclick="abrirBonif(${d.id})">+ Bonificação XML</button>
          <button class="btn-primary btn-sm" onclick="abrirDesconto(${d.id})">+ Desconto Boleto</button>
        `:''}
      </div>
      ${d.creditos.length===0?'<div style="color:#475569;font-size:12px">Nenhuma baixa registrada</div>':
        d.creditos.map(c=>`
          <div class="credito-row">
            <div class="credito-info">
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
                <span class="badge ${c.tipo==='bonificacao'?'badge-bonif':'badge-desc'}">${c.tipo==='bonificacao'?'Bonificação':'Desconto Boleto'}</span>
                <span style="font-size:11px;color:#64748b">${fmtD(c.data_credito)}</span>
              </div>
              ${c.numero_nota?`<div style="font-size:11px;color:#94a3b8">NF ${escapeHtml(c.numero_nota)}</div>`:''}
              ${c.tipo==='desconto_boleto'?`<div style="font-size:11px;color:#94a3b8">NF boleto: ${escapeHtml(c.nr_nf_boleto||'—')} · Boleto: ${fmtR(c.valor_boleto)} · Desconto: ${fmtR(c.valor_desconto)}</div>`:''}
              ${c.observacoes?`<div style="font-size:11px;color:#64748b;margin-top:3px">${escapeHtml(c.observacoes)}</div>`:''}
              <div style="font-size:10px;color:#334155;margin-top:3px">por ${escapeHtml(c.registrado_por||'—')} em ${fmtDT(c.registrado_em)}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
              <span class="credito-val">${fmtR(c.valor)}</span>
              ${isAdmin?`<button class="btn-danger btn-sm" onclick="excluirCredito(${c.id},${d.id}, this)">Excluir</button>`:''}
            </div>
          </div>`).join('')
      }
    </div>

    ${isAdmin?`<div style="border-top:1px solid #334155;padding-top:12px">
      <button class="btn-danger btn-sm" onclick="excluirDebito(${d.id}, this)">Excluir Débito</button>
    </div>`:''}
  `;
}

function fecharDetalhe() {
  debitoAtivo = null;
  document.getElementById('painelDetalhe').classList.remove('aberto');
  renderLista();
}

// ── IMPORTAR DEVOLUÇÃO ─────────────────────────────────────────────
function abrirImportar() {
  document.getElementById('impMsg').innerHTML = '';
  document.getElementById('impXml').value = '';
  document.getElementById('modalImportar').style.display = 'flex';
}

async function importarDebito(btn) {
  const loja_id = document.getElementById('impLoja').value;
  const file = document.getElementById('impXml').files[0];
  const msg = document.getElementById('impMsg');
  if (!loja_id) { msg.innerHTML = '<div class="msg-err">Selecione a loja</div>'; return; }
  if (!file)    { msg.innerHTML = '<div class="msg-err">Selecione o arquivo XML</div>'; return; }

  const fd = new FormData();
  fd.append('loja_id', loja_id);
  fd.append('xml', file);

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/debitos/importar`, { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="msg-err">${escapeHtml(d.erro)}</div>`; return; }
    msg.innerHTML = `<div class="msg-ok">NF ${escapeHtml(d.numero_nota)} importada — ${fmtR(d.valor_total)}</div>`;
    setTimeout(() => { fecharModal('modalImportar'); carregar(); }, 1500);
  }, 'Importando...');
}

// ── BONIFICAÇÃO ────────────────────────────────────────────────────
let debitoBonif = null;
function abrirBonif(id) {
  debitoBonif = id;
  document.getElementById('bonifMsg').innerHTML = '';
  document.getElementById('bonifXml').value = '';
  document.getElementById('modalBonif').style.display = 'flex';
}

async function importarBonif(btn) {
  const file = document.getElementById('bonifXml').files[0];
  const msg = document.getElementById('bonifMsg');
  if (!file) { msg.innerHTML = '<div class="msg-err">Selecione o arquivo XML</div>'; return; }

  const fd = new FormData();
  fd.append('debito_id', debitoBonif);
  fd.append('xml', file);

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/bonificacao`, { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="msg-err">${escapeHtml(d.erro)}</div>`; return; }
    msg.innerHTML = '<div class="msg-ok">Bonificação registrada com sucesso</div>';
    setTimeout(() => { fecharModal('modalBonif'); carregar(); abrirDetalhe(debitoBonif); }, 1200);
  }, 'Registrando...');
}

// ── DESCONTO BOLETO ────────────────────────────────────────────────
let debitoDesconto = null;
function abrirDesconto(id) {
  debitoDesconto = id;
  ['dNrNf','dData','dValNf','dValBoleto','dValDesc','dObs'].forEach(i => {
    const el = document.getElementById(i);
    if (el) el.value = '';
  });
  document.getElementById('descontoMsg').innerHTML = '';
  document.getElementById('modalDesconto').style.display = 'flex';
}

async function registrarDesconto(btn) {
  const msg = document.getElementById('descontoMsg');
  const valor_desconto = parseFloat(document.getElementById('dValDesc').value);
  if (!valor_desconto) { msg.innerHTML = '<div class="msg-err">Informe o valor do desconto</div>'; return; }

  const body = {
    debito_id: debitoDesconto,
    nr_nf_boleto: document.getElementById('dNrNf').value.trim() || null,
    valor_nf_boleto: parseFloat(document.getElementById('dValNf').value) || 0,
    valor_boleto: parseFloat(document.getElementById('dValBoleto').value) || 0,
    valor_desconto,
    data_credito: document.getElementById('dData').value || null,
    observacoes: document.getElementById('dObs').value.trim() || null,
  };

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/desconto`, { method: 'POST', body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="msg-err">${escapeHtml(d.erro)}</div>`; return; }
    msg.innerHTML = '<div class="msg-ok">Desconto registrado com sucesso</div>';
    setTimeout(() => { fecharModal('modalDesconto'); carregar(); abrirDetalhe(debitoDesconto); }, 1200);
  }, 'Registrando...');
}

// ── EXCLUIR ────────────────────────────────────────────────────────
async function excluirCredito(id, debitoId, btn) {
  if (!confirm('Excluir este crédito?')) return;
  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/${id}`, { method: 'DELETE' });
    if (r.ok) { carregar(); abrirDetalhe(debitoId); }
    else { const d = await r.json(); alert(d.erro); }
  }, 'Excluindo...');
}

async function excluirDebito(id, btn) {
  if (!confirm('Excluir este débito e todos os seus créditos?')) return;
  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/debitos/${id}`, { method: 'DELETE' });
    if (r.ok) { fecharDetalhe(); carregar(); }
    else { const d = await r.json(); alert(d.erro); }
  }, 'Excluindo...');
}

function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if (e.target===el) fecharModal(el.id); }));

init();
</script>
