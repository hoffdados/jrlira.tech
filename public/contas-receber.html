<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Contas a Receber — JR Lira</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
nav{background:#1e293b;padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155;flex-shrink:0}
.brand{font-size:16px;font-weight:700;color:#38bdf8}
.nav-user{margin-left:auto;font-size:13px;color:#64748b}
input,select,textarea{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#38bdf8}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-ghost{background:#334155;color:#94a3b8}.btn-ghost:hover{background:#475569}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:#991b1b}
.btn-green{background:#14532d;color:#4ade80}.btn-green:hover{background:#166534}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer}

/* ABAS */
.abas{display:flex;gap:4px;padding:10px 24px 0;background:#0f172a;border-bottom:1px solid #1e293b}
.aba{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-bottom:none;border-radius:8px 8px 0 0;padding:10px 18px;font-weight:600;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.aba.ativa{background:#0c2040;color:#38bdf8;border-color:#0ea5e9}
.aba:hover:not(.ativa){background:#243149;color:#cbd5e1}
.badge-pendente{background:#7f1d1d;color:#fecaca;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}

/* ACORDOS */
.acordos-status{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.acordos-status.pendente_compras{background:#451a03;color:#fbbf24}
.acordos-status.ativo{background:#14532d;color:#4ade80}
.acordos-status.fechado{background:#1e3a8a;color:#93c5fd}
.acordos-status.recusado{background:#450a0a;color:#fca5a5}
.acordos-status.cancelado{background:#1e293b;color:#64748b}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-item label{font-size:10px;color:#64748b;text-transform:uppercase;display:block;margin-bottom:2px}
.det-item span{font-size:13px;color:#e2e8f0}

/* FILTROS */
.filtros{padding:14px 24px;background:#1e293b;border-bottom:1px solid #334155;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{min-width:150px}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;gap:0}
.painel-lista{flex:1;overflow-y:auto;padding:20px 24px}
.painel-detalhe{width:540px;background:#1e293b;border-left:1px solid #334155;overflow-y:auto;display:none;flex-direction:column}
.painel-detalhe.aberto{display:flex}
.det-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
.det-body{padding:16px 20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:20px}

/* TABELA */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0f172a;padding:8px 10px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid #1a2744;vertical-align:middle}
tbody tr:hover{background:#1a2744;cursor:pointer}
tbody tr.ativo{background:#0c2040;outline:2px solid #0ea5e9}

/* BADGES */
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-aberto{background:#1a0505;color:#f87171}
.badge-cobrado{background:#0a1a2e;color:#7dd3fc}
.badge-parcial{background:#1a1200;color:#fbbf24}
.badge-baixado{background:#0a2010;color:#4ade80}
.badge-bonif{background:#0c1a30;color:#60a5fa}
.badge-desc{background:#1a0d2e;color:#c084fc}

/* RESUMO */
.resumo{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.resumo-card{background:#1e293b;border-radius:8px;padding:12px 16px;min-width:140px}
.resumo-card label{font-size:10px;color:#64748b;text-transform:uppercase;display:block;margin-bottom:3px}
.resumo-card span{font-size:18px;font-weight:700}

/* SEÇÕES DETALHE */
.sec-title{font-size:11px;color:#64748b;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.itens-tbl td{font-size:11px;padding:5px 8px}
.credito-row{background:#0f172a;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.credito-info{flex:1}
.credito-val{font-size:15px;font-weight:700;color:#4ade80;white-space:nowrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border-radius:10px;padding:24px;width:460px;max-width:95vw;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row label{font-size:11px;color:#64748b;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.msg-err{background:#450a0a;color:#f87171;padding:8px 12px;border-radius:6px;font-size:13px}
.msg-ok{background:#14532d;color:#4ade80;padding:8px 12px;border-radius:6px;font-size:13px}
</style>
</head>
<body>
<nav>
  <span class="brand">JR Lira Tech</span>
  <span style="color:#475569">/</span>
  <span style="font-size:14px;color:#94a3b8">Contas a Receber — Fornecedores</span>
  <span class="nav-user" id="nomeUsuario"></span>
  <button class="btn-nav" onclick="location.href='/'">← Início</button>
</nav>

<div class="abas">
  <button class="aba ativa" id="abaDebitosBtn" onclick="setAba('debitos')">📃 Débitos (Devoluções)</button>
  <button class="aba" id="abaAcordosBtn" onclick="setAba('acordos')">📝 Acordos Comerciais <span id="badgePendentes" class="badge-pendente" style="display:none">0</span></button>
</div>

<div id="abaDebitos">
<div class="filtros">
  <div class="fg"><label>Loja</label>
    <select id="fLoja" onchange="carregar()"><option value="">Todas</option></select>
  </div>
  <div class="fg"><label>Status</label>
    <select id="fStatus" onchange="carregar()">
      <option value="">Todos</option>
      <option value="aberto">Aberto</option>
      <option value="cobrado">Cobrado</option>
      <option value="parcial">Parcial</option>
      <option value="baixado">Pago</option>
    </select>
  </div>
  <div class="fg"><label>Data de</label><input type="date" id="fDe" onchange="carregar()"></div>
  <div class="fg"><label>Data até</label><input type="date" id="fAte" onchange="carregar()"></div>
  <div class="fg"><label>Buscar</label><input type="text" id="fBusca" placeholder="Fornecedor / Nº nota" oninput="renderLista()" style="min-width:200px"></div>
</div>

<div class="main">
  <div class="painel-lista" id="painelLista">
    <div id="resumoBar" class="resumo"></div>
    <div id="tabelaDebitos"></div>
  </div>
  <div class="painel-detalhe" id="painelDetalhe">
    <div class="det-header">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700" id="detTitulo">—</div>
        <div style="font-size:11px;color:#64748b" id="detSub">—</div>
      </div>
      <button class="btn-ghost btn-sm" onclick="fecharDetalhe()">✕</button>
    </div>
    <div class="det-body" id="detBody"></div>
  </div>
</div>

</div><!-- /abaDebitos -->

<div id="abaAcordos" style="display:none">
  <div class="filtros">
    <div class="fg"><label>Status</label>
      <select id="acStatus" onchange="carregarAcordos()">
        <option value="pendente_compras">🟡 Pendentes (aguardando aprovação)</option>
        <option value="ativo">🟢 Ativos (monitorando)</option>
        <option value="fechado">🔵 Fechados (já viraram débito)</option>
        <option value="recusado">🔴 Recusados</option>
        <option value="">Todos</option>
      </select>
    </div>
    <div class="fg"><label>Loja</label>
      <select id="acLoja" onchange="carregarAcordos()"><option value="">Todas</option></select>
    </div>
    <div class="fg"><label>Buscar</label>
      <input type="text" id="acBusca" placeholder="Produto / fornecedor / EAN" oninput="renderAcordos()" style="min-width:220px">
    </div>
  </div>
  <div class="main">
    <div class="painel-lista">
      <div id="resumoAcordos" class="resumo"></div>
      <div id="tabelaAcordos"></div>
    </div>
    <div class="painel-detalhe" id="painelDetalheAcordo">
      <div class="det-header">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700" id="acDetTitulo">—</div>
          <div style="font-size:11px;color:#64748b" id="acDetSub">—</div>
        </div>
        <button class="btn-ghost btn-sm" onclick="fecharDetalheAcordo()">✕</button>
      </div>
      <div class="det-body" id="acDetBody"></div>
    </div>
  </div>
</div>

<!-- Modal recusar acordo -->
<div class="overlay" id="modalRecusar" style="display:none">
  <div class="modal">
    <h3>Recusar Acordo Comercial</h3>
    <p style="font-size:12px;color:#64748b">Informe o motivo. O responsável que solicitou será notificado.</p>
    <div class="form-row"><label>Motivo *</label><textarea id="rcMotivo" rows="3" placeholder="Ex: Diferença muito alta, fornecedor não autorizou, etc."></textarea></div>
    <div id="rcMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalRecusar')">Cancelar</button>
      <button class="btn-danger" onclick="confirmarRecusa()">Recusar acordo</button>
    </div>
  </div>
</div>

<!-- Modal importar devolução removido — cobrança vem da importação automática -->

<!-- Modal bonificação -->
<div class="overlay" id="modalBonif" style="display:none">
  <div class="modal">
    <h3>Baixar por Bonificação (XML)</h3>
    <p style="font-size:12px;color:#64748b">Importe o XML da NF-e de bonificação emitida pelo fornecedor.</p>
    <div class="form-row"><label>Arquivo XML</label>
      <input type="file" id="bonifXml" accept=".xml" style="padding:6px">
    </div>
    <div id="bonifMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalBonif')">Cancelar</button>
      <button class="btn-primary" onclick="importarBonif(this)">Registrar</button>
    </div>
  </div>
</div>

<!-- Modal desconto boleto -->
<div class="overlay" id="modalDesconto" style="display:none">
  <div class="modal">
    <h3>Baixar por Desconto em Boleto</h3>
    <div class="form-2col">
      <div class="form-row"><label>Nº NF do Boleto</label><input type="text" id="dNrNf" placeholder="(opcional)"></div>
      <div class="form-row"><label>Data</label><input type="date" id="dData"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Valor da NF (R$)</label><input type="number" id="dValNf" step="0.01" placeholder="0,00"></div>
      <div class="form-row"><label>Valor do Boleto (R$)</label><input type="number" id="dValBoleto" step="0.01" placeholder="0,00"></div>
    </div>
    <div class="form-row"><label>Valor do Desconto (R$) *</label><input type="number" id="dValDesc" step="0.01" placeholder="0,00"></div>
    <div class="form-row"><label>Observações</label><textarea id="dObs" rows="2"></textarea></div>
    <div id="descontoMsg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost" onclick="fecharModal('modalDesconto')">Cancelar</button>
      <button class="btn-primary" onclick="registrarDesconto(this)">Registrar</button>
    </div>
  </div>
</div>

<script>
const API = '';
const fmtR = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = v => v ? new Date(v).toLocaleDateString('pt-BR') : '—';
const fmtDT = v => v ? new Date(v).toLocaleString('pt-BR') : '—';

let dados = [];
let debitoAtivo = null;
let perfil = localStorage.getItem('jrlira_perfil') || '';
let isAdmin = perfil === 'admin';

document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

async function init() {
  const rl = await apiFetch(`${API}/api/fornecedores/lojas`);
  if (!rl.ok) { document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#f87171;padding:40px;text-align:center">Sessão expirada</div>'; return; }
  const lojas = await rl.json();
  const lojasSalvas = JSON.parse(localStorage.getItem('jrlira_lojas') || 'null');
  const visiveis = perfil === 'admin' || !lojasSalvas ? lojas : lojas.filter(l => lojasSalvas.includes(l.id));

  const fLoja = document.getElementById('fLoja');
  fLoja.innerHTML = '<option value="">Todas</option>' +
    visiveis.map(l => `<option value="${l.id}">${l.nome}</option>`).join('');
  await carregar();
}

async function carregar() {
  const params = new URLSearchParams();
  const loja = document.getElementById('fLoja').value;
  const status = document.getElementById('fStatus').value;
  const de = document.getElementById('fDe').value;
  const ate = document.getElementById('fAte').value;
  if (loja)   params.set('loja_id', loja);
  if (status) params.set('status', status);
  if (de)     params.set('de', de);
  if (ate)    params.set('ate', ate);

  document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#64748b;padding:40px;text-align:center">Carregando...</div>';
  const r = await apiFetch(`${API}/api/cr/debitos?${params}`);
  dados = r.ok ? await r.json() : [];
  renderLista();
}

function renderLista() {
  const busca = document.getElementById('fBusca').value.toLowerCase();
  const filtrados = busca
    ? dados.filter(d => (d.fornecedor_nome||'').toLowerCase().includes(busca) || (d.numero_nota||'').includes(busca))
    : dados;

  // resumo
  const totAberto   = filtrados.filter(d=>d.status==='aberto').reduce((a,d)=>a+d.saldo_aberto,0);
  const totParcial  = filtrados.filter(d=>d.status==='parcial').reduce((a,d)=>a+d.saldo_aberto,0);
  const totTotal    = filtrados.reduce((a,d)=>a+d.saldo_aberto,0);
  document.getElementById('resumoBar').innerHTML = `
    <div class="resumo-card"><label>Total em aberto</label><span style="color:#f87171">${fmtR(totTotal)}</span></div>
    <div class="resumo-card"><label>Notas abertas</label><span style="color:#f87171">${filtrados.filter(d=>d.status==='aberto').length}</span></div>
    <div class="resumo-card"><label>Notas parciais</label><span style="color:#fbbf24">${filtrados.filter(d=>d.status==='parcial').length}</span></div>
    <div class="resumo-card"><label>Baixadas</label><span style="color:#4ade80">${filtrados.filter(d=>d.status==='baixado').length}</span></div>
  `;

  if (!filtrados.length) {
    document.getElementById('tabelaDebitos').innerHTML = '<div style="color:#475569;padding:40px;text-align:center">Nenhum débito encontrado</div>';
    return;
  }

  const statusBadge = s => ({
    aberto:  '<span class="badge badge-aberto">Aberto</span>',
    cobrado: '<span class="badge badge-cobrado">Cobrado</span>',
    parcial: '<span class="badge badge-parcial">Parcial</span>',
    baixado: '<span class="badge badge-baixado">Pago</span>',
  }[s] || s);

  document.getElementById('tabelaDebitos').innerHTML = `
    <table>
      <thead><tr>
        <th>Nº Nota</th><th>Data</th><th>Fornecedor</th><th>Loja</th>
        <th>Nat. Operação</th>
        <th style="text-align:right">Valor Total</th>
        <th style="text-align:right">Créditos</th>
        <th style="text-align:right">Saldo</th>
        <th>Status</th>
      </tr></thead>
      <tbody>
        ${filtrados.map(d => `
          <tr onclick="abrirDetalhe(${d.id})" class="${debitoAtivo===d.id?'ativo':''}">
            <td style="font-family:monospace;font-size:11px">${escapeHtml(d.numero_nota||'—')}</td>
            <td>${fmtD(d.data_emissao)}</td>
            <td><div style="font-weight:600;font-size:12px">${escapeHtml(d.fornecedor_nome||'—')}</div><div style="font-size:10px;color:#475569">${escapeHtml(d.fornecedor_cnpj||'')}</div></td>
            <td style="font-size:11px">${escapeHtml(lojaLabel(d.loja_id))}</td>
            <td style="font-size:11px;color:#94a3b8">${escapeHtml(d.natureza_operacao||'—')}</td>
            <td style="text-align:right;color:#e2e8f0">${fmtR(d.valor_total)}</td>
            <td style="text-align:right;color:#4ade80">${d.valor_creditos>0?fmtR(d.valor_creditos):'—'}</td>
            <td style="text-align:right;font-weight:700;color:${d.saldo_aberto>0?'#f87171':'#4ade80'}">${fmtR(d.saldo_aberto)}</td>
            <td>${statusBadge(d.status)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function lojaLabel(id) {
  const m = {1:'ECONOMICO',2:'BR',3:'JOAO PESSOA',4:'FLORESTA',5:'SAO JOSE',6:'SANTAREM'};
  return m[id] || id;
}

async function abrirDetalhe(id) {
  debitoAtivo = id;
  renderLista();
  document.getElementById('painelDetalhe').classList.add('aberto');
  document.getElementById('detBody').innerHTML = '<div style="color:#64748b;padding:20px;text-align:center">Carregando...</div>';

  const r = await apiFetch(`${API}/api/cr/debitos/${id}`);
  if (!r.ok) { document.getElementById('detBody').innerHTML = '<div style="color:#f87171;padding:20px">Erro ao carregar</div>'; return; }
  const d = await r.json();

  document.getElementById('detTitulo').textContent = `NF ${d.numero_nota||''} — ${d.fornecedor_nome||''}`;
  document.getElementById('detSub').textContent = `${fmtD(d.data_emissao)} · ${lojaLabel(d.loja_id)} · ${d.natureza_operacao||''}`;

  const statusBadge = { aberto:'badge-aberto', parcial:'badge-parcial', baixado:'badge-baixado' };

  document.getElementById('detBody').innerHTML = `
    <div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <div><div style="font-size:10px;color:#64748b">Valor Total</div><div style="font-size:16px;font-weight:700">${fmtR(d.valor_total)}</div></div>
        <div><div style="font-size:10px;color:#64748b">Créditos</div><div style="font-size:16px;font-weight:700;color:#4ade80">${fmtR(d.valor_creditos)}</div></div>
        <div><div style="font-size:10px;color:#64748b">Saldo Aberto</div><div style="font-size:16px;font-weight:700;color:${d.saldo_aberto>0?'#f87171':'#4ade80'}">${fmtR(d.saldo_aberto)}</div></div>
        <div style="display:flex;align-items:flex-end"><span class="badge ${statusBadge[d.status]||''}" style="font-size:13px;padding:4px 12px">${escapeHtml(d.status)}</span></div>
      </div>
      <div style="font-size:10px;color:#475569">Importado por ${escapeHtml(d.importado_por||'—')} em ${fmtDT(d.importado_em)}</div>
    </div>

    <div>
      <div class="sec-title">Produtos (${d.itens.length})</div>
      <table class="itens-tbl">
        <thead><tr><th>Cód. Barras</th><th>Descrição</th><th style="text-align:right">Qtd</th><th style="text-align:right">V. Unit.</th><th style="text-align:right">V. Total</th></tr></thead>
        <tbody>
          ${d.itens.map(it=>`<tr>
            <td style="font-family:monospace;font-size:10px;color:#475569">${escapeHtml(it.codigo_barras||'—')}</td>
            <td>${escapeHtml(it.descricao||'—')}</td>
            <td style="text-align:right">${Number(it.quantidade).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:3})}</td>
            <td style="text-align:right;color:#94a3b8">${fmtR(it.valor_unitario)}</td>
            <td style="text-align:right">${fmtR(it.valor_total)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    ${d.notas_origem && d.notas_origem.length ? `
    <div>
      <div class="sec-title">Notas referentes (${d.notas_origem.length})</div>
      <table class="itens-tbl">
        <thead><tr><th>Tipo</th><th>NF</th><th>Data</th><th style="text-align:right">Itens</th><th style="text-align:right">Valor NF</th><th style="text-align:right">Cobrado</th></tr></thead>
        <tbody>
        ${d.notas_origem.map(n=>`<tr>

          <td style="text-align:right">${fmtR(n.valor_cobrado)}</td>

    ${d.status!=='baixado' ? `
    <div style="background:#0c1628;padding:12px;border-radius:6px;margin:10px 0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:12px;color:#94a3b8">Cobrar fornecedor:</span>

        <span id="envioMsg-${d.id}" style="font-size:11px;color:#94a3b8;margin-left:auto"></span>
      </div>
      ${d.vendedores && d.vendedores.length ? `
        <div style="font-size:11px;color:#64748b;margin:6px 0 4px">${d.vendedores.length} vendedor(es) credenciado(s):</div>
        ${d.vendedores.map(v => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px;background:#1e293b;border-radius:5px;margin-bottom:4px;flex-wrap:wrap">
            <strong style="font-size:12px;color:#fde047;flex:1;min-width:120px">${escapeHtml(v.nome||'—')}</strong>
            ${v.email ? `<button class="btn-primary btn-sm" onclick="enviarCobrancaVend(${d.id},${v.id},'email',this)">✉ ${escapeHtml(v.email)}</button>` : '<span style="font-size:10px;color:#64748b">sem email</span>'}
            ${v.telefone ? `<button class="btn-green btn-sm" onclick="enviarCobrancaVend(${d.id},${v.id},'whatsapp',this)">💬 ${escapeHtml(v.telefone)}</button>` : '<span style="font-size:10px;color:#64748b">sem telefone</span>'}
          </div>`).join('')}
      ` : (d.contato?.email || d.contato?.telefone) ? `
        <div style="font-size:11px;color:#64748b;margin:6px 0 4px">Sem vendedor credenciado, usando contato do UltraSyst:</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${d.contato.email ? `<button class="btn-primary btn-sm" onclick="enviarCobranca(${d.id},'email',this)">✉ ${escapeHtml(d.contato.email)}</button>` : ''}
          ${d.contato.telefone ? `<button class="btn-green btn-sm" onclick="enviarCobranca(${d.id},'whatsapp',this)">💬 ${escapeHtml(d.contato.telefone)}</button>` : ''}
        </div>
      ` : `<div style="font-size:11px;color:#64748b;padding:6px">Nenhum contato cadastrado para envio automático. Cadastre vendedor em /fornecedores ou atualize email/telefone no UltraSyst.</div>`}
    </div>` : ''}

    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="sec-title" style="margin-bottom:0">Créditos / Baixas (${d.creditos.length})</div>
        ${d.status!=='baixado'?`
          <button class="btn-green btn-sm" onclick="abrirBonif(${d.id})">+ Bonificação XML</button>
          <button class="btn-primary btn-sm" onclick="abrirDesconto(${d.id})">+ Desconto Boleto</button>
        `:''}
      </div>
      ${d.creditos.length===0?'<div style="color:#475569;font-size:12px">Nenhuma baixa registrada</div>':
        d.creditos.map(c=>`
          <div class="credito-row">
            <div class="credito-info">
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
                <span class="badge ${c.tipo==='bonificacao'?'badge-bonif':'badge-desc'}">${c.tipo==='bonificacao'?'Bonificação':'Desconto Boleto'}</span>
                <span style="font-size:11px;color:#64748b">${fmtD(c.data_credito)}</span>
              </div>
              ${c.numero_nota?`<div style="font-size:11px;color:#94a3b8">NF ${escapeHtml(c.numero_nota)}</div>`:''}
              ${c.tipo==='desconto_boleto'?`<div style="font-size:11px;color:#94a3b8">NF boleto: ${escapeHtml(c.nr_nf_boleto||'—')} · Boleto: ${fmtR(c.valor_boleto)} · Desconto: ${fmtR(c.valor_desconto)}</div>`:''}
              ${c.observacoes?`<div style="font-size:11px;color:#64748b;margin-top:3px">${escapeHtml(c.observacoes)}</div>`:''}
              <div style="font-size:10px;color:#334155;margin-top:3px">por ${escapeHtml(c.registrado_por||'—')} em ${fmtDT(c.registrado_em)}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
              <span class="credito-val">${fmtR(c.valor)}</span>
              ${isAdmin?`<button class="btn-danger btn-sm" onclick="excluirCredito(${c.id},${d.id}, this)">Excluir</button>`:''}
            </div>
          </div>`).join('')
      }
    </div>

    ${isAdmin?`<div style="border-top:1px solid #334155;padding-top:12px">
      <button class="btn-danger btn-sm" onclick="excluirDebito(${d.id}, this)">Excluir Débito</button>
    </div>`:''}
  `;
}

function fecharDetalhe() {
  debitoAtivo = null;
  document.getElementById('painelDetalhe').classList.remove('aberto');
  renderLista();
}

// ── IMPORTAR DEVOLUÇÃO XML removido — cobrança vem da importação automática ──

// ── BONIFICAÇÃO ────────────────────────────────────────────────────
let debitoBonif = null;
function abrirBonif(id) {
  debitoBonif = id;
  document.getElementById('bonifMsg').innerHTML = '';
  document.getElementById('bonifXml').value = '';
  document.getElementById('modalBonif').style.display = 'flex';
}

async function importarBonif(btn) {
  const file = document.getElementById('bonifXml').files[0];
  const msg = document.getElementById('bonifMsg');
  if (!file) { msg.innerHTML = '<div class="msg-err">Selecione o arquivo XML</div>'; return; }

  const fd = new FormData();
  fd.append('debito_id', debitoBonif);
  fd.append('xml', file);

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/bonificacao`, { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="msg-err">${escapeHtml(d.erro)}</div>`; return; }
    msg.innerHTML = '<div class="msg-ok">Bonificação registrada com sucesso</div>';
    setTimeout(() => { fecharModal('modalBonif'); carregar(); abrirDetalhe(debitoBonif); }, 1200);
  }, 'Registrando...');
}

// ── MARCAR COBRADO (sinaliza que cobrança foi feita; pagamento entra via crédito) ──
async function marcarBaixado(debId) {
  if (!confirm('Marcar este débito como COBRADO?\n\nO pagamento (parcial ou total) entra depois via Bonificação XML ou Desconto Boleto, e o status muda automaticamente para parcial/baixado.')) return;
  const r = await apiFetch(`${API}/api/cr/debitos/${debId}/marcar-cobrado`, { method: 'POST' });
  const d = await r.json();
  if (!r.ok) { alert('Erro: ' + (d.erro||'falha')); return; }
  carregar(); abrirDetalhe(debId);
}

// ── ENVIO DE COBRANÇA PARA VENDEDOR ESPECÍFICO ─────────────────────
async function enviarCobrancaVend(debId, vendId, canal, btn) {
  if (!confirm(`Enviar cobrança por ${canal==='email'?'EMAIL':'WHATSAPP'} ao vendedor?`)) return;
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Enviando...';
  try {
    const r = await apiFetch(`${API}/api/cr/debitos/${debId}/enviar`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ canais: [canal], vendedor_id: vendId })
    });
    const d = await r.json();
    const res = d[canal];
    const msg = document.getElementById('envioMsg-'+debId);
    if (res?.ok) msg.innerHTML = `<span style="color:#4ade80">✓ ${escapeHtml(res.para)}</span>`;
    else msg.innerHTML = `<span style="color:#f87171">✗ ${escapeHtml(res?.erro || d.erro || 'erro')}</span>`;
  } finally { btn.disabled = false; btn.textContent = original; }
}

// ── ENVIO DE COBRANÇA (email/whatsapp) ─────────────────────────────
async function enviarCobranca(debId, canal, btn) {
  if (!confirm(`Enviar cobrança por ${canal==='email'?'EMAIL':'WHATSAPP'} agora?`)) return;
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Enviando...';
  try {
    const r = await apiFetch(`${API}/api/cr/debitos/${debId}/enviar`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ canais: [canal] })
    });
    const d = await r.json();
    const res = d[canal];
    const msg = document.getElementById('envioMsg-'+debId);
    if (res?.ok) msg.innerHTML = `<span style="color:#4ade80">✓ Enviado pra ${escapeHtml(res.para)}</span>`;
    else msg.innerHTML = `<span style="color:#f87171">✗ ${escapeHtml(res?.erro || d.erro || 'erro')}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = original;
  }
}

// ── DESCONTO BOLETO ────────────────────────────────────────────────
let debitoDesconto = null;
function abrirDesconto(id) {
  debitoDesconto = id;
  ['dNrNf','dData','dValNf','dValBoleto','dValDesc','dObs'].forEach(i => {
    const el = document.getElementById(i);
    if (el) el.value = '';
  });
  document.getElementById('descontoMsg').innerHTML = '';
  document.getElementById('modalDesconto').style.display = 'flex';
}

async function registrarDesconto(btn) {
  const msg = document.getElementById('descontoMsg');
  const valor_desconto = parseFloat(document.getElementById('dValDesc').value);
  if (!valor_desconto) { msg.innerHTML = '<div class="msg-err">Informe o valor do desconto</div>'; return; }

  const body = {
    debito_id: debitoDesconto,
    nr_nf_boleto: document.getElementById('dNrNf').value.trim() || null,
    valor_nf_boleto: parseFloat(document.getElementById('dValNf').value) || 0,
    valor_boleto: parseFloat(document.getElementById('dValBoleto').value) || 0,
    valor_desconto,
    data_credito: document.getElementById('dData').value || null,
    observacoes: document.getElementById('dObs').value.trim() || null,
  };

  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/desconto`, { method: 'POST', body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="msg-err">${escapeHtml(d.erro)}</div>`; return; }
    msg.innerHTML = '<div class="msg-ok">Desconto registrado com sucesso</div>';
    setTimeout(() => { fecharModal('modalDesconto'); carregar(); abrirDetalhe(debitoDesconto); }, 1200);
  }, 'Registrando...');
}

// ── EXCLUIR ────────────────────────────────────────────────────────
async function excluirCredito(id, debitoId, btn) {
  if (!confirm('Excluir este crédito?')) return;
  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/creditos/${id}`, { method: 'DELETE' });
    if (r.ok) { carregar(); abrirDetalhe(debitoId); }
    else { const d = await r.json(); alert(d.erro); }
  }, 'Excluindo...');
}

async function excluirDebito(id, btn) {
  if (!confirm('Excluir este débito e todos os seus créditos?')) return;
  await withLoading(btn, async () => {
    const r = await apiFetch(`${API}/api/cr/debitos/${id}`, { method: 'DELETE' });
    if (r.ok) { fecharDetalhe(); carregar(); }
    else { const d = await r.json(); alert(d.erro); }
  }, 'Excluindo...');
}

function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if (e.target===el) fecharModal(el.id); }));

// ── ABAS ─────────────────────────────────────────────────────────
let abaAtual = 'debitos';
function setAba(qual) {
  abaAtual = qual;
  document.getElementById('abaDebitos').style.display       = qual === 'debitos' ? 'block' : 'none';
  document.getElementById('abaAcordos').style.display       = qual === 'acordos' ? 'block' : 'none';
  document.getElementById('abaDebitosBtn').classList.toggle('ativa', qual === 'debitos');
  document.getElementById('abaAcordosBtn').classList.toggle('ativa', qual === 'acordos');
  if (qual === 'acordos' && !acordosCarregadosUmaVez) {
    popularSelectLojaAcordos();
    carregarAcordos();
    acordosCarregadosUmaVez = true;
  }
}

// ── ACORDOS COMERCIAIS ───────────────────────────────────────────
let acordosCarregadosUmaVez = false;
let acordos = [];
let acordoAtivoId = null;
let acordoAtivo = null;

function popularSelectLojaAcordos() {
  // reaproveita as lojas já carregadas no select de débitos
  const fLoja = document.getElementById('fLoja');
  const acLoja = document.getElementById('acLoja');
  if (!acLoja || !fLoja) return;
  acLoja.innerHTML = '<option value="">Todas</option>' +
    Array.from(fLoja.options).filter(o => o.value).map(o => `<option value="${o.value}">${o.textContent}</option>`).join('');
}

async function carregarBadgePendentes() {
  try {
    const r = await apiFetch(`${API}/api/acordos/contagem-pendentes`);
    if (!r.ok) return;
    const d = await r.json();
    const b = document.getElementById('badgePendentes');
    if (d.pendentes > 0) { b.textContent = d.pendentes; b.style.display = 'inline-block'; }
    else b.style.display = 'none';
  } catch {}
}

async function carregarAcordos() {
  const status = document.getElementById('acStatus').value;
  const loja_id = document.getElementById('acLoja').value;
  const params = new URLSearchParams();
  if (status)  params.set('status', status);
  if (loja_id) params.set('loja_id', loja_id);

  document.getElementById('tabelaAcordos').innerHTML = '<div style="color:#64748b;padding:40px;text-align:center">Carregando...</div>';
  const r = await apiFetch(`${API}/api/acordos?${params}`);
  acordos = r.ok ? await r.json() : [];
  renderAcordos();
}

function renderAcordos() {
  const busca = (document.getElementById('acBusca').value || '').toLowerCase();
  const filtrados = busca
    ? acordos.filter(a =>
        (a.produto_nome || '').toLowerCase().includes(busca) ||
        (a.fornecedor_nome || a.forn_razao || '').toLowerCase().includes(busca) ||
        (a.barcode || '').includes(busca))
    : acordos;

  // resumo
  const totConfess = filtrados.reduce((acc, a) => acc + parseFloat(a.valor_confessado || 0), 0);
  const totDebito  = filtrados.reduce((acc, a) => acc + parseFloat(a.valor_debito_atual || 0), 0);
  document.getElementById('resumoAcordos').innerHTML = `
    <div class="resumo-card"><label>Acordos</label><span style="color:#38bdf8">${filtrados.length}</span></div>
    <div class="resumo-card"><label>Valor confessado</label><span style="color:#fbbf24">${fmtR(totConfess)}</span></div>
    <div class="resumo-card"><label>Débito atual (apurado)</label><span style="color:#f87171">${fmtR(totDebito)}</span></div>
  `;

  if (!filtrados.length) {
    document.getElementById('tabelaAcordos').innerHTML = '<div style="color:#475569;padding:40px;text-align:center">Nenhum acordo encontrado</div>';
    return;
  }

  document.getElementById('tabelaAcordos').innerHTML = `
    <table>
      <thead><tr>
        <th>Solicitado</th>
        <th>Loja</th>
        <th>Produto</th>
        <th>Fornecedor</th>
        <th>Validade</th>
        <th style="text-align:right">Preço atual</th>
        <th style="text-align:right">Preço acordo</th>
        <th style="text-align:right">Qtde</th>
        <th style="text-align:right">Valor confessado</th>
        <th style="text-align:right">Débito atual</th>
        <th>Status</th>
        <th>Extrato</th>
      </tr></thead>
      <tbody>
        ${filtrados.map(a => `
          <tr onclick="abrirDetalheAcordo(${a.id})" class="${acordoAtivoId===a.id?'ativo':''}">
            <td style="font-size:11px">${fmtD(a.solicitado_em)}<br><span style="color:#64748b;font-size:10px">${escapeHtml(a.solicitado_por_nome || '')}</span></td>
            <td style="font-size:11px">${escapeHtml(a.loja_nome || lojaLabel(a.loja_id))}</td>
            <td><div style="font-weight:600;font-size:12px">${escapeHtml(a.produto_nome)}</div><div style="font-size:10px;color:#475569">${escapeHtml(a.barcode||'')}</div></td>
            <td style="font-size:11px">${escapeHtml(a.forn_razao || a.fornecedor_nome || '—')}<br><span style="color:#475569;font-size:10px">${escapeHtml(a.fornecedor_cnpj||'')}</span></td>
            <td style="font-size:11px">${fmtD(a.data_validade)}</td>
            <td style="text-align:right">${fmtR(a.preco_atual)}</td>
            <td style="text-align:right;color:#fbbf24">${fmtR(a.preco_acordo)}</td>
            <td style="text-align:right">${parseFloat(a.qtde_acordada||0).toFixed(0)}</td>
            <td style="text-align:right;color:#fbbf24;font-weight:700">${fmtR(a.valor_confessado)}</td>
            <td style="text-align:right;color:${parseFloat(a.valor_debito_atual||0)>0?'#f87171':'#64748b'};font-weight:700">${fmtR(a.valor_debito_atual)}</td>
            <td><span class="acordos-status ${a.status}">${formatStatus(a.status)}</span></td>
            <td><a href="/acordo-extrato?id=${a.id}" target="_blank" onclick="event.stopPropagation()" style="color:#7c3aed;text-decoration:none;font-weight:700;font-size:11px">📊 Extrato</a></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function formatStatus(s) {
  return ({
    pendente_compras: 'Pendente',
    ativo: 'Ativo',
    fechado: 'Fechado',
    recusado: 'Recusado',
    cancelado: 'Cancelado'
  })[s] || s;
}

async function abrirDetalheAcordo(id) {
  acordoAtivoId = id;
  document.getElementById('painelDetalheAcordo').classList.add('aberto');
  document.getElementById('acDetBody').innerHTML = '<div style="color:#64748b;padding:40px;text-align:center">Carregando...</div>';
  const r = await apiFetch(`${API}/api/acordos/${id}`);
  if (!r.ok) { document.getElementById('acDetBody').innerHTML = '<div class="msg-err">Erro ao carregar acordo</div>'; return; }
  acordoAtivo = await r.json();
  renderDetalheAcordo();
  renderAcordos();
}

function fecharDetalheAcordo() {
  acordoAtivoId = null;
  acordoAtivo = null;
  document.getElementById('painelDetalheAcordo').classList.remove('aberto');
  renderAcordos();
}

function renderDetalheAcordo() {
  const a = acordoAtivo;
  if (!a) return;
  document.getElementById('acDetTitulo').textContent = a.produto_nome;
  document.getElementById('acDetSub').textContent = (a.forn_razao || a.fornecedor_nome || '') + ' · ' + (a.loja_nome || lojaLabel(a.loja_id));

  const vendedoresHtml = (a.vendedores || []).length
    ? a.vendedores.map(v =>
        `<div class="credito-row">
           <div class="credito-info">
             <div style="font-weight:600;font-size:12px">${escapeHtml(v.nome)}</div>
             <div style="color:#94a3b8;font-size:11px">${escapeHtml(v.email||'')} · ${escapeHtml(v.telefone||'')}</div>
             <div style="color:#64748b;font-size:10px;margin-top:2px">Status: ${escapeHtml(v.status||'')}</div>
           </div>
         </div>`).join('')
    : '<div style="color:#64748b;font-size:12px">Nenhum vendedor cadastrado para este fornecedor.</div>';

  let acoesHtml = '';
  if (a.status === 'pendente_compras') {
    const precoOriginal = parseFloat(a.preco_acordo || 0).toFixed(2);
    acoesHtml = `
      <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:10px">
        <label style="display:block;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:6px">💰 Preço acordo (negociável)</label>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:13px;color:#94a3b8">R$</span>
          <input type="number" id="inp-preco-acordo" step="0.01" min="0" max="${parseFloat(a.preco_atual || 0).toFixed(2)}" value="${precoOriginal}" oninput="recalcAcordo(this)" style="background:#0f172a;border:1px solid #475569;color:#fbbf24;font-weight:700;font-size:16px;padding:8px 12px;border-radius:6px;width:130px;text-align:center">
          <span style="font-size:11px;color:#64748b">Original sugerido: R$ ${precoOriginal} · Preço atual: ${fmtR(a.preco_atual)}</span>
        </div>
        <div id="acordo-recalc" style="margin-top:8px;font-size:11px;color:#94a3b8"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-green" onclick="aprovarAcordo()" style="flex:1">✓ Aprovar acordo</button>
        <button class="btn-danger" onclick="abrirRecusa()" style="flex:1">✕ Recusar</button>
      </div>`;
    setTimeout(() => {
      const inp = document.getElementById('inp-preco-acordo');
      if (inp) recalcAcordo(inp);
    }, 50);
  } else if (a.status === 'ativo') {
    acoesHtml = `<div class="msg-ok">Aprovado em ${fmtDT(a.aprovado_em)} por ${escapeHtml(a.aprovado_por||'')}. Aguardando vencimento da validade para fechamento automático.</div>`;
  } else if (a.status === 'recusado') {
    acoesHtml = `<div class="msg-err">Recusado por ${escapeHtml(a.aprovado_por||'')} em ${fmtDT(a.aprovado_em)}.<br><strong>Motivo:</strong> ${escapeHtml(a.motivo_recusa||'')}</div>`;
  } else if (a.status === 'fechado') {
    acoesHtml = `<div style="background:#0c1a30;color:#93c5fd;padding:8px 12px;border-radius:6px;font-size:13px">Fechado em ${fmtDT(a.fechado_em)}. Débito gerado: <strong>cr_debitos #${a.cr_debito_id || '?'}</strong></div>`;
  }

  document.getElementById('acDetBody').innerHTML = `
    <div>

      <div class="det-grid">

        <div class="det-item"><label>Solicitado por</label><span>${escapeHtml(a.solicitado_por_nome||'')}</span></div>
        <div class="det-item"><label>Validade do produto</label><span>${fmtD(a.data_validade)}</span></div>
        <div class="det-item"><label>Status</label><span><span class="acordos-status ${a.status}">${formatStatus(a.status)}</span></span></div>

    </div>

    <div>
      <div class="sec-title">Termos comerciais</div>
      <div class="det-grid">

        <div class="det-item"><label>Diferença unitária</label><span style="color:#f87171">${fmtR(a.diferenca_unitaria)}</span></div>
        <div class="det-item"><label>Qtde acordada</label><span>${parseFloat(a.qtde_acordada||0).toFixed(0)} un</span></div>

    ${a.validade_info && a.validade_info.data_coleta ? `

    <div>

function recalcAcordo(inp) {
  const acordo = acordoAtivo;
  if (!acordo) return;
  const novo = parseFloat(inp.value) || 0;
  const atual = parseFloat(acordo.preco_atual) || 0;
  const qtd = parseFloat(acordo.qtde_acordada) || 0;
  const diff = atual - novo;
  const valor = qtd * diff;
  const orig = parseFloat(acordo.preco_acordo) || 0;
  const renegociado = Math.abs(novo - orig) > 0.001;
  const wrap = document.getElementById('acordo-recalc');
  if (!wrap) return;
  if (novo >= atual || novo <= 0) {
    wrap.innerHTML = `<span style="color:#f87171">⚠️ Preço deve ser maior que zero e menor que R$ ${atual.toFixed(2)}</span>`;
    return;
  }
  wrap.innerHTML = `
    Diferença unitária: <strong style="color:#f87171">R$ ${diff.toFixed(2)}</strong> ·
    Valor confessado: <strong style="color:#fbbf24">R$ ${valor.toFixed(2).replace('.', ',')}</strong>
    ${renegociado ? '<span style="color:#fbbf24;margin-left:8px">🔄 Renegociado</span>' : ''}
  `;
}

async function aprovarAcordo() {
  if (!acordoAtivoId) return;
  const inp = document.getElementById('inp-preco-acordo');
  const precoNovo = inp ? parseFloat(inp.value) : null;
  const acordo = acordoAtivo;
  const orig = acordo ? parseFloat(acordo.preco_acordo) : null;
  const renegociado = inp && orig != null && Math.abs(precoNovo - orig) > 0.001;
  const msg = renegociado
    ? `Aprovar acordo COM RENEGOCIAÇÃO?\n\nNovo preço: R$ ${precoNovo.toFixed(2)}\nOriginal: R$ ${orig.toFixed(2)}\n\nO cadastro vai receber instrução de rebaixar para o novo valor.`
    : 'Aprovar o acordo? O produto será marcado como rebaixado para o repositor (etiqueta vermelha) e o débito do fornecedor será apurado a cada hora até a data de validade.';
  if (!confirm(msg)) return;
  const body = inp ? JSON.stringify({ preco_acordo: precoNovo }) : null;
  const r = await apiFetch(`${API}/api/acordos/${acordoAtivoId}/aprovar`, {
    method: 'POST',
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body
  });
  const d = await r.json();
  if (!r.ok) { alert(d.erro || 'Erro ao aprovar'); return; }
  await carregarAcordos();
  await carregarBadgePendentes();
  await abrirDetalheAcordo(acordoAtivoId);
}

let _acordoIdRecusa = null;
function abrirRecusa() {
  _acordoIdRecusa = acordoAtivoId;
  document.getElementById('rcMotivo').value = '';
  document.getElementById('rcMsg').innerHTML = '';
  document.getElementById('modalRecusar').style.display = 'flex';
}
async function confirmarRecusa() {
  const motivo = document.getElementById('rcMotivo').value.trim();
  if (!motivo) { document.getElementById('rcMsg').innerHTML = '<div class="msg-err">Motivo obrigatório</div>'; return; }
  const r = await apiFetch(`${API}/api/acordos/${_acordoIdRecusa}/recusar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ motivo })
  });
  const d = await r.json();
  if (!r.ok) { document.getElementById('rcMsg').innerHTML = `<div class="msg-err">${d.erro||'Erro'}</div>`; return; }
  fecharModal('modalRecusar');
  await carregarAcordos();
  await carregarBadgePendentes();
  await abrirDetalheAcordo(_acordoIdRecusa);
}

// Carrega badge ao iniciar (depois do init original)
setTimeout(carregarBadgePendentes, 800);
setInterval(carregarBadgePendentes, 60000);

init();
</script>
