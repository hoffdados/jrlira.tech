<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard NF-e</title>
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155}
.brand{font-family:'Segoe UI Black','Segoe UI',sans-serif;font-weight:900;font-size:18px;color:#38bdf8}
.nav-user{margin-left:auto;font-size:12px;color:#475569}
.btn-nav{background:#0ea5e9;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.main{padding:18px 20px;max-width:1400px;margin:0 auto}
input,select{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 11px;font-size:13px}
input:focus,select:focus{outline:none;border-color:#38bdf8}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#273549}
.filtros{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;padding:14px;background:#1e293b;border-radius:10px}
.filtros label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.card-status{background:#1e293b;border-radius:10px;padding:14px;border-left:4px solid #475569;cursor:pointer;transition:.15s}
.card-status:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.card-status .label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700}
.card-status .qtd{font-size:30px;font-weight:900;color:#e2e8f0;margin:6px 0 2px}
.card-status .valor{font-size:12px;color:#64748b}
.card-status .extra{font-size:11px;color:#fbbf24;margin-top:4px}
.card-status.totais{border-left-color:#38bdf8;background:linear-gradient(135deg,#1e293b,#0c1a2e)}
.s-importada{border-left-color:#60a5fa}
.s-emergencial_pendente{border-left-color:#fbbf24}
.s-em_validacao_cadastro{border-left-color:#a5b4fc}
.s-validada{border-left-color:#34d399}
.s-recebida{border-left-color:#0ea5e9}
.s-em_conferencia{border-left-color:#22c55e}
.s-em_auditoria{border-left-color:#f59e0b}
.s-aguardando_admin_validade{border-left-color:#f97316}
.s-aguardando_devolucao{border-left-color:#ef4444}
.s-fechada{border-left-color:#475569}
.s-cancelada{border-left-color:#7f1d1d}
.painel{background:#1e293b;border-radius:10px;padding:16px;margin-bottom:18px}
.painel-titulo{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0f172a;padding:8px 10px;text-align:center;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
thead th.left{text-align:left}
tbody td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
tbody td.right{text-align:right;font-variant-numeric:tabular-nums}
tbody td.center{text-align:center}
tbody tr:hover{background:#1a2744;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.b-importada{background:#1e3a5f;color:#60a5fa}
.b-emergencial_pendente{background:#451a03;color:#fbbf24}
.b-em_validacao_cadastro{background:#312e81;color:#a5b4fc}
.b-validada{background:#1a4731;color:#34d399}
.b-recebida{background:#075985;color:#bae6fd}
.b-em_conferencia{background:#14532d;color:#4ade80}
.b-em_auditoria{background:#78350f;color:#fbbf24}
.b-aguardando_admin_validade{background:#7c2d12;color:#fdba74}
.b-aguardando_devolucao{background:#7f1d1d;color:#fca5a5}
.b-fechada{background:#1e293b;color:#475569}
.b-cancelada{background:#450a0a;color:#7f1d1d}
.empty{text-align:center;color:#475569;padding:40px;font-size:13px}
.dias-warn{color:#fbbf24;font-weight:700}
.dias-crit{color:#f87171;font-weight:700}
.matriz td.right{font-variant-numeric:tabular-nums}
.matriz tbody tr:hover{background:#1a2744;cursor:default}
</style>
</head>
<body>
<nav>
  <span class="brand">JR Lira Tech</span>
  <span style="color:#475569">/</span>
  <span style="font-size:13px;color:#94a3b8">Dashboard NF-e</span>
  <span class="nav-user" id="nomeUsuario"></span>
  <button class="btn-nav" onclick="location.href='/'">← Início</button>
</nav>

<div class="main">
  <div class="filtros">
    <div>
      <label>Loja</label>
      <select id="filtroLoja"><option value="">Todas</option></select>
    </div>
    <div>
      <label>Emissão de</label>
      <input type="date" id="filtroDataIni">
    </div>
    <div>
      <label>até</label>
      <input type="date" id="filtroDataFim">
    </div>
    <div style="flex:1;min-width:180px">
      <label>Fornecedor</label>
      <input type="text" id="filtroFornecedor" placeholder="Nome ou CNPJ" style="width:100%">
    </div>
    <div>
      <label>Paradas há</label>
      <select id="filtroDiasParado">
        <option value="3">3+ dias</option>
        <option value="7" selected>7+ dias</option>
        <option value="14">14+ dias</option>
        <option value="30">30+ dias</option>
      </select>
    </div>
    <button class="btn-primary" onclick="carregar()">Atualizar</button>
    <button class="btn-ghost" onclick="limparFiltros()">Limpar</button>
  </div>

  <div id="totais" class="cards-row"></div>
  <div id="cardsStatus" class="cards-row"></div>

  <div class="painel">
    <div class="painel-titulo">Notas por Loja × Status</div>
    <div style="overflow-x:auto"><table class="matriz" id="tabelaMatriz"></table></div>
  </div>

  <div class="painel">
    <div class="painel-titulo" id="tituloParadas">Notas paradas há mais de 7 dias</div>
    <div style="overflow-x:auto"><table id="tabelaParadas"></table></div>
  </div>
</div>

<script>
const STATUS_ORDEM = [
  'importada','emergencial_pendente','em_validacao_cadastro','validada',
  'recebida','em_conferencia','em_auditoria','aguardando_admin_validade',
  'aguardando_devolucao','fechada','cancelada'
];
const STATUS_LABEL = {
  importada:'Importada',
  emergencial_pendente:'Emergencial',
  em_validacao_cadastro:'Validação Cadastro',
  validada:'Validada',
  recebida:'Recebida',
  em_conferencia:'Em Conferência',
  em_auditoria:'Em Auditoria',
  aguardando_admin_validade:'Aguardando Admin',
  aguardando_devolucao:'Devolução',
  fechada:'Fechada',
  cancelada:'Cancelada'
};

document.getElementById('nomeUsuario').textContent = localStorage.getItem('jrlira_nome') || '';

// Popula select de lojas (apenas se admin/comprador; demais só veem a própria)
function popularLojas() {
  const sel = document.getElementById('filtroLoja');
  Object.entries(LOJAS).forEach(([id,nome])=>{
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${id} — ${nome}`;
    sel.appendChild(opt);
  });
}
popularLojas();

function limparFiltros(){
  document.getElementById('filtroLoja').value='';
  document.getElementById('filtroDataIni').value='';
  document.getElementById('filtroDataFim').value='';
  document.getElementById('filtroFornecedor').value='';
  document.getElementById('filtroDiasParado').value='7';
  carregar();
}

async function carregar() {
  const params = new URLSearchParams();
  const loja = document.getElementById('filtroLoja').value;
  const di = document.getElementById('filtroDataIni').value;
  const df = document.getElementById('filtroDataFim').value;
  const fn = document.getElementById('filtroFornecedor').value.trim();
  const dp = document.getElementById('filtroDiasParado').value;
  if (loja) params.set('loja', loja);
  if (di) params.set('dataIni', di);
  if (df) params.set('dataFim', df);
  if (fn) params.set('fornecedor', fn);
  if (dp) params.set('diasParado', dp);

  document.getElementById('totais').innerHTML = '<div class="empty">Carregando...</div>';
  document.getElementById('cardsStatus').innerHTML = '';
  document.getElementById('tabelaMatriz').innerHTML = '';
  document.getElementById('tabelaParadas').innerHTML = '';

  try {
    const r = await apiFetch('/api/dashboard/notas?' + params.toString());
    const data = await r.json();
    if (!r.ok) throw new Error(data.erro || 'Erro');
    renderTotais(data.total);
    renderCardsStatus(data.por_status);
    renderMatriz(data.por_loja);
    renderParadas(data.paradas, dp);
  } catch (e) {
    document.getElementById('totais').innerHTML = `<div class="empty" style="color:#f87171">${escapeHtml(e.message)}</div>`;
  }
}

function renderTotais(t) {
  if (!t) { document.getElementById('totais').innerHTML = '<div class="empty">Sem dados</div>'; return; }
  const html = `
    <div class="card-status totais">
      <div class="label">Total de Notas</div>
      <div class="qtd">${t.qtd.toLocaleString('pt-BR')}</div>
      <div class="valor">R$ ${fmtMoeda(t.valor)}</div>
    </div>
    <div class="card-status totais">
      <div class="label">Em Andamento</div>
      <div class="qtd">${t.qtd_em_andamento.toLocaleString('pt-BR')}</div>
      <div class="valor">notas em fluxo</div>
    </div>
    <div class="card-status totais">
      <div class="label">Fechadas</div>
      <div class="qtd">${t.qtd_fechadas.toLocaleString('pt-BR')}</div>
      <div class="valor">finalizadas</div>
    </div>
    <div class="card-status totais">
      <div class="label">Emergenciais</div>
      <div class="qtd">${t.qtd_emergencial.toLocaleString('pt-BR')}</div>
      <div class="valor">sem pedido prévio</div>
    </div>
  `;
  document.getElementById('totais').innerHTML = html;
}

function renderCardsStatus(arr) {
  if (!arr.length) { document.getElementById('cardsStatus').innerHTML = ''; return; }
  const map = Object.fromEntries(arr.map(r => [r.status, r]));
  const html = STATUS_ORDEM
    .filter(s => map[s])
    .map(s => {
      const r = map[s];
      const label = STATUS_LABEL[s] || s;
      const emerg = r.qtd_emergencial > 0 ? `<div class="extra">⚠ ${r.qtd_emergencial} emergencial(is)</div>` : '';
      return `
        <div class="card-status s-${s}" onclick="irParaStatus('${s}')">
          <div class="label">${label}</div>
          <div class="qtd">${r.qtd.toLocaleString('pt-BR')}</div>
          <div class="valor">R$ ${fmtMoeda(r.valor)}</div>
          ${emerg}
        </div>
      `;
    }).join('');
  document.getElementById('cardsStatus').innerHTML = html;
}

function renderMatriz(arr) {
  const t = document.getElementById('tabelaMatriz');
  if (!arr.length) { t.innerHTML = '<thead><tr><th>Sem dados</th></tr></thead>'; return; }
  // Determina status presentes em ordem fixa
  const statusesPresentes = STATUS_ORDEM.filter(s => arr.some(r => r.status === s));
  const lojas = [...new Set(arr.map(r => r.loja_id))].sort((a,b) => (a||0)-(b||0));
  const head = `<thead><tr>
    <th class="left">Loja</th>
    ${statusesPresentes.map(s => `<th>${STATUS_LABEL[s]||s}</th>`).join('')}
    <th>Total</th>
  </tr></thead>`;
  let totGeral = 0, totGeralValor = 0;
  const totaisStatus = {};
  const body = lojas.map(lid => {
    const linha = arr.filter(r => r.loja_id === lid);
    const nome = linha[0]?.loja_nome || `Loja ${lid||'-'}`;
    let totLoja = 0, totLojaValor = 0;
    const cells = statusesPresentes.map(s => {
      const r = linha.find(x => x.status === s);
      const q = r?.qtd || 0;
      const v = r ? Number(r.valor) : 0;
      totLoja += q; totLojaValor += v;
      totaisStatus[s] = totaisStatus[s] || {q:0,v:0};
      totaisStatus[s].q += q; totaisStatus[s].v += v;
      if (!q) return `<td class="center" style="color:#334155">—</td>`;
      return `<td class="right"><div style="font-weight:700">${q}</div><div style="font-size:10px;color:#64748b">R$ ${fmtMoeda(v)}</div></td>`;
    }).join('');
    totGeral += totLoja; totGeralValor += totLojaValor;
    return `<tr>
      <td class="left" style="font-weight:600">${escapeHtml(nome)}</td>
      ${cells}
      <td class="right" style="background:#0f172a"><div style="font-weight:700">${totLoja}</div><div style="font-size:10px;color:#64748b">R$ ${fmtMoeda(totLojaValor)}</div></td>
    </tr>`;
  }).join('');
  const linhaTot = `<tr style="background:#0c1a2e;font-weight:700">
    <td class="left">TOTAL</td>
    ${statusesPresentes.map(s => {
      const t = totaisStatus[s] || {q:0,v:0};
      return `<td class="right"><div>${t.q}</div><div style="font-size:10px;color:#64748b">R$ ${fmtMoeda(t.v)}</div></td>`;
    }).join('')}
    <td class="right" style="background:#1e3a5f;color:#38bdf8"><div>${totGeral}</div><div style="font-size:10px">R$ ${fmtMoeda(totGeralValor)}</div></td>
  </tr>`;
  t.innerHTML = head + '<tbody>' + body + linhaTot + '</tbody>';
}

function renderParadas(arr, diasFiltro) {
  document.getElementById('tituloParadas').textContent = `Notas paradas há mais de ${diasFiltro} dias (${arr.length})`;
  const t = document.getElementById('tabelaParadas');
  if (!arr.length) { t.innerHTML = '<thead><tr><th>Sem notas paradas</th></tr></thead>'; return; }
  const head = `<thead><tr>
    <th class="left">Nº</th><th class="left">Fornecedor</th><th class="left">Loja</th>
    <th>Status</th><th>Emergencial</th><th>Emissão</th><th>Importada em</th>
    <th>Dias parada</th><th>Valor</th>
  </tr></thead>`;
  const body = arr.map(n => {
    const dias = n.dias || 0;
    const cls = dias >= 30 ? 'dias-crit' : dias >= 14 ? 'dias-warn' : '';
    return `<tr onclick="abrirNota(${n.id}, '${n.status}')">
      <td class="left" style="font-family:monospace;color:#38bdf8;font-weight:700">${escapeHtml(n.numero_nota||'')}</td>
      <td class="left">${escapeHtml(n.fornecedor_nome||'')}</td>
      <td class="left">${escapeHtml(n.loja_nome||'')}</td>
      <td class="center"><span class="badge b-${n.status}">${STATUS_LABEL[n.status]||n.status}</span></td>
      <td class="center">${n.emergencial?'⚠':''}</td>
      <td class="center">${fmtData(n.data_emissao)}</td>
      <td class="center">${fmtData(n.importado_em)}</td>
      <td class="center ${cls}">${dias}</td>
      <td class="right">R$ ${fmtMoeda(n.valor_total)}</td>
    </tr>`;
  }).join('');
  t.innerHTML = head + '<tbody>' + body + '</tbody>';
}

function destinoPorStatus(status) {
  if (['importada','emergencial_pendente','em_validacao_cadastro'].includes(status)) return '/notas-cadastro';
  if (['validada','recebida','em_conferencia'].includes(status)) return '/notas-estoque';
  if (['em_auditoria','aguardando_admin_validade','aguardando_devolucao','fechada'].includes(status)) return '/notas-auditoria';
  return '/notas-comprador';
}
function abrirNota(id, status) {
  location.href = destinoPorStatus(status) + '?nota=' + id;
}
function irParaStatus(status) {
  location.href = destinoPorStatus(status);
}

carregar();
</script>
</body>
</html>
